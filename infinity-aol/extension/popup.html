<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyFlow AI Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span>EasyFlow AI</span>
        <h1>EasyFlow AI Extension</h1>
        <small id="buildId">Build: loading...</small>
      </header>

      <!-- 0. Broker sign in (security gate — nothing else works until signed in) -->
      <section id="loginBox" class="action-group">
        <h2>Broker sign in</h2>
        <label>Email<input id="loginEmail" type="email" placeholder="you@easyloanfinance.com.au" autocomplete="username" /></label>
        <label>Access code<input id="loginPassword" type="password" placeholder="access code" autocomplete="current-password" /></label>
        <button id="loginBtn" class="primary-action" type="button">Sign in</button>
        <p class="safety">Only vetted Easy Loan Finance brokers can use this extension.</p>
      </section>

      <div id="appBox" style="display:none;">

      <!-- 1. Case -->
      <section class="case-picker">
        <label>
          Prepared case <span id="loggedInWho" class="who"></span>
          <select id="casePicker"><option value="">Load prepared cases…</option></select>
        </label>
      </section>

      <!-- 2. Run AutoFill -->
      <section class="action-group">
        <h2>Run AutoFill</h2>
        <div class="button-row start-row">
          <button id="startInfinityAutofill" class="primary-action" type="button">Start Infinity</button>
          <button id="startAolAutofill" class="primary-action aol-action" type="button">Start AOL</button>
        </div>
      </section>

      <!-- 3. Documents -->
      <section class="action-group">
        <h2>Documents</h2>
        <div class="button-row">
          <button id="genRecPdf" class="secondary-action" type="button">Rec Notes · PDF</button>
          <button id="genRecDocx" class="secondary-action" type="button">Rec Notes · Word</button>
        </div>
        <button id="genYtd" class="secondary-action" type="button">YTD Calculator · Excel</button>
        <div id="docHistory" class="doc-history"></div>
      </section>

      <!-- 4. Reconcile -->
      <button id="comparePage" class="secondary-action" type="button">Compare Infinity / AOL</button>
      <button id="reverseSync" class="secondary-action sync-btn" type="button">Sync live → EasyFlow (update case)</button>
      <div id="reverseSyncPanel" class="reverse-sync" style="display:none;"></div>

      <!-- 5. Secondary tools, collapsed -->
      <details class="more">
        <summary>More tools</summary>
        <div class="button-row">
          <button id="copyInfinityReport" class="secondary-action copy-infinity" type="button">Infinity report</button>
          <button id="copyAolReport" class="secondary-action copy-aol" type="button">AOL report</button>
        </div>
        <button id="refreshCases" class="secondary-action" type="button">Refresh case list</button>
        <button id="roSync" class="secondary-action" type="button">Learn / Apply R&amp;O</button>
        <button id="toggleChecklist" class="secondary-action" type="button">Show / hide checklist</button>
      </details>

      <details class="advanced">
        <summary>Advanced</summary>
        <label>Case ID / token override<input id="caseToken" placeholder="ELF-2026-0148 or token" /></label>
        <label>EasyFlow API<input id="apiBase" value="https://booking.easyloanfinance.com.au/infinity-aol" /></label>
        <div class="button-row">
          <button id="fillSection" type="button" disabled>Fill current popup</button>
          <button id="compareCase" type="button" disabled>Compare case</button>
        </div>
        <div class="button-row">
          <button id="runDiagnostics" class="secondary-action diagnostic-row" type="button">Run diagnostic</button>
          <button id="copyDiagnostics" class="secondary-action" type="button" disabled>Copy diagnostic</button>
        </div>
        <button id="logoutBtn" class="secondary-action" type="button">Sign out</button>
      </details>

      <section id="status" class="status muted">Pick a case, open it in Infinity/AOL, then Start.</section>
      <div id="reviewRows" class="review-rows"></div>
      </div><!-- /appBox -->
    </main>
    <script src="popup.js"></script>
  </body>
</html>
