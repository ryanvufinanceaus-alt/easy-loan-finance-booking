<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyFlow AI Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span>EasyFlow AI</span>
        <h1>EasyFlow AI Extension</h1>
        <small id="buildId">Build: loading...</small>
      </header>

      <section class="case-picker">
        <label>
          Prepared case
          <select id="casePicker">
            <option value="">Load prepared cases...</option>
          </select>
        </label>
        <button id="refreshCases" class="secondary-action" type="button">Refresh Cases</button>
      </section>

      <label>
        Case ID or token
        <input id="caseToken" placeholder="ELF-2026-0148 or token" />
      </label>

      <div class="button-row start-row">
        <button id="startInfinityAutofill" class="primary-action" type="button">Start Infinity</button>
        <button id="startAolAutofill" class="primary-action aol-action" type="button">Start AOL</button>
      </div>
      <button id="copyDiagnostics" class="secondary-action copy-main" type="button" disabled>Copy Last Report</button>
      <button id="comparePage" class="secondary-action" type="button">Compare Infinity/AOL</button>

      <details class="advanced">
        <summary>Advanced tools</summary>
        <label>
          EasyFlow API
          <input id="apiBase" value="https://booking.easyloanfinance.com.au/infinity-aol" />
        </label>
        <div class="button-row">
          <button id="fillSection" type="button" disabled>Fill Current Popup</button>
          <button id="compareCase" type="button" disabled>Compare Case</button>
        </div>
        <button id="runDiagnostics" class="secondary-action diagnostic-row" type="button">Run Diagnostic</button>
      </details>

      <section id="status" class="status muted">Prepare the case in the web app, open the real Infinity/AOL page, then start.</section>

      <section class="review">
        <h2>Status</h2>
        <div id="reviewRows"></div>
        <p class="safety">The extension fills fields only. It does not store passwords, bypass MFA, or submit AOL.</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
