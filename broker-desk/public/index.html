// Scan all text fields and return a sorted unique list of [PLACEHOLDER] tokens
// the broker still needs to fill in. Used to render the helper banner.
const REC_PLACEHOLDER_FIELDS = ['proposal','incomeDetails','rentalIncome','character','collateral','bufferPolicyNote','separateApplicationNote'];

function recExtractPlaceholders_(d){
  const found = new Set();
  REC_PLACEHOLDER_FIELDS.forEach(f => {
    const text = String(d[f]||'');
    // Match [WORD_WITH_UNDERSCORES_AND_DIGITS]
    const matches = text.match(/\[([A-Z][A-Z0-9_]*)\]/g);
    if(matches) matches.forEach(m => found.add(m));
  });
  // Filter brackets we auto-resolve from form data (already handled in recGenerateTemplate_)
  const autoResolved = new Set(['[LENDER]','[ADDRESS]','[PURCHASE_PRICE]','[BALANCE]','[CLIENT_NAME]']);
  return Array.from(found).filter(b => !autoResolved.has(b) || _bracketStillUnresolved_(d, b)).sort();
}

// True if the auto-resolved bracket is still literally present in text
// (because the corresponding form field is empty)
function _bracketStillUnresolved_(d, bracket){
  return REC_PLACEHOLDER_FIELDS.some(f => String(d[f]||'').indexOf(bracket) >= 0);
}

function recPlaceholderHelperHtml_(d){
  const phs = recExtractPlaceholders_(d);
  if(!phs.length) return '';
  return `<div id="rec-ph-wrap" style="background:#0f1420;border:1px solid #1e2430;border-top:none;padding:10px 13px;">
    <div style="font-size:10.5px;color:#FB923C;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;">
      <span style="width:6px;height:6px;border-radius:50%;background:#FB923C;"></span>
      ${phs.length} placeholder${phs.length===1?'':'s'} to fill
      <span style="color:#6b7280;font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px;">\u2014 type value + press Enter to replace everywhere</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px;">
      ${phs.map((b, idx) => `
        <div style="display:flex;align-items:center;gap:5px;background:#0A0D14;border:1px solid #1e2430;border-radius:6px;padding:5px 7px;">
          <span style="font-size:10.5px;color:#FB923C;font-weight:700;font-family:'JetBrains Mono',Consolas,monospace;flex-shrink:0;min-width:120px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(b)}">${esc(b)}</span>
          <input id="rec-ph-${idx}" placeholder="value" style="flex:1;background:#161b26;border:1px solid #1e2430;color:#c9d1d9;padding:4px 7px;font-size:11px;border-radius:4px;min-width:0;" onkeydown="if(event.key==='Enter'){recApplyPh_('${esc(b)}', this.value); this.value='';}">
          <button class="btn-ghost" style="background:#161b26;border:1px solid #2d3748;color:#D4A843;padding:3px 8px;font-size:10px;border-radius:4px;font-weight:700;cursor:pointer;" onclick="recApplyPh_('${esc(b)}', document.getElementById('rec-ph-${idx}').value); document.getElementById('rec-ph-${idx}').value='';">\u21B5</button>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// Find-replace a single [BRACKET] across all text fields with the given value.
function recApplyPh_(bracket, value){
  if(!value || !String(value).trim()){ toast('Type a value first', 1); return; }
  const v = String(value).trim();
  let touched = 0;
  REC_PLACEHOLDER_FIELDS.forEach(f => {
    const old = String(S.docRec[f]||'');
    if(old.indexOf(bracket) >= 0){
      S.docRec[f] = old.split(bracket).join(v);
      touched++;
    }
  });
  if(touched > 0){
    toast(`\u2713 Replaced ${bracket} (${touched} field${touched===1?'':'s'})`);
    render();
  } else {
    toast(`${bracket} not found`, 1);
  }
}

// Build the HTML that mirrors what the DOCX/PDF will look like.
// Used both for the live preview pane and for browser-print.
function recBuildPreviewHtml_(d){
  const loanAmt = Number(d.loanAmount) || 0;
  const estVal = Number(d.estimatedValue) || 0;
  const lvr = estVal > 0 ? (loanAmt / estVal * 100) : 0;
  const purposeText = ({purchase:'PURCHASE',refinance:'REFINANCE',cashout:'CASH OUT',construction:'CONSTRUCTION'})[d.loanPurpose] || 'PURCHASE';
  const propTypeText = ({investment:'AN INVESTMENT PROPERTY',owner_occupied:'AN OWNER-OCCUPIED PROPERTY',commercial:'A COMMERCIAL PROPERTY'})[d.propertyType] || 'AN INVESTMENT PROPERTY';
  const loanTypeText = d.loanType === 'pre_approval' ? 'PRE-APPROVAL' : 'APPROVAL';
  const propShort = propTypeText.replace(/^AN? /, '');
  const rateText = d.interestRate ? (String(d.interestRate) + (String(d.interestRate).indexOf('%') < 0 ? '%' : '')) : '';
  const characterDefault = `The client has demonstrated a strong character with no history of repayment issues. The client lives within their means and has been able to save money regularly. The client does not foresee any future changes to their financial position that may affect their ability to repay for the home loan. This shows that the client has good character to repay the mortgage.`;
  const collateralDefault = `Property is in an acceptable postcode and in good condition, with a low LVR lending.`;

  const placeholder = (txt) => `<span class="placeholder">${esc(txt)}</span>`;
  const orPh = (val, ph) => val ? esc(val) : placeholder(ph);

  let html = '';

  // Pre-header
  html += `<p><strong>PLEASE KINDLY READ OUR NOTE IN FULL BEFORE ISSUING CONDITIONS OR CALLING THE BROKER FOR CLARIFICATIONS</strong></p>`;
  html += `<p><strong>FILE OWNER CONTACT DETAIL: ${orPh((d.fileOwner||'').toUpperCase(), 'FILE OWNER NAME')}</strong></p>`;
  html += `<p><strong>MOBILE NUMBER: ${orPh(d.mobileNumber, '04XX XXX XXX')}</strong></p>`;

  // Title
  html += `<h1>${orPh((d.clientName||'').toUpperCase(), 'CLIENT NAME')}</h1>`;

  // Sub-title
  html += `<p class="sub-blue">SEEKING ${loanTypeText} TO ${purposeText} ${propTypeText} AT ${orPh((d.lenderName||'').toUpperCase(), 'LENDER NAME')}</p>`;

  // Loan details
  if(loanAmt > 0 || d.product || rateText){
    html += `<p><strong>LOAN ACCOUNT</strong>: ${loanAmt > 0 ? '$' + loanAmt.toLocaleString('en-US') : placeholder('$XXX,XXX')} ${propShort} ${purposeText}${loanTypeText==='PRE-APPROVAL'?' PRE-APPROVAL':''}</p>`;
    if(d.product) html += `<p><strong>PRODUCT</strong>: ${esc(d.product)}</p>`;
    if(rateText) html += `<p><strong>INTEREST RATE</strong>: ${esc(rateText)}</p>`;
  }

  // Security
  if(d.securityAddress) html += `<p><strong>SECURITY</strong>: ${esc(d.securityAddress)}</p>`;
  if(estVal > 0){
    html += `<p><strong>EST VAL</strong>: $${estVal.toLocaleString('en-US')}</p>`;
    if(loanAmt > 0){
      html += `<p><strong>LVR</strong>: ${lvr.toFixed(2)}% (=$${loanAmt.toLocaleString('en-US')}/$${estVal.toLocaleString('en-US')})</p>`;
    }
  }

  // Policy notes
  if(d.bufferPolicyNote) html += `<p><strong>${esc(d.bufferPolicyNote)}</strong></p>`;
  if(d.separateApplicationNote) html += `<p><em>${esc(d.separateApplicationNote)}</em></p>`;

  // Proposal
  if(d.proposal){
    html += `<p class="sec-label">PROPOSAL:</p>`;
    html += `<p>${esc(d.proposal).replace(/\n/g, '<br>')}</p>`;
  } else {
    html += `<p class="sec-label">PROPOSAL:</p><p>${placeholder('Describe the deal narrative here\u2026')}</p>`;
  }

  // Visa
  if(d.visaStatus){
    html += `<p class="sec-label">VISA:</p>`;
    html += `<p>Client is ${esc(d.visaStatus)}.</p>`;
  }

  // Income
  if(d.incomeDetails){
    html += `<p class="sec-label">INCOME:</p>`;
    html += `<p>${esc(d.incomeDetails).replace(/\n/g, '<br>')}</p>`;
  } else {
    html += `<p class="sec-label">INCOME:</p><p>${placeholder('Income details\u2026')}</p>`;
  }

  // Rental income (optional)
  if(d.rentalIncome){
    html += `<p class="sec-label">RENTAL INCOME:</p>`;
    html += `<p>${esc(d.rentalIncome).replace(/\n/g, '<br>')}</p>`;
  }

  // Character
  html += `<p class="sec-label">CHARACTER:</p>`;
  html += `<p>${esc(d.character || characterDefault).replace(/\n/g, '<br>')}</p>`;

  // Collateral
  html += `<p class="sec-label">COLLATERAL:</p>`;
  html += `<p>${esc(d.collateral || collateralDefault).replace(/\n/g, '<br>')}</p>`;

  // Other debts
  const debts = (d.otherDebts || []).filter(x => x.lenderType || x.balance);
  if(debts.length){
    html += `<p class="sec-label">OTHER DEBTS:</p>`;
    debts.forEach(debt => {
      html += `<p><strong>${esc(debt.lenderType || 'Debt')}:</strong></p>`;
      html += `<ul>`;
      if(debt.balance != null && debt.balance !== '') html += `<li>Balance: $${Number(debt.balance).toLocaleString('en-US')}</li>`;
      if(debt.rate) html += `<li>Rate: ${esc(debt.rate)}${String(debt.rate).indexOf('%') < 0 ? '%' : ''}</li>`;
      if(debt.repayment != null && debt.repayment !== '') html += `<li>Repayment: $${Number(debt.repayment).toLocaleString('en-US')} per ${esc(debt.repayFreq || 'Month')}</li>`;
      if(debt.security) html += `<li>Security: ${esc(debt.security)}</li>`;
      html += `</ul>`;
    });
  }

  // Sign-off
  html += `<p style="margin-top:18px;">Best Regards,</p>`;
  html += `<p><strong>${orPh((d.fileOwner||'').toUpperCase(), 'FILE OWNER NAME')}</strong></p>`;
  html += `<p>Finance Broker</p>`;
  html += `<p><strong>M: ${orPh(d.mobileNumber, '04XX XXX XXX')}</strong></p>`;
  html += `<p><strong>E: ${orPh(d.brokerEmail, 'broker@example.com')}</strong></p>`;

  return html;
}

// Insert a snippet text into the named field, replacing existing content if any

function recInsertSnippet_(fieldName, snippetId){

  if(!snip) return;

// Generate template content based on current form state.
// Picks the right scenario from loanType + loanPurpose + propertyType, then
// resolves placeholders like [LENDER], [ADDRESS], [LOAN_AMOUNT] from form data.
// Lender / product / rate / amounts / case-specific fields are NOT touched.
function recGenerateTemplate_(){
  const d = S.docRec;

  // 1. Pick scenario from current loan setup
  let scenarioId;
  if(d.loanType === 'pre_approval'){
    scenarioId = (d.propertyType === 'investment') ? 'aip_inv' : 'aip_oo';
  } else if(d.loanPurpose === 'construction'){
    scenarioId = 'construction';
  } else if(d.loanPurpose === 'cashout'){
    scenarioId = 'refi_cashout';
  } else if(d.loanPurpose === 'refinance'){
    scenarioId = 'refi_rate';
  } else {
    // approval + purchase
    scenarioId = (d.propertyType === 'investment') ? 'full_inv' : 'full_oo';
  }
  const sc = REC_SCENARIOS.find(s => s.id === scenarioId);
  if(!sc) { toast('No matching template', 1); return; }

  // 2. Resolve [PLACEHOLDERS] from form/case data
  const loanAmt = Number(d.loanAmount) || 0;
  const estVal = Number(d.estimatedValue) || 0;
  const replacements = {
    '[LENDER]': d.lenderName || '[LENDER]',
    '[ADDRESS]': d.securityAddress || '[ADDRESS]',
    '[PURCHASE_PRICE]': loanAmt > 0 ? '$' + loanAmt.toLocaleString('en-AU') : '[PURCHASE_PRICE]',
    '[BALANCE]': loanAmt > 0 ? '$' + loanAmt.toLocaleString('en-AU') : '[BALANCE]',
    '[CASHOUT_AMOUNT]': '[CASHOUT_AMOUNT]',  // broker fills \u2014 different from loan amt
    '[CLIENT_NAME]': d.clientName || '[CLIENT_NAME]',
  };
  const resolve = (txt) => {
    if(typeof txt !== 'string') return txt;
    let out = txt;
    Object.keys(replacements).forEach(ph => {
      out = out.split(ph).join(replacements[ph]);
    });
    return out;
  };

  // 3. Build target fields \u2014 only template text, leave structural fields alone
  // (loanType/loanPurpose/propertyType already set by the broker before clicking)
  const targets = {
    bufferPolicyNote: resolve(sc.apply.bufferPolicyNote || ''),
    separateApplicationNote: resolve(sc.apply.separateApplicationNote || ''),
    proposal: resolve(sc.apply.proposal || ''),
    rentalIncome: resolve(sc.apply.rentalIncome || ''),
  };

  // 4. Check overwrite \u2014 count fields that already have content AND would change
  const overwriteList = [];
  const fieldLabels = {
    bufferPolicyNote:'Policy note',
    separateApplicationNote:'Separate-app note',
    proposal:'Proposal',
    rentalIncome:'Rental income',
  };
  Object.keys(targets).forEach(k => {
    const existing = String(d[k]||'').trim();
    const incoming = String(targets[k]||'').trim();
    if(existing && incoming && existing !== incoming){
      overwriteList.push(fieldLabels[k]);
    }
  });
  if(overwriteList.length >= 2){
    if(!confirm(`Generate template \u2014 overwrite these fields?\n\u2022 ${overwriteList.join('\n\u2022 ')}\n\nContinue?`)) return;
  }

  // 5. Apply
  Object.keys(targets).forEach(k => {
    if(targets[k]) S.docRec[k] = targets[k];
  });
  render();
  toast(`\u2713 Template generated \u00B7 ${sc.name}`);
}

function recCaseLink_(caseId){
  S.docRec.caseId = caseId;
  if(caseId){
    const c = S.cases.find(x => x.id === caseId);
    if(c){
      // 1. Try restore saved draft first \u2014 preserves everything broker typed before
      const restored = _loadRecFromCase(c);
      if(!restored){
        // 2. No saved draft \u2014 pull case-derived defaults
        S.docRec.clientName = c.clientName || '';
        if(c.loanAmount) S.docRec.loanAmount = c.loanAmount;
        if(c.lenderName) S.docRec.lenderName = c.lenderName;
        if(c.propertyAddress) S.docRec.securityAddress = c.propertyAddress;
        if(c.stage === 'pre_approval' || c.stage === 'new_enquiry' || c.stage === 'fact_find') {
          S.docRec.loanType = 'pre_approval';
        } else {
          S.docRec.loanType = 'approval';
        }
        const lp = String(c.loanPurpose||'').toLowerCase();
        if(lp.includes('refinanc')) S.docRec.loanPurpose = 'refinance';
        else if(lp.includes('cash')) S.docRec.loanPurpose = 'cashout';
        else if(lp.includes('construct')) S.docRec.loanPurpose = 'construction';
        else if(lp.includes('purchas')) S.docRec.loanPurpose = 'purchase';
        // Auto-derive propertyType (OOC vs INV) from case loan purpose.
        // This is THE critical mapping \u2014 without it, OOC cases get INV templates
        // and vice versa (which is the "\u0111ang b\u1ECB nh\u1EA7m" bug).
        if(lp.includes('owner occupied') || lp.includes('ppor') || lp.includes('owner-occupied')) {
          S.docRec.propertyType = 'owner_occupied';
        } else if(lp.includes('investment') || lp.includes('inv ') || /\binv\b/.test(lp)) {
          S.docRec.propertyType = 'investment';
        } else if(lp.includes('commercial')) {
          S.docRec.propertyType = 'commercial';
        } else if(lp.includes('smsf')) {
          // SMSF is typically investment via super fund
          S.docRec.propertyType = 'investment';
        }
        // 3. Now that propertyType + lender are set from case, auto-apply
        //    lender-specific quirks (Pepper INV buffer, etc.) so the broker
        //    starts with sensible defaults instead of a blank policy note.
        if(typeof _recOnLenderChange === 'function') _recOnLenderChange();
      }
    }
  }
  render();
}

async function recNotesGenerate_(format){
  const d = S.docRec;
  if(!d.clientName) { toast('Client name is required', 1); return; }
  if(!d.lenderName) { toast('Lender is required', 1); return; }
  if(!Number(d.loanAmount)) { toast('Loan amount is required', 1); return; }
  if(!d.proposal || !d.proposal.trim()) { toast('Proposal narrative is required', 1); return; }

  const payload = JSON.parse(JSON.stringify(d));
  payload.loanAmount = Number(payload.loanAmount) || 0;
  payload.estimatedValue = Number(payload.estimatedValue) || 0;
  payload.otherDebts = (payload.otherDebts || []).map(x => ({
    lenderType: x.lenderType||'',
    balance: Number(x.balance) || 0,
    repayment: Number(x.repayment) || 0,
    repayFreq: x.repayFreq || 'Month',
    rate: x.rate || '',
    security: x.security || '',
    action: x.action || '',
  })).filter(x => x.lenderType || x.balance);

  showLoad();
  const r = await gs_('generateRecommendationNotes', S.tok, payload, format);
  hideLoad();

  if(r && r.ok && r.data && r.data.base64){
    triggerBase64Download_(r.data.base64, r.data.filename, r.data.mime);
    toast(`\u2713 Recommendation Notes ${format.toUpperCase()} downloaded`);
  } else {
    toast((r && r.msg) || 'Failed to generate file', 1);
  }
}

async function toggleChecklistItem(cid, stageId, itemId, done){
  // Optimistic local update
  const c = S.cases.find(x=>x.id===cid);
  if(!c) return;
  let progress = {};
  try { progress = JSON.parse(c.checklist || '{}'); } catch(e) { progress = {}; }
  if(!progress[stageId]) progress[stageId] = [];
  const arr = progress[stageId];
  const idx = arr.indexOf(itemId);
  if(done && idx<0) arr.push(itemId);
  else if(!done && idx>=0) arr.splice(idx,1);
  progress[stageId] = arr;
  c.checklist = JSON.stringify(progress);
  pr();  // re-render modal
  // Persist async
  const r = await gs_('updateCaseChecklist', S.tok, cid, stageId, itemId, done, S.user.name);
  if(!r||!r.ok){
    toast((r&&r.msg)||'Save failed \u2014 please refresh',1);
  }
}

    {id:'lender_chase', label:'\uD83C\uDFE6 Chase lender', text:'Follow up with lender for status update', priority:'Medium', dueAt:inDays(2)},

      const overdue = t.dueDate && !isTrue(t.done) && new Date(t.dueDate).getTime() < Date.now();

      return`<div class="task-r" style="${overdue?'border-left:3px solid #DC2626;background:rgba(220,38,38,.04);':''}">

          <div style="font-size:13px;color:${isTrue(t.done)?'#4a5568':'#c9d1d9'};text-decoration:${isTrue(t.done)?'line-through':'none'};display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            ${isTrue(t.isEmailTask)?(isTrue(t.emailSent)?`<span class="sent-badge">\u2713 Email Sent</span>`:`<span class="pending-badge">\u2709 Send Email</span>`):''}
            ${t.priority&&t.priority!=='Medium'?`<span style="font-size:9px;font-weight:700;color:${prioColor};background:${prioColor}22;padding:1px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;">${esc(t.priority)}</span>`:''}
            ${esc(t.text)}
          </div>
          <div style="font-size:11px;color:${overdue?'#DC2626':'#4a5568'};margin-top:3px;font-weight:${overdue?600:400};">

      <div style="font-size:11px;color:#D4A843;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px;">+ Add task</div>

      <input class="fi" id="ntask" value="${esc(draft.text||'')}" oninput="S.taskDraft={...(S.taskDraft||{}),text:this.value}" placeholder="Task description\u2026" style="margin-bottom:7px;">

      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end;">
        <div style="flex:1;min-width:120px;">
          <div style="font-size:10px;color:#6b7280;margin-bottom:3px;">Priority</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap;">
            ${['Low','Medium','High','Urgent'].map(p=>{

              const sel = dPrio===p;
              return`<button class="btn-ghost" style="font-size:11px;padding:5px 10px;border:1px solid ${sel?c2:'#2d3748'};background:${sel?c2+'22':'transparent'};color:${sel?c2:'#8b949e'};border-radius:6px;font-weight:${sel?700:400};" onclick="setTaskDraftPriority('${p}')">${p}</button>`;

function setTaskDraftPriority(p){
  S.taskDraft={...(S.taskDraft||{}),priority:p};
  // Auto-set due date 24h if Urgent and no due was chosen
  if(p==='Urgent' && !S.taskDraft.dueDate){
    const d=new Date(); d.setHours(d.getHours()+24);
    S.taskDraft.dueDate = d.toISOString().slice(0,10);
  }
  pr();
}
function setTaskDraftDue(date){
  S.taskDraft={...(S.taskDraft||{}),dueDate:date};
  pr();
}
function applyTaskPreset(id, text, priority, dueAt){
  S.taskDraft={text, priority, dueAt, dueDate: dueAt, assignedTo: (S.taskDraft||{}).assignedTo || (S.user.id+'|'+S.user.name)};
  pr();
  // Focus input so user can edit text immediately
  setTimeout(()=>{ const el=document.getElementById('ntask'); if(el){el.focus();el.select();} },50);
}

function copyEmail_(stage){
  const c=getCase();const tpl=S.emailTpls[stage]||{subject:'',body:''};
  const vars=_emailVars(c);
  const txt=`Subject: ${fillTpl(tpl.subject,vars)}\n\n${fillTpl(tpl.body,vars)}`;
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>toast('\u2713 Copied!')).catch(()=>toast('Copy failed',1));
}
async function sendEmail_(stage, caseIdOverride){
  const c = caseIdOverride ? S.cases.find(x=>x.id===caseIdOverride) : getCase();
  if(!c||!c.email){toast('No client email address',1);return;}
  const fromAddr=S.companyInfo?.emailFromAddress||S.companyInfo?.email||'company email';
  if(!confirm(`Send "${gs(stage).label}" email to ${c.email} from ${fromAddr}?\n(Replies go to your personal email: ${S.user.email||'[not set]'})`))return;
  const tpl=S.emailTpls[stage]||{subject:'',body:''};
  const vars=_emailVars(c);
  showLoad();
  const r=await gs_('sendEmailGmail',S.tok,c.email,fillTpl(tpl.subject,vars),fillTpl(tpl.body,vars),c.id,stage);
  hideLoad();
  if(r&&r.ok){
    toast('\u2713 Sent to '+c.email);
    S.emailLog[c.id]=(cElog(c.id)).concat([{caseId:c.id,stage,sentByName:S.user.name,sentAt:new Date().toISOString()}]);
    const tr=await gs_('getTasks',S.tok);
    if(tr&&tr.ok)S.tasks=tr.data||[];
    if(S.modal==='case'||S.modal==='emailPreview'){S.modal='case';S.caseTab='email';pr();}
    else render();
  } else toast((r&&r.msg)||'Send failed',1);
}

function autofillLoanFromCase(cid){
  if(!cid)return;
  const c=S.cases.find(x=>x.id===cid);
  if(!c)return;
  const force=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  // Overwrite always \u2014 user explicitly picked a case
  // If case has 2 borrowers, combine names. Loan record stores both as "Name1 & Name2"
  // to match how the lender names the joint borrowers on the loan documents.
  const combinedName = c.clientName2
    ? (c.clientName || '') + ' & ' + c.clientName2
    : (c.clientName || '');
  force('lb-cn', combinedName);
  // Show hint under client field if there are 2 borrowers
  const hintEl = document.getElementById('lb-cn-hint');
  if(hintEl){
    if(c.clientName2){
      hintEl.innerHTML = `Joint borrowers: <strong style="color:#D4A843;">${esc(c.clientName)}</strong> + <strong style="color:#D4A843;">${esc(c.clientName2)}</strong>`;
    } else {
      hintEl.textContent = '';
    }
  }
  force('lb-ln',c.lenderName||'');
  force('lb-la',Number(c.loanAmount||0).toLocaleString('en-AU'));
  if(c.settlementDate) force('lb-sd',c.settlementDate);
  setTimeout(attachAllMoneyInputs,0);
  previewAddLoanCalcs();
  toast('\u2713 Auto-filled from '+c.id+(c.clientName2?' \u2014 joint borrowers merged':' \u2014 edit any field'));
}
function previewAddLoanCalcs(){

  const up=Math.round(la*ur/100);
  const tm=Math.round(la*tr/100/12);
  const el=document.getElementById('lb-calc-preview');

// Toggle GST mode pills on Add Commission modal.
//   'ex'  \u2192 amount is base commission (lender adds 10% on top \u2014 AU default)
//   'inc' \u2192 amount already includes GST (the figure that hits the bank)
function _cmSetGst(mode){
  const hid = document.getElementById('cm-gst-mode');
  if(hid) hid.value = mode;
  const ex = document.getElementById('cm-gst-ex');
  const inc = document.getElementById('cm-gst-inc');
  if(ex){
    ex.style.cssText = 'border-radius:5px;font-size:11px;padding:5px 11px;' + (mode==='ex'
      ? 'background:#D4A84318;color:#D4A843;border-color:#D4A84355;font-weight:700;'
      : 'color:#6b7280;border:1px solid transparent;');
  }
  if(inc){
    inc.style.cssText = 'border-radius:5px;font-size:11px;padding:5px 11px;' + (mode==='inc'
      ? 'background:#D4A84318;color:#D4A843;border-color:#D4A84355;font-weight:700;'
      : 'color:#6b7280;border:1px solid transparent;');
  }
  _cmGstHint();
}

// Live GST display under the amount field \u2014 shows the OTHER side so the broker
// can sanity-check the figure they typed.
function _cmGstHint(){
  const el = document.getElementById('cm-am');
  const hint = document.getElementById('cm-gst-hint');
  const modeEl = document.getElementById('cm-gst-mode');
  if(!el || !hint) return;
  const amt = Math.abs(unfmtMoney(el.value) || 0);
  const mode = (modeEl && modeEl.value) || 'ex';
  if(amt <= 0){ hint.textContent = ''; return; }
  if(mode === 'ex'){
    const gst = amt * 0.10;
    const total = amt * 1.10;
    hint.innerHTML = `Base ${fmtCur(amt)} + GST ${fmtCur(gst)} = <strong>${fmtCur(total)}</strong> total (what lender pays)`;
  } else {
    const gst = amt / 11;
    const net = amt - gst;
    hint.innerHTML = `Net ${fmtCur(net)} + GST ${fmtCur(gst)} = <strong>${fmtCur(amt)}</strong> (already inc GST)`;
  }
}

function suggestCommAmount(){
  const typeEl=document.getElementById('cm-tp');
  const loanEl=document.getElementById('cm-li');
  const amtEl=document.getElementById('cm-am');
  const hintEl=document.getElementById('cm-am-hint');
  if(!typeEl||!amtEl)return;
  const type=typeEl.value;
  const lid=loanEl?loanEl.value:'';
  if(!lid){if(hintEl)hintEl.textContent='';return;}
  const l=S.loanBook.find(x=>x.id===lid);
  if(!l){if(hintEl)hintEl.textContent='';return;}
  if(type==='Upfront'){
    amtEl.value=l.upfrontAmount?Number(l.upfrontAmount).toLocaleString('en-AU'):'';
    if(hintEl)hintEl.textContent=`${l.upfrontRate}% \u00D7 ${fmtCur(l.loanAmount)} (editable if the company takes a share)`;
  } else if(type==='Trail'){
    amtEl.value=l.trailMonthly?Number(l.trailMonthly).toLocaleString('en-AU'):'';
    if(hintEl)hintEl.textContent=`Monthly: ${l.trailRate}% p.a. \u00F7 12 \u00D7 ${fmtCur(l.loanAmount)} (editable if the company takes a share)`;
  } else if(type==='Clawback'){
    amtEl.value=l.upfrontAmount?'-'+Number(l.upfrontAmount).toLocaleString('en-AU'):'';
    if(hintEl)hintEl.textContent=`Full 100% clawback of ${fmtCur(l.upfrontAmount||0)}. Use the \u21BA button in the table for timing-based calc.`;
  } else if(type==='Bonus'){
    amtEl.value='';
    if(hintEl)hintEl.textContent='Enter bonus amount manually';
  }
  setTimeout(attachAllMoneyInputs,0);
}

function rClawback(){
  const orig=S.commissions.find(x=>x.id===S.clawbackOrigId);
  if(!orig){closeModal();return '';}
  // Try to find settlement date via loan book first, then case
  let settlementDate='',daysSince=0,suggestedPct=0,settledFrom='';
  if(orig.loanId){
    const l=S.loanBook.find(x=>x.id===orig.loanId);
    if(l&&l.settlementDate){settlementDate=l.settlementDate;settledFrom='loan book ('+orig.loanId+')';}
  }
  if(!settlementDate&&orig.caseId){
    const c=S.cases.find(x=>x.id===orig.caseId);
    if(c&&c.settlementDate){settlementDate=c.settlementDate;settledFrom='case ('+orig.caseId+')';}
  }
  if(settlementDate){
    const settled=new Date(settlementDate);
    const now=new Date();
    daysSince=Math.floor((now-settled)/(1000*60*60*24));
    if(daysSince<365)suggestedPct=100;
    else if(daysSince<548)suggestedPct=50; // 18 months ~ 548 days
    else suggestedPct=0;
  }
  const origAmt=Math.abs(Number(orig.amount||0));
  const suggestedAmt=Math.round(origAmt*suggestedPct/100);
  const timingColor=daysSince<365?'#ef4444':daysSince<548?'#FB923C':'#34D399';
  const timingLabel=daysSince<365?'Less than 12 months':daysSince<548?'12 \u2013 18 months':'Over 18 months';
  return`<div class="m-ct">
    <div class="m-box" style="max-width:540px;">
      <div style="padding:16px 20px;border-bottom:1px solid #1e2430;display:flex;justify-content:space-between;flex-shrink:0;background:rgba(239,68,68,.06);">

function openClawback(cid){S.clawbackOrigId=cid;openModal('clawback');}
function updateClawbackAmount(){
  const orig=S.commissions.find(x=>x.id===S.clawbackOrigId);
  if(!orig)return;
  const origAmt=Math.abs(Number(orig.amount||0));
  const pct=parseFloat(document.getElementById('cb-pct').value)||0;
  document.getElementById('cb-amt').value=Math.round(origAmt*pct/100);
}
async function processClawback_(){
  const orig=S.commissions.find(x=>x.id===S.clawbackOrigId);
  if(!orig)return;
  const pct=parseFloat(document.getElementById('cb-pct').value)||0;
  const amt=parseFloat(document.getElementById('cb-amt').value)||0;
  const rsn=document.getElementById('cb-rsn').value;
  const note=document.getElementById('cb-note').value;
  if(amt<=0){toast('Clawback amount must be > 0',1);return;}
  if(!confirm(`Create clawback of ${fmtCur(amt)} (${pct}%)?\n\nThis will:\n\u2022 Add a new Commission entry with -${fmtCur(amt)}\n\u2022 Mark ${orig.id} as "Clawback"\n\u2022 Affect your net received total`))return;
  const d={
    brokerId:`${orig.brokerId}|${orig.brokerName}`,
    clientName:orig.clientName,
    type:'Clawback',
    amount:-Math.abs(amt),
    status:'Received',
    receivedDate:new Date().toISOString().split('T')[0],
    loanId:orig.loanId||'',
    caseId:orig.caseId||'',
    notes:`${pct}% clawback of ${orig.id} \u00B7 ${rsn}${note?' \u2014 '+note:''}`
  };
  showLoad();
  const r=await gs_('addCommission',S.tok,d);
  if(!r||!r.ok){hideLoad();toast((r&&r.msg)||'Failed to create clawback entry',1);return;}
  S.commissions.push(r.data);
  const r2=await gs_('updateCommission',S.tok,orig.id,{status:'Clawback'});
  hideLoad();
  if(r2&&r2.ok){
    S.commissions=S.commissions.map(c=>c.id===orig.id?{...c,status:'Clawback'}:c);
    toast('\u2713 Clawback processed: '+r.data.id);
    closeModal();render();
  } else {
    toast('Clawback entry created but failed to update original status',1);
    closeModal();render();
  }
}

async function requestCommEdit_(commId){
  const reason = prompt(
    'Request edit access \u00B7 Locked commission\n\n' +
    'Briefly explain why you need to edit this record:\n' +
    '(e.g. "Wrong amount \u2014 bank actually paid $1,750", "GST mode entered incorrectly")\n\n' +
    'Admin will see your request in their bell and approve/reject.',
    ''
  );
  if(reason === null) return;
  if(!reason || reason.trim().length < 5){
    toast('Please give a brief reason (5+ chars)', 1);
    return;
  }
  showLoad();
  const r = await gs_('requestCommEdit', S.tok, commId, reason.trim());
  hideLoad();
  if(r && r.ok){
    toast('\u2713 Edit request sent to admin');
    closeModal();
    // Refresh commissions so the modal next time shows pending state
    const cr = await gs_('getCommissions', S.tok);
    if(cr && cr.ok) S.commissions = cr.data || [];
    render();
  } else toast((r && r.msg) || 'Failed', 1);
}

async function approveCommEdit_(commId){
  if(!confirm('Approve edit access?\n\nThe broker will get one-time permission to edit this record. Permission auto-clears after they save once.')) return;
  showLoad();
  const r = await gs_('approveCommEdit', S.tok, commId);
  hideLoad();
  if(r && r.ok){
    const cr = await gs_('getCommissions', S.tok);
    if(cr && cr.ok) S.commissions = cr.data || [];
    toast(`\u2713 Edit access granted to ${(r.data && r.data.brokerName) || 'broker'}`);
    closeModal(); render();
  } else toast((r && r.msg) || 'Failed', 1);
}

async function rejectCommEdit_(commId){
  const note = prompt('Reject edit request \u2014 optional note (broker won\'t see this, but logged):', '');
  if(note === null) return;
  showLoad();
  const r = await gs_('rejectCommEdit', S.tok, commId, note);
  hideLoad();
  if(r && r.ok){
    const cr = await gs_('getCommissions', S.tok);
    if(cr && cr.ok) S.commissions = cr.data || [];
    toast('\u2717 Edit request rejected');
    closeModal(); render();
  } else toast((r && r.msg) || 'Failed', 1);
}

// Live GST sanity-check hint under the amount field in the edit modal.
// Shows BOTH interpretations so the broker can spot if a number looks wrong
// (e.g. amount entered with GST when it should be ex-GST).
function _ecGstHint(){
  const el = document.getElementById('ec-am');
  const hint = document.getElementById('ec-gst-hint');
  if(!el || !hint) return;
  const amt = Math.abs(unfmtMoney(el.value) || 0);
  if(amt <= 0){ hint.textContent = ''; return; }
  const gstEx = amt * 0.10;
  const incTotal = amt * 1.10;
  const gstInc = amt / 11;
  const net = amt - gstInc;
  hint.innerHTML = `If <strong>ex-GST</strong>: +${fmtCur(gstEx)} GST \u2192 ${fmtCur(incTotal)} total \u00B7 If <strong>inc-GST</strong>: ${fmtCur(gstInc)} GST (net ${fmtCur(net)})`;
}
async function saveCommEdit_(){
  const c=S.commissions.find(x=>x.id===S.editingCommId);
  if(!c)return;
  const g=(id)=>{const e=document.getElementById(id);return e?e.value:'';};
  const changes={
    clientName:g('ec-cn'),
    type:g('ec-tp'),
    amount:unfmtMoney(g('ec-am')),
    status:g('ec-st'),
    receivedDate:g('ec-rd'),
    period:g('ec-pd'),
    invoiceNumber:g('ec-in'),
    loanId:g('ec-li'),
    caseId:g('ec-ci'),
    notes:g('ec-no'),
  };
  // Admin can reassign broker
  const bkEl=document.getElementById('ec-bk');
  if(bkEl && bkEl.value){
    const parts=bkEl.value.split('|');
    changes.brokerId=parts[0];
    changes.brokerName=parts[1]||'';
  }
  showLoad();
  const r=await gs_('updateCommission',S.tok,S.editingCommId,changes);
  hideLoad();
  if(r&&r.ok){
    S.commissions=S.commissions.map(x=>x.id===S.editingCommId?{...x,...changes}:x);
    toast('\u2713 Commission updated');
    closeModal();render();
  } else toast((r&&r.msg)||'Failed',1);
}

  if (!needsNotes && !needsEmail) return;  // cached \u2192 no network call needed
  const promises = [];
  if (needsNotes) promises.push(gs_('getNotes',S.tok,id).then(r=>{ if(r&&r.ok) S.notes[id]=r.data||[]; }));
  if (needsEmail) promises.push(gs_('getEmailLog',S.tok,id).then(r=>{ if(r&&r.ok) S.emailLog[id]=r.data||[]; }));
  await Promise.all(promises);
  // Only repaint after the fetch if the visible tab actually shows notes/email,
  // so opening straight to Tasks/Checklist doesn't flash a second time.
  var needsRepaint = (S.caseTab==='overview'||S.caseTab==='email'||S.caseTab==='emails');
  if(S.modal==='case' && S.selId===id && needsRepaint) pr();
}

async function saveComm_(){
  const cn=document.getElementById('cm-cn')?.value?.trim();
  const amRaw=document.getElementById('cm-am')?.value;
  let am=unfmtMoney(amRaw);
  if(!cn||amRaw===''||amRaw===undefined){toast('Client and amount required',1);return;}
  // Normalize amount to ex-GST (base commission) regardless of input mode.
  // The app stores ex-GST consistently \u2014 export GST mode is just a display
  // preference. If broker entered "inc GST", strip the 10% out.
  const gstMode = document.getElementById('cm-gst-mode')?.value || 'ex';
  let normalizedNote = '';
  if(gstMode === 'inc' && am !== 0){
    const exGst = am * 10 / 11;
    // Round to 2dp to avoid float weirdness
    am = Math.round(exGst * 100) / 100;
    normalizedNote = ` [Entered as inc-GST ${fmtCur(unfmtMoney(amRaw))}, stored ex-GST]`;
  }
  // If loan linked, derive caseId from loan; otherwise use case dropdown
  const lid=document.getElementById('cm-li')?.value||'';
  let cid=document.getElementById('cm-ci')?.value||'';
  if(lid){
    const l=S.loanBook.find(x=>x.id===lid);
    if(l&&l.caseId)cid=l.caseId;
  }
  const userNotes = document.getElementById('cm-no')?.value || '';
  const d={
    brokerId:document.getElementById('cm-bk')?.value||`${S.user.id}|${S.user.name}`,
    clientName:cn,
    type:document.getElementById('cm-tp')?.value||'Upfront',
    amount:am,
    status:document.getElementById('cm-st')?.value||'Pending',
    receivedDate:document.getElementById('cm-rd')?.value||'',
    period:document.getElementById('cm-pd')?.value||'',
    invoiceNumber:document.getElementById('cm-in')?.value||'',
    loanId:lid,
    caseId:cid,
    notes: userNotes + normalizedNote,
  };
  showLoad();
  let r = await gs_('addCommission', S.tok, d);
  hideLoad();
  // Duplicate detected \u2014 ask user to confirm
  if(r && !r.ok && r.duplicate){
    const existing = r.existing || {};
    const proceed = confirm(
      '\u26A0 Possible duplicate detected\n\n' +
      (r.msg || 'A similar commission entry already exists.') + '\n\n' +
      'Existing entry:\n' +
      '  ID: ' + (existing.id || '?') + '\n' +
      '  Type: ' + (existing.type || '?') + '\n' +
      '  Amount: ' + fmtCur(existing.amount || 0) + '\n' +
      '  Status: ' + (existing.status || '?') + '\n' +
      '  Period: ' + (existing.period || '\u2014') + '\n\n' +
      'Add anyway (creates a duplicate)?\n' +
      'Cancel to keep only the existing entry.'
    );
    if(!proceed){
      // If user wants to edit the existing one instead, surface it
      if(existing.id){
        toast('Opening existing entry \u2014 edit it instead of duplicating');
        // Refresh + open existing
        const cr = await gs_('getCommissions', S.tok);
        if(cr && cr.ok) S.commissions = cr.data || [];
        S.editingCommId = existing.id;
        openModal('editComm');
        return;
      }
      return;
    }
    // User confirmed \u2014 force insert
    d.forceDuplicate = true;
    showLoad();
    r = await gs_('addCommission', S.tok, d);
    hideLoad();
  }
  if(r&&r.ok){S.commissions.push(r.data);toast('\u2713 Commission added: '+r.data.id);closeModal();render();}
  else toast((r&&r.msg)||'Failed',1);
}

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  INVOICES                                       \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
// \u2500\u2500 Billing Tracker \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Computes, per active loan, the billing status of upfront + each trail month:
//   \u00B7 invoiced  \u2192 has invoiceNumber stamped
//   \u00B7 ready     \u2192 Received but not invoiced (billable now)
//   \u00B7 pending   \u2192 expected but lender hasn't paid
//   \u00B7 missing   \u2192 month elapsed but no commission record exists yet
// Gives a clear "what's owed / what to bill / what to chase" picture.
function _billingAnalysis(){
  const scope = _commScope();
  const comms = scope.commissions || [];
  const loans = (S.loanBook||[]).filter(l => S.user.role==='admin' ? true : l.brokerId===S.user.id);
  // Index commissions by loanId
  const byLoan = {};
  comms.forEach(c => {
    if(!c.loanId) return;
    (byLoan[c.loanId] = byLoan[c.loanId] || []).push(c);
  });
  const now = new Date();
  const loanRows = [];
  let readyCount=0, pendingCount=0, missingCount=0, readyAmt=0;
  loans.forEach(l => {
    const lc = byLoan[l.id] || [];
    // Invoice coverage \u2014 what periods/types are already on an invoice for this loan
    const cov = _invoiceCoverageForLoan(l);
    // Upfront status
    const upfront = lc.find(c => c.type==='Upfront');
    let upStatus = 'missing';
    let upRef = '';
    if(upfront && upfront.invoiceNumber){ upStatus='invoiced'; upRef=upfront.invoiceNumber; }
    else if(cov.upfront){ upStatus='invoiced'; upRef=cov.upfrontRef; }  // covered by an invoice line
    else if(upfront){
      upStatus = String(upfront.status||'').toLowerCase()==='received' ? 'ready' : 'pending';
    }
    // Trail months from settlement+1 to current
    const months = _trailMonthsSinceSettlement(l.settlementDate);
    const trailRows = months.map(mo => {
      const c = lc.find(x => x.type==='Trail' && _periodKeyLocal(x.period)===mo.key);
      let st = 'missing', ref='';
      if(c && c.invoiceNumber){ st='invoiced'; ref=c.invoiceNumber; }
      else if(cov.trailPeriods[mo.key]){ st='invoiced'; ref=cov.trailPeriods[mo.key]; }  // invoice covers it
      else if(c){
        st = String(c.status||'').toLowerCase()==='received' ? 'ready' : 'pending';
      }
      return { ...mo, status: st, comm: c, ref };
    });
    if(upStatus==='ready'){ readyCount++; readyAmt += Number(upfront.amount)||0; }
    if(upStatus==='pending') pendingCount++;
    if(upStatus==='missing') missingCount++;
    trailRows.forEach(t => {
      if(t.status==='ready'){ readyCount++; readyAmt += Number(t.comm.amount)||0; }
      if(t.status==='pending') pendingCount++;
      if(t.status==='missing') missingCount++;
    });
    loanRows.push({ loan: l, upfront, upStatus, upRef, trailRows });
  });
  return { loanRows, readyCount, pendingCount, missingCount, readyAmt };
}

// Scan all invoices for line items belonging to this loan (by source = loanId or
// caseId) and return what's covered: upfront flag + set of trail period keys.
// This makes the tracker honour invoices that were built without stamped
// commission records (e.g. a manual multi-month trail invoice).
function _invoiceCoverageForLoan(loan){
  const out = { upfront:false, upfrontRef:'', trailPeriods:{} };
  const matchSrc = (src) => src && (src===loan.id || (loan.caseId && src===loan.caseId));
  (S.invoices||[]).forEach(iv => {
    let items = iv.items;
    if(typeof items === 'string'){ try { items = JSON.parse(items); } catch(e){ items = []; } }
    if(!Array.isArray(items)) return;
    items.forEach(it => {
      // Match by explicit commId's loan, or by source field, or by desc mentioning the loan/case id
      const srcMatch = matchSrc(it.source);
      const descHasId = it.desc && (it.desc.includes(loan.id) || (loan.caseId && it.desc.includes(loan.caseId)));
      // Also match by client name as a fallback (covers manual invoices)
      const descHasName = it.desc && loan.clientName && it.desc.toLowerCase().includes(String(loan.clientName).toLowerCase().split(' & ')[0].toLowerCase());
      if(!srcMatch && !descHasId && !descHasName) return;
      const d = String(it.desc||'').toLowerCase();
      if(d.includes('upfront')){ out.upfront = true; out.upfrontRef = iv.ref||''; }
      if(d.includes('trail')){
        // Extract period from desc (after "\u00B7 ") e.g. "...\u00B7 May 2026"
        const pk = _extractPeriodKeyFromDesc(it.desc);
        if(pk) out.trailPeriods[pk] = iv.ref||'';
      }
    });
  });
  return out;
}

// Pull a "YYYY-MM" key out of an invoice line description like "... \u00B7 May 2026"
function _extractPeriodKeyFromDesc(desc){
  if(!desc) return '';
  const m = /\u00B7\s*([A-Za-z]{3,9})\s+(\d{4})/.exec(String(desc));
  if(!m) return '';
  const mn=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const mi=mn.indexOf(m[1].toLowerCase().slice(0,3));
  if(mi<0) return '';
  return `${m[2]}-${String(mi+1).padStart(2,'0')}`;
}

function _periodKeyLocal(periodStr){
  if(!periodStr) return '';
  const t = String(periodStr).trim();
  let m = /^(\d{4})-(\d{2})/.exec(t);
  if(m) return `${m[1]}-${m[2]}`;
  m = /^([A-Za-z]{3,9})\s+(\d{4})$/.exec(t);
  if(m){
    const mn=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const mi=mn.indexOf(m[1].toLowerCase().slice(0,3));
    if(mi>=0) return `${m[2]}-${String(mi+1).padStart(2,'0')}`;
  }
  return '';
}

// Generate missing trail commission records for one loan (Pending status)
async function _generateMissingTrailForLoan(loanId){
  const l=S.loanBook.find(x=>x.id===loanId);
  if(!l){toast('Loan not found',1);return;}
  const months=_trailMonthsSinceSettlement(l.settlementDate);
  const scope=_commScope();
  const existing=(scope.commissions||[]).filter(c=>c.loanId===loanId&&c.type==='Trail').map(c=>_periodKeyLocal(c.period));
  const missing=months.filter(m=>!existing.includes(m.key));
  if(missing.length===0){toast('No missing months');return;}
  if(!confirm(`Generate ${missing.length} missing trail record(s) for ${l.clientName}?\n\nEach will be created as Pending with amount = ${fmtCur(l.trailMonthly||0)}/month. Mark them Received once the lender pays.`))return;
  showLoad();
  let created=0;
  for(const m of missing){
    const r=await gs_('addCommission',S.tok,{
      loanId:l.id, caseId:l.caseId||'', clientName:l.clientName||'',
      type:'Trail', amount:Number(l.trailMonthly)||0,
      period:m.label, status:'Pending', expectedDate:'',
    });
    if(r&&r.ok)created++;
  }
  hideLoad();
  const cr=await gs_('getCommissions',S.tok);
  if(cr&&cr.ok)S.commissions=cr.data||[];
  toast(`\u2713 Created ${created} trail record(s)`);
  render();
}

// Auto-create draft invoices from all ready-to-invoice commissions, grouped by broker+type
function _billNoReady(){ toast('No received commissions to invoice yet - import a statement and Sync to Commissions first',1); }
async function _generateInvoicesFromReady(){
  const scope=_commScope();
  const readyRaw=(scope.commissions||[]).filter(c=>String(c.status||'').toLowerCase()==='received'&&!c.invoiceNumber);
  // De-dupe by loan/case + type + period so the same commission can't be billed twice,
  // and drop implausible amounts (likely a parse error - a trail bigger than a typical upfront).
  const seenK={}; const ready=[];
  readyRaw.forEach(c=>{
    const amt=Number(c.amount)||0;
    if(amt<=0) return;
    if(/trail/i.test(c.type) && amt>2000){ console.warn('Skipping implausible trail amount',c.id,amt); return; }
    if(amt>200000){ console.warn('Skipping implausible amount',c.id,amt); return; }
    const key=(c.loanId||c.caseId||c.id)+'|'+(c.type==='Trail'?'Trail':'Upfront')+'|'+(_periodKeyLocal(c.period||'')||'');
    if(seenK[key]) return; seenK[key]=1; ready.push(c);
  });
  if(ready.length===0){toast('Nothing ready to invoice');return;}
  // Group by CASE/LOAN + type so each invoice is exactly ONE case, with Upfront and
  // Trail kept on separate invoices. Cases are never mixed together.
  const groups={};
  ready.forEach(c=>{
    const caseKey=c.loanId||c.caseId||c.id;
    const k=`${caseKey}|${c.type==='Trail'?'Trail':'Upfront'}`;
    (groups[k]=groups[k]||[]).push(c);
  });
  const groupCount=Object.keys(groups).length;
  if(!confirm(`Create ${groupCount} draft invoice(s) from ${ready.length} received commission(s)?\n\n\u00B7 ONE invoice per case \u2014 Upfront and Trail kept separate\n\u00B7 Only commissions already PAID in the Finsure statement are billed\n\u00B7 Cases are never mixed on the same invoice\n\u00B7 Each commission is stamped so it can't be billed twice\n\u00B7 Created as Draft \u2014 review & set recipient before sending`))return;
  // Broker share % comes from each loan/case (managed in Loan Book) \u2014 no prompt, no single value.
  // Due date = last day of the current month (consistent, easy to manage)
  const _eom=new Date(); const _last=new Date(_eom.getFullYear(),_eom.getMonth()+1,0);
  const dueDate=`${_last.getFullYear()}-${String(_last.getMonth()+1).padStart(2,'0')}-${String(_last.getDate()).padStart(2,'0')}`;
  showLoad();
  let made=0;
  for(const k in groups){
    const list=groups[k];
    const type=/trail/i.test(list[0].type)?'Trail':'Upfront';
    const brokerId=list[0].brokerId||S.user.id;
    const brokerName=list[0].brokerName||'';
    // Broker share % from the loan this case maps to (default 100)
    const loanKey=list[0].loanId||list[0].caseId;
    const loan=(S.loanBook||[]).find(l=>l.id===loanKey||l.caseId===loanKey);
    const pct=_loanPct(loan);
    const items=list.map(c=>{
      const full=Number(c.amount)||0;
      const amt=Math.round(full*(pct/100)*100)/100;
      return {
        desc:`${type} commission \u2014 ${c.clientName||''}${c.period?' \u00B7 '+c.period:''}${pct!==100?' (broker '+pct+'% of $'+full.toFixed(2)+')':''}`,
        source:c.loanId||c.caseId||'',
        commId:c.id,
        grossAmount:full,
        amount:amt,
      };
    });
    // Compute a period label to store on the invoice
    let periodLabel='';
    if(type==='Trail'){
      const keys=list.map(c=>_periodKeyLocal(c.period)).filter(Boolean).sort();
      if(keys.length){
        const fmt=(kk)=>{const p=kk.split('-');return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-AU',{month:'short',year:'numeric'});};
        periodLabel = keys.length===1?fmt(keys[0]):`${fmt(keys[0])} \u2013 ${fmt(keys[keys.length-1])} (${keys.length}mo)`;
      }
    }
    const clientSummary=[...new Set(list.map(c=>c.clientName).filter(Boolean))].join(', ');
    const r=await gs_('createInvoice',S.tok,{
      type, brokerId:`${brokerId}|${brokerName}`, items,
      gstMode:'exclusive', status:'Draft', dueDate,
      issuedTo:brokerName, period:periodLabel,
      brokerSharePct:pct,
      notes: clientSummary?('Cases included: '+clientSummary):'',
    });
    if(r&&r.ok)made++;
  }
  hideLoad();
  // Reload commissions + invoices
  const[cr,ir]=await Promise.all([gs_('getCommissions',S.tok),gs_('getInvoices',S.tok)]);
  if(cr&&cr.ok)S.commissions=cr.data||[];
  if(ir&&ir.ok)S.invoices=ir.data||[];
  toast(`\u2713 Created ${made} draft invoice(s) \u2014 review in All Invoices`);
  S.invoiceTab='list';
  render();
}

// Derive a meaningful period label for an invoice from its line items:
//   \u00B7 Trail   \u2192 month range covered, e.g. "Feb 2026 \u2013 May 2026 (4mo)" or "May 2026"
//   \u00B7 Upfront \u2192 settlement month, e.g. "Settled Jan 2026"
// Falls back to the stored period field if present.
function _invoicePeriodLabel(iv, items){
  if(iv.period && String(iv.period).trim()) return iv.period;
  items = items || [];
  const fmtKey = (k) => {
    const p=k.split('-'); const y=parseInt(p[0],10), m=parseInt(p[1],10);
    return new Date(y, m-1, 1).toLocaleDateString('en-AU',{month:'short',year:'numeric'});
  };
  if(iv.type==='Trail'){
    const keys=[];
    items.forEach(it=>{ const pk=_extractPeriodKeyFromDesc(it.desc); if(pk&&keys.indexOf(pk)<0)keys.push(pk); });
    if(keys.length===0) return '\u2013';
    keys.sort();
    if(keys.length===1) return fmtKey(keys[0]);
    return `${fmtKey(keys[0])} \u2013 ${fmtKey(keys[keys.length-1])} (${keys.length}mo)`;
  }
  if(iv.type==='Upfront'||iv.type==='Bonus'){
    const cl=_invoiceClientLabel(iv,items);
    let settle='';
    if(cl.caseId){const c=(S.cases||[]).find(x=>x.id===cl.caseId);if(c)settle=c.settlementDate;}
    if(!settle&&cl.loanId){const l=(S.loanBook||[]).find(x=>x.id===cl.loanId);if(l)settle=l.settlementDate;}
    if(settle){const d=new Date(settle);if(!isNaN(d.getTime()))return 'Settled '+d.toLocaleDateString('en-AU',{month:'short',year:'numeric'});}
    return iv.type;
  }
  return iv.period||'\u2013';
}

function _isTrueJS(v){return v===true||v===1||String(v).toLowerCase()==='true'||String(v)==='1';}

// Derive the client + case for an invoice from its line items (source = caseId/loanId).
function _invoiceClientLabel(iv, items){
  items = items || [];
  let caseId='', loanId='', client='';
  for(const it of items){
    const src = it.source || '';
    if(src.startsWith('ELF-') && !caseId) caseId = src;
    if(src.startsWith('LB-') && !loanId) loanId = src;
  }
  // Resolve client from case \u2192 loan \u2192 desc
  if(caseId){
    const c=(S.cases||[]).find(x=>x.id===caseId);
    if(c) client=_caseClientLabel(c);
  }
  if(!client && loanId){
    const l=(S.loanBook||[]).find(x=>x.id===loanId);
    if(l){ client=_loanClientLabel(l); if(!caseId&&l.caseId)caseId=l.caseId; }
  }
  // Fallback: parse client from first item desc ("Upfront commission \u2014 NAME (...)")
  if(!client && items.length){
    const m=/\u2014\s*([^\u00B7(]+?)(?:\s*[\u00B7(]|$)/.exec(items[0].desc||'');
    if(m) client=m[1].trim();
  }
  return { client, caseId, loanId };
}

// Build a de-duplicated list of past invoice recipients (issuedTo + email + abn)
// so the broker can pick a saved company instead of retyping it each time.
function _invoiceRecipientList(){
  const seen = {};
  const out = [];
  // Persistent saved recipients first (survive invoice deletion)
  (S.savedRecipients||[]).forEach(r => {
    const name=(r.name||'').trim(); if(!name)return;
    const key=name.toLowerCase(); if(seen[key])return; seen[key]=true;
    out.push({ issuedTo:name, email:r.email||'', abn:r.abn||'' });
  });
  (S.invoices||[]).forEach(iv => {
    const name = (iv.issuedTo||'').trim();
    if(!name) return;
    const key = name.toLowerCase();
    if(seen[key]) return;
    seen[key] = true;
    out.push({ issuedTo: name, email: iv.issuedToEmail||'', abn: iv.abn||'' });
  });
  return out.sort((a,b)=>a.issuedTo.localeCompare(b.issuedTo));
}

// When a saved recipient is chosen from the dropdown, fill issuedTo + email + ABN.
// Explicit pick \u2192 overwrite all three (the user deliberately selected this company).
function _invoiceRecipientPick(name){
  if(!name) return;
  const match = _invoiceRecipientList().find(r => r.issuedTo.toLowerCase() === String(name||'').toLowerCase());
  if(!match) return;
  S.invoiceDraft.issuedTo = match.issuedTo;
  S.invoiceDraft.issuedToEmail = match.email || '';
  S.invoiceDraft.abn = match.abn || '';
  renderModal();
  toast(`\u2713 Loaded ${match.issuedTo}`);
}

function _invoiceTotals(d){
  const subtotal=d.items.reduce((s,it)=>s+(Number(it.amount)||0),0);
  let gst=0,total=subtotal,exGst=subtotal;
  if(d.gstMode==='inclusive'){
    gst=Math.round(subtotal/11*100)/100;
    exGst=Math.round((subtotal-gst)*100)/100;
    total=subtotal;
  } else if(d.gstMode==='exclusive'){
    gst=Math.round(subtotal*0.10*100)/100;
    exGst=subtotal;
    total=Math.round((subtotal+gst)*100)/100;
  }
  const gross=d.items.reduce((s,it)=>s+(Number(it.grossAmount)||Number(it.amount)||0),0);
  const companyKeeps=Math.max(0,Math.round((gross-subtotal)*100)/100);
  return {subtotal,gst,total,exGst,gross,companyKeeps};
}

function updateBrokerShare(v){
  const pct=Math.max(0,Math.min(100,parseFloat(v)||0));
  S.invoiceDraft.brokerSharePct=pct;
  const dec=pct/100;
  S.invoiceDraft.items.forEach(it=>{
    if(it.grossAmount!=null){
      it.amount=Math.round(Number(it.grossAmount)*dec*100)/100;
    }
  });
  renderModal();
}

// Build a display label combining both borrowers if the case is joint.
function _caseClientLabel(c){
  if(!c) return '';
  if(c.clientName2) return `${c.clientName||''} & ${c.clientName2}`;
  return c.clientName || '';
}
// Build a label from a loan (looks up its case for co-borrower if linked).
function _loanClientLabel(l){
  if(!l) return '';
  if(l.caseId){
    const c = S.cases.find(x => x.id === l.caseId);
    if(c && c.clientName2) return `${c.clientName||l.clientName||''} & ${c.clientName2}`;
  }
  return l.clientName || '';
}

// Enumerate trail months that should be on an invoice: from the month AFTER
// settlement up to the current month. Returns array of {key:'YYYY-MM', label:'Mon YYYY'}.
function _trailMonthsSinceSettlement(settlementDate){
  const out = [];
  const sd = settlementDate ? new Date(settlementDate) : null;
  if(!sd || isNaN(sd.getTime())) return out;
  // Start = first day of month after settlement
  let y = sd.getFullYear();
  let m = sd.getMonth() + 1; // 0-indexed; +1 = next month (still 0-indexed value)
  const now = new Date();
  const endY = now.getFullYear();
  const endM = now.getMonth();
  while(y < endY || (y === endY && m <= endM)){
    const key = `${y}-${String(m+1).padStart(2,'0')}`;
    const label = new Date(y, m, 1).toLocaleDateString('en-AU', {month:'short', year:'numeric'});
    out.push({key, label});
    m++;
    if(m > 11){ m = 0; y++; }
  }
  return out;
}

function pullInvoiceFromCase(cid){
  S.invoiceDraft.linkedCaseId=cid;
  S.invoiceDraft.linkedLoanId='';
  if(!cid){renderModal();return;}
  const c=S.cases.find(x=>x.id===cid);if(!c){renderModal();return;}
  const dec=S.invoiceDraft.brokerSharePct/100;
  const loanAmt=Number(c.loanAmount||0);
  const clientLabel = _caseClientLabel(c);
  const type = S.invoiceDraft.type || 'Upfront';
  const items=[];
  // Pull ONLY the lines matching the selected Primary Type \u2014 keeps each
  // invoice purely Upfront OR purely Trail (no mixing).
  if(type === 'Upfront' || type === 'Bonus'){
    const upGross=Math.round(loanAmt*DEFAULT_UPFRONT_RATE/100*100)/100;
    items.push({
      desc:`Upfront commission \u2014 ${clientLabel} (${c.lenderName||'lender TBC'})`,
      source:c.id,
      grossAmount:upGross,
      amount:Math.round(upGross*dec*100)/100,
    });
  } else if(type === 'Trail'){
    const trGross=Math.round(loanAmt*DEFAULT_TRAIL_RATE/100/12*100)/100;
    const months = _trailMonthsSinceSettlement(c.settlementDate);
    if(months.length > 0 && trGross > 0){
      months.forEach(mo => {
        items.push({
          desc:`Trail commission (1 month) \u2014 ${clientLabel} \u00B7 ${mo.label}`,
          source:c.id,
          grossAmount:trGross,
          amount:Math.round(trGross*dec*100)/100,
        });
      });
    } else {
      items.push({
        desc:`Trail commission (1 month) \u2014 ${clientLabel}${S.invoiceDraft.period?' \u00B7 '+S.invoiceDraft.period:''}`,
        source:c.id,
        grossAmount:trGross,
        amount:Math.round(trGross*dec*100)/100,
      });
    }
  }
  S.invoiceDraft.items=items;
  // Auto-fill the Period field so it's tracked + shown on the invoice
  if(type === 'Trail'){
    const months = _trailMonthsSinceSettlement(c.settlementDate);
    if(months.length===1) S.invoiceDraft.period = months[0].label;
    else if(months.length>1) S.invoiceDraft.period = `${months[0].label} \u2013 ${months[months.length-1].label} (${months.length}mo)`;
  } else if(c.settlementDate){
    const sd=new Date(c.settlementDate);
    if(!isNaN(sd.getTime())) S.invoiceDraft.period = 'Settled '+sd.toLocaleDateString('en-AU',{month:'short',year:'numeric'});
  }
  renderModal();
  if(type === 'Trail'){
    const n = items.length;
    toast(`\u2713 Pulled ${n} month${n!==1?'s':''} of Trail from ${cid}`);
  } else {
    toast(`\u2713 Pulled Upfront from ${cid}`);
  }
}

function pullInvoiceFromLoan(lid){
  S.invoiceDraft.linkedLoanId=lid;
  S.invoiceDraft.linkedCaseId='';
  if(!lid){renderModal();return;}
  const l=S.loanBook.find(x=>x.id===lid);if(!l){renderModal();return;}
  const dec=S.invoiceDraft.brokerSharePct/100;
  const clientLabel = _loanClientLabel(l);
  const type = S.invoiceDraft.type || 'Upfront';
  const items=[];
  if(type === 'Upfront' || type === 'Bonus'){
    const upGross=Number(l.upfrontAmount)||0;
    if(upGross>0)items.push({
      desc:`Upfront commission \u2014 ${clientLabel} (${l.lenderName})`,
      source:l.id,
      grossAmount:upGross,
      amount:Math.round(upGross*dec*100)/100,
    });
  } else if(type === 'Trail'){
    const trGross=Number(l.trailMonthly)||0;
    const months = _trailMonthsSinceSettlement(l.settlementDate);
    if(trGross>0 && months.length>0){
      months.forEach(mo => {
        items.push({
          desc:`Trail commission (1 month) \u2014 ${clientLabel} \u00B7 ${mo.label}`,
          source:l.id,
          grossAmount:trGross,
          amount:Math.round(trGross*dec*100)/100,
        });
      });
    } else if(trGross>0){
      items.push({
        desc:`Trail commission (1 month) \u2014 ${clientLabel}${S.invoiceDraft.period?' \u00B7 '+S.invoiceDraft.period:''}`,
        source:l.id,
        grossAmount:trGross,
        amount:Math.round(trGross*dec*100)/100,
      });
    }
  }
  S.invoiceDraft.items=items;
  if(type === 'Trail'){
    const months = _trailMonthsSinceSettlement(l.settlementDate);
    if(months.length===1) S.invoiceDraft.period = months[0].label;
    else if(months.length>1) S.invoiceDraft.period = `${months[0].label} \u2013 ${months[months.length-1].label} (${months.length}mo)`;
  } else if(l.settlementDate){
    const sd=new Date(l.settlementDate);
    if(!isNaN(sd.getTime())) S.invoiceDraft.period = 'Settled '+sd.toLocaleDateString('en-AU',{month:'short',year:'numeric'});
  }
  renderModal();
  if(type === 'Trail'){
    const n = items.length;
    toast(`\u2713 Pulled ${n} month${n!==1?'s':''} of Trail from loan ${lid}`);
  } else {
    toast(`\u2713 Pulled Upfront from loan ${lid}`);
  }
}

async function updateInvoiceType(t){
  S.invoiceDraft.type=t;
  const brokerSel=document.getElementById('inv-bk');
  const brokerName=brokerSel?(brokerSel.value.split('|')[1]||S.user.name):S.user.name;
  const r=await gs_('previewInvoiceRef',S.tok,t,brokerName);
  if(r&&r.ok)S.invoiceDraft.ref=r.data;
  // Re-pull if source linked so items match new type
  if(S.invoiceDraft.linkedCaseId)pullInvoiceFromCase(S.invoiceDraft.linkedCaseId);
  else if(S.invoiceDraft.linkedLoanId)pullInvoiceFromLoan(S.invoiceDraft.linkedLoanId);
  else renderModal();
}
async function updateInvoiceBroker(v){
  S.invoiceDraft.brokerId=v;
  const brokerName=v.split('|')[1]||S.user.name;
  S.invoiceDraft.issuedTo=brokerName;
  const r=await gs_('previewInvoiceRef',S.tok,S.invoiceDraft.type,brokerName);
  if(r&&r.ok)S.invoiceDraft.ref=r.data;
  renderModal();
}
function addInvoiceLine(){
  S.invoiceDraft.items.push({desc:'',source:'',amount:0});
  renderModal();
}
function pullFromCommissions(){
  const d=S.invoiceDraft;
  const brokerId=(d.brokerId||'').split('|')[0]||S.user.id;
  const received=S.commissions.filter(c=>
    c.brokerId===brokerId && c.status==='Received' && c.type===d.type
  );
  const existing=d.items.map(it=>it.source).filter(Boolean);
  const pct=d.brokerSharePct/100;
  let added=0;
  received.forEach(c=>{
    if(existing.indexOf(c.id)>=0)return;
    const gross=Number(c.amount)||0;
    d.items.push({
      desc:`${c.type} commission \u2014 ${c.clientName}${c.loanId?' (Loan '+c.loanId+')':''}`,
      source:c.id,
      grossAmount:gross,
      amount:Math.round(gross*pct*100)/100,
    });
    added++;
  });
  renderModal();
  toast(added?`\u2713 Added ${added} line item${added!==1?'s':''}`:'No new items to add',added?0:1);
}
async function saveInvoice_(){
  const d=S.invoiceDraft;
  if(!d)return;
  if(!d.issuedTo){toast('Issued To required',1);return;}
  if(!d.items.length){toast('At least one line item required',1);return;}
  showLoad();
  const r=await gs_('createInvoice',S.tok,d);
  hideLoad();
  if(r&&r.ok){
    // Re-stringify items so it matches the shape returned by _all() \u2192 consumers parse uniformly
    const newInvoice = {...r.data};
    if(Array.isArray(newInvoice.items)) newInvoice.items = JSON.stringify(newInvoice.items);
    S.invoices.unshift(newInvoice);
    S.invoiceDraft=null;
    S.basLoaded=false;  // force BAS re-fetch on next visit
    toast('\u2713 Invoice '+r.data.ref+' created');
    closeModal();        // closes Create dialog AND triggers re-render of list
    // Open preview so user can print/save as PDF
    S.viewingInvoiceId=r.data.id;
    openModal('viewInvoice');
  } else toast((r&&r.msg)||'Failed to save invoice',1);
}
async function updInvoiceStatus(id,status){
  const r=await gs_('updateInvoice',S.tok,id,{status});
  if(r&&r.ok){
    S.invoices=S.invoices.map(i=>i.id===id?{...i,status}:i);
    S.basLoaded=false;
    toast('\u2713 Status updated');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}
async function _fixInvoiceLinks(){
  showLoad();
  var r=await gs_('repairInvoiceStamps',S.tok);

    _invalidateCache();
    var cr=await gs_('getCommissions',S.tok); if(cr&&cr.ok)S.commissions=cr.data||[];

  } else { hideLoad(); toast((r&&r.msg)||'Failed',1); }
}

function rInvoicePickerModal(){
  const _d=i=>String(i.createdAt||i.dueDate||'').slice(0,10);
  var all=(S.invoices||[]).slice().sort((a,b)=>_d(b).localeCompare(_d(a)));
  var q=(S.invPickQ||'').toLowerCase().trim();
  var list=all.filter(function(i){
    if(!S.invPickShowSent && String(i.status||'')!=='Draft') return false;
    if(q){ var hay=((i.ref||'')+' '+(i.issuedTo||'')+' '+(i.notes||'')+' '+(i.type||'')).toLowerCase(); if(hay.indexOf(q)<0)return false; }

  var per=(typeof _invoicePeriodLabel==='function')?_invoicePeriodLabel(inv,items):(inv.period||'');

  function repl(s){return String(s||'').replace(/\{(\w+)\}/g,function(mm,k){return (k in map)?map[k]:mm;});}

  return {subject:subject,html:h,text:text};

function _todayStr(){return new Date().toISOString().split('T')[0];}
function printInvoice(){
  const el=document.getElementById('invoice-print');
  if(!el){toast('Invoice not rendered',1);return;}
  const w=window.open('','_blank','width=900,height=1100');
  if(!w){toast('Pop-up blocked \u2014 please allow pop-ups for this site',1);return;}
  const inv=S.invoices.find(i=>i.id===S.viewingInvoiceId);
  // Build a descriptive PDF filename: "{Client} - {Type} Invoice - {ref}"
  // The browser uses the document <title> as the default Save-as-PDF filename.
  let title = inv ? inv.ref : 'Invoice';
  if(inv){
    let items=[]; try{ items=typeof inv.items==='string'?JSON.parse(inv.items||'[]'):(inv.items||[]); }catch(e){}
    const cl=_invoiceClientLabel(inv,items);
    const client=(cl.client||inv.issuedTo||'').replace(/[\\/:*?"<>|]/g,'').trim();
    const typeLabel=inv.type||'Invoice';
    title = `${client?client+' - ':''}${typeLabel} Invoice - ${inv.ref}`;
  }
  w.document.write(`<!DOCTYPE html><html><head><title>${title.replace(/</g,'&lt;')}</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      @page { size: A4; margin: 0; }
      body { margin: 0; padding: 0; background: #fff; font-family: 'Outfit', sans-serif; }
      @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
    </style>
    </head><body>${el.outerHTML}
    <script>window.onload=function(){setTimeout(function(){window.print();},400);};</scr`+`ipt>
    </body></html>`);
  w.document.close();
}

async function ensureSettingsLoaded(){
  // Pull email settings if we don't have them yet
  if(!S.emailSettingsDraft){
    const r=await gs_('getEmailSettings',S.tok);
    S.emailSettingsDraft=r&&r.ok?r.data:{provider:'gmail_app',fromAddress:'',fromName:'Easy Loan Finance',smtpHost:'',smtpPort:587,smtpUser:'',passwordSet:false};
  }

    S.companyDraft=Object.assign({},S.companyInfo);

function rSettings(){
  if(S.user.role!=='admin')return '<div style="text-align:center;padding:40px;color:#4a5568;">Admin access required</div>';

function _recipFormVal(id){ var el=document.getElementById(id); return el?(el.value||'').trim():''; }
function _clearRecipForm_(){ ['rcp-name','rcp-email','rcp-phone','rcp-abn','rcp-note','rcp-acctname','rcp-bsb','rcp-acctno','rcp-payid','rcp-bank'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';}); }
async function _saveRecipient_(){
  var name=_recipFormVal('rcp-name');
  if(!name){toast('Name required',1);return;}
  var rec={name:name,email:_recipFormVal('rcp-email'),phone:_recipFormVal('rcp-phone'),abn:_recipFormVal('rcp-abn'),note:_recipFormVal('rcp-note'),
    direction:(S.recipDir||'getpaid'),accountName:_recipFormVal('rcp-acctname'),bsb:_recipFormVal('rcp-bsb'),accountNumber:_recipFormVal('rcp-acctno'),payId:_recipFormVal('rcp-payid'),bankName:_recipFormVal('rcp-bank')};
  showLoad();
  var r=await gs_('saveSavedRecipient',S.tok,rec);
  hideLoad();
  if(r&&r.ok){ S.savedRecipients=r.data||[]; _clearRecipForm_(); toast('Saved '+name); render(); }
  else toast((r&&r.msg)||'Failed',1);
}
function _editRecipient_(name){
  var r=(S.savedRecipients||[]).find(function(x){return String(x.name).toLowerCase()===String(name).toLowerCase();});
  if(!r)return;
  S.recipDir=(r.direction==='payto'?'payto':'getpaid'); render();
  setTimeout(function(){
    var set=function(id,v){var el=document.getElementById(id);if(el)el.value=v||'';};
    set('rcp-name',r.name);set('rcp-email',r.email);set('rcp-phone',r.phone);set('rcp-abn',r.abn);set('rcp-note',r.note);
    set('rcp-acctname',r.accountName);set('rcp-bsb',r.bsb);set('rcp-acctno',r.accountNumber);set('rcp-payid',r.payId);set('rcp-bank',r.bankName);
    var nm=document.getElementById('rcp-name'); if(nm)nm.scrollIntoView({behavior:'smooth',block:'center'});
  },60);
}
async function _delRecipient_(name){
  if(!confirm('Delete saved recipient "'+name+'"?'))return;
  showLoad();
  var r=await gs_('deleteSavedRecipient',S.tok,name);
  hideLoad();
  if(r&&r.ok){ S.savedRecipients=r.data||[]; toast('Deleted'); render(); }
  else toast((r&&r.msg)||'Failed',1);
}

async function saveCompanyInfo_(){

  hideLoad();

    S.companyInfo=Object.assign({},S.companyInfo,r.data);

}
async function saveEmailSettings_(){

}
async function testEmailSettings_(){

// \u2551  ACTIVITY LOG (admin only)                      \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
function rActivity(){
  if(S.user.role!=='admin')return '<div style="text-align:center;padding:40px;color:#4a5568;">Admin access required</div>';
  // Lazy-load activity log \u2014 not part of initial loadAll bundle to keep startup fast
  if(!S._activityFetched){
    S._activityFetched = true;
    gs_('getActivity', S.tok, 100).then(r => {
      if(r && r.ok){ S.activity = r.data || []; render(); }
    });
    return '<div style="text-align:center;padding:40px;color:#6b7280;font-size:13px;">Loading activity log\u2026</div>';
  }
  const a=S.activity||[];
  const loginUsers={};
  a.forEach(e=>{
    if(e.action==='login'&&e.userId){
      if(!loginUsers[e.userId]||loginUsers[e.userId].timestamp<e.timestamp)
        loginUsers[e.userId]={name:e.userName,role:e.userRole,timestamp:e.timestamp};
    }
  });
  const logoutAfter={};
  a.forEach(e=>{
    if(e.action==='logout'&&e.userId){
      if(!logoutAfter[e.userId]||logoutAfter[e.userId]<e.timestamp)
        logoutAfter[e.userId]=e.timestamp;
    }
  });
  const currentlyActive=Object.keys(loginUsers).filter(uid=>{
    const lt=loginUsers[uid].timestamp;
    const out=logoutAfter[uid];
    if(out&&out>lt)return false;
    // Consider "active" if last login within 2 hours (matches session)
    const age=(new Date()-new Date(lt))/1000;
    return age<SESSION_SECONDS;
  });
  return`<div class="g2" style="gap:12px;margin-bottom:14px;">
    <div class="card" style="padding:16px 20px;">
      <div style="font-size:13px;font-weight:700;color:#c9d1d9;margin-bottom:12px;">\uD83D\uDFE2 Currently Active (${currentlyActive.length})</div>
      ${currentlyActive.length?currentlyActive.map(uid=>{
        const u=loginUsers[uid];
        const mins=Math.floor((new Date()-new Date(u.timestamp))/60000);
        return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #1e2430;">
          ${av(u.name,28,ucolor(uid))}
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#c9d1d9;">${esc(u.name)}</div>${rbadge(u.role)}</div>
          <div style="font-size:11px;color:#34D399;">Active ${mins}m ago</div>
        </div>`;
      }).join(''):'<div style="color:#4a5568;font-size:13px;">No one is currently signed in</div>'}
    </div>
    <div class="card" style="padding:16px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;color:#c9d1d9;">\uD83D\uDCCA Today's Summary</div>
        <button class="btn-sec" style="font-size:11px;" onclick="clearActivity_()">Clear Log</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        ${summaryCount('Logins','login','#34D399')}
        ${summaryCount('Failed','login_fail','#ef4444')}
        ${summaryCount('Cases','case_create','#818CF8')}
        ${summaryCount('Loans','loan_add','#D4A843')}
        ${summaryCount('Commissions','commission_add','#A78BFA')}
        ${summaryCount('Invoices','invoice_create','#FB923C')}
      </div>
    </div>
  </div>
  <div class="card" style="overflow:hidden;">
    <div style="padding:12px 16px;border-bottom:1px solid #1e2430;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:13px;font-weight:700;color:#c9d1d9;">Recent Activity (${a.length})</div>
      <button class="btn-sec" style="font-size:11px;" onclick="refreshAll()">\u21BB Refresh</button>
    </div>
    <div style="max-height:calc(100vh - 350px);overflow-y:auto;">
      ${a.slice(0,80).map(e=>{
        const t=new Date(e.timestamp);
        const when=isNaN(t)?e.timestamp:t.toLocaleString('en-AU',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
        const icon=_activityIcon(e.action);
        let details=e.details;try{const p=JSON.parse(e.details||'{}');details=Object.entries(p).map(([k,v])=>`${k}: ${esc(String(v))}`).join(' \u00B7 ');}catch(_){}
        return`<div style="display:flex;gap:11px;padding:10px 16px;border-bottom:1px solid #1e2430;align-items:flex-start;">
          <div style="width:28px;height:28px;border-radius:50%;background:${icon.c}18;border:1px solid ${icon.c}40;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${icon.i}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;color:#c9d1d9;">
              <strong style="color:${ucolor(e.userId)};">${esc(e.userName||'?')}</strong>
              <span style="color:#6b7280;">${esc(_activityLabel(e.action))}</span>
            </div>
            ${details?`<div style="font-size:11px;color:#4a5568;margin-top:2px;overflow:hidden;text-overflow:ellipsis;">${esc(details)}</div>`:''}
          </div>
          <div style="font-size:11px;color:#4a5568;white-space:nowrap;flex-shrink:0;">${esc(when)}</div>
        </div>`;
      }).join('')}
      ${!a.length?'<div style="text-align:center;padding:30px;color:#4a5568;">No activity yet</div>':''}
    </div>
  </div>`;
}
function summaryCount(label,action,color){
  const today=new Date().toISOString().split('T')[0];
  const n=(S.activity||[]).filter(e=>e.action===action&&String(e.timestamp).slice(0,10)===today).length;
  return`<div style="background:#0A0D14;border:1px solid #1e2430;border-radius:8px;padding:9px 12px;">
    <div style="font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:.8px;">${label}</div>
    <div style="font-size:20px;font-weight:800;color:${color};">${n}</div>
  </div>`;
}
function _activityIcon(action){
  const map={
    login:{i:'\uD83D\uDD11',c:'#34D399'},
    login_fail:{i:'\u26A0',c:'#ef4444'},
    logout:{i:'\uD83D\uDEAA',c:'#6b7280'},
    case_create:{i:'\uD83D\uDCC1',c:'#818CF8'},
    case_update:{i:'\u270F',c:'#38BDF8'},
    loan_add:{i:'\uD83D\uDCD8',c:'#D4A843'},
    loan_update:{i:'\u270F',c:'#D4A843'},
    loan_delete:{i:'\uD83D\uDDD1',c:'#ef4444'},
    commission_add:{i:'\uD83D\uDCB0',c:'#A78BFA'},

// \u2551  START                                          \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
// ============================================================================
// REVENUE TRACKING / COMMISSION RECONCILIATION
// Upload Finsure statement (.xlsx) -> parse client-side (SheetJS) -> preview ->
// import as a keyed batch (ref|type|month, upsert, never scrambles old data) ->
// reconcile vs settled loans -> show missing/variance -> draft email to Finsure.
// ============================================================================
function _revNum(v){
  if(v==null)return 0;
  if(typeof v==='number')return isFinite(v)?v:0;
  var s=String(v).trim().replace(/[^0-9.,\-]/g,'');
  if(s===''||s==='-')return 0;
  var lastDot=s.lastIndexOf('.'), lastComma=s.lastIndexOf(',');
  if(lastDot>=0 && lastComma>=0){
    if(lastComma>lastDot) s=s.replace(/\./g,'').replace(',','.'); // 1.234,56 (EU)
    else s=s.replace(/,/g,'');                                    // 1,234.56 (US/AU)
  } else if(lastComma>=0){
    if(/,\d{1,2}$/.test(s)) s=s.replace(',', '.'); // 1234,56 -> decimal
    else s=s.replace(/,/g,'');                     // 1,234 -> thousands
  }
  s=s.replace(/,/g,'');
  var n=parseFloat(s); return isNaN(n)?0:n;
}
// Strict month detector for blind column scans: only real month labels
// (YYYY-MM, Mon-YY, Mon YYYY, bare month). Rejects ref numbers / amounts.
function _revMonthStrict(v, fy){
  if(v==null||v==='')return '';
  if(Object.prototype.toString.call(v)==='[object Date]'){ return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0'); }
  var t=String(v).trim();
  function yr(y){ y=String(y); return y.length<=2?'20'+('0'+y).slice(-2):y; }
  function out(y,mo){ return y+'-'+('0'+mo).slice(-2); }
  var mn=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var m=/^(\d{4})-(\d{1,2})(?:-\d{1,2})?(?:[ T].*)?$/.exec(t); if(m&&+m[2]>=1&&+m[2]<=12)return out(m[1],+m[2]); // YYYY-MM[-DD][ time]
  m=/^([a-z]{3,9})[-\s\/]+(\d{2,4})$/i.exec(t); if(m){var i=mn.indexOf(m[1].toLowerCase().slice(0,3)); if(i>=0)return out(yr(m[2]),i+1);}
  m=/^([a-z]{3,9})$/i.exec(t); if(m){var j=mn.indexOf(m[1].toLowerCase().slice(0,3)); if(j>=0&&fy)return out(fy,j+1);}
  m=/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec(t); if(m){var mo=+m[1]>12?+m[2]:+m[1]; if(mo>=1&&mo<=12)return out(yr(m[3]),mo);} // M/D/Y (US)
  return '';
}
function _revMonthKey(v, fallbackYear){
  if(v==null||v==='')return '';
  if(Object.prototype.toString.call(v)==='[object Date]'){ return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0'); }
  var t=String(v).trim();
  function yr(y){ y=String(y); return y.length<=2 ? '20'+('0'+y).slice(-2) : y; }
  var mn=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var m=/^(\d{4})-(\d{1,2})\b/.exec(t); if(m)return m[1]+'-'+('0'+m[2]).slice(-2);
  m=/([a-z]{3,9})[-\s\/]+(\d{2,4})/i.exec(t); // Mon-YY / Mon YYYY / Mon/YY
  if(m){ var i=mn.indexOf(m[1].toLowerCase().slice(0,3)); if(i>=0)return yr(m[2])+'-'+('0'+(i+1)).slice(-2); }
  m=/^([a-z]{3,9})$/i.exec(t); // bare month -> use fallback year
  if(m){ var j=mn.indexOf(m[1].toLowerCase().slice(0,3)); if(j>=0&&fallbackYear)return fallbackYear+'-'+('0'+(j+1)).slice(-2); }
  var dt=new Date(t); if(!isNaN(dt.getTime())&&/[\/\-]|\d{4}/.test(t)) return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2);
  return '';
}
function _revAddMonths(monthKey, n){
  var p=monthKey.split('-'); var d=new Date(parseInt(p[0],10), parseInt(p[1],10)-1+n, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function _revMonthLabel(mk){ if(!mk)return ''; var p=mk.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-AU',{month:'short',year:'numeric'}); }
