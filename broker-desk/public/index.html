function switchStage(stage){
  S.emailSel=stage;
  S.emailVariant='';
  S.emailEditMode=false;
  S.emailDraftSubject=null;
  S.emailDraftBody=null;
  // Don't reset emailAttachments \u2014 user may have already attached files for this case
  render();
}
function switchVariant(variant){
  S.emailVariant=variant;
  S.emailEditMode=false;
  S.emailDraftSubject=null;
  S.emailDraftBody=null;
  render();
}
function startEmailEdit(){
  // Capture currently rendered subject/body as the draft starting point
  const sel=S.emailSel;
  const variant=S.emailVariant||'';
  const tplKey=variant?`${sel}:${variant}`:sel;
  const tpl=S.emailTpls[tplKey]||S.emailTpls[sel]||{subject:'',body:''};
  const c=S.emailPreviewCase?S.cases.find(x=>x.id===S.emailPreviewCase):null;
  const vars=_emailVars(c);
  S.emailDraftSubject=fillTpl(tpl.subject,vars);
  S.emailDraftBody=fillTpl(tpl.body,vars);
  S.emailEditMode=true;
  render();
}
function cancelEmailEdit(){
  S.emailEditMode=false;
  S.emailDraftSubject=null;
  S.emailDraftBody=null;
  render();
}
function toggleRecipient(email){
  if(!S.emailSelectedRecipients)S.emailSelectedRecipients=new Set();
  if(S.emailSelectedRecipients.has(email))S.emailSelectedRecipients.delete(email);
  else S.emailSelectedRecipients.add(email);
  render();
}
function addManualRecipient(){
  const em=prompt('Enter email address to add:');
  if(!em||!em.trim())return;
  const e=em.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){toast('Invalid email format',1);return;}
  if(!S.emailManualRecipients)S.emailManualRecipients=[];
  if(!S.emailManualRecipients.includes(e))S.emailManualRecipients.push(e);
  if(!S.emailSelectedRecipients)S.emailSelectedRecipients=new Set();
  S.emailSelectedRecipients.add(e);
  render();
}
function removeManualRecipient(email){
  S.emailManualRecipients=(S.emailManualRecipients||[]).filter(e=>e!==email);
  if(S.emailSelectedRecipients)S.emailSelectedRecipients.delete(email);
  render();
}
// \u2500\u2500 Email attachments \u2014 ad-hoc per-case file uploads \u2500\u2500
// Files are kept in memory (base64) only until send completes; never saved to backend storage.
const _MAX_TOTAL_ATT_SIZE = 25 * 1024 * 1024;  // Gmail's 25 MB attachment limit
const _MAX_FILE_COUNT = 5;

function _iconForFile(name){
  const n = String(name||'').toLowerCase();
  if(/\.(pdf)$/.test(n)) return '\uD83D\uDCD5';
  if(/\.(docx?|odt|rtf)$/.test(n)) return '\uD83D\uDCD8';
  if(/\.(xlsx?|csv|ods)$/.test(n)) return '\uD83D\uDCD7';
  if(/\.(pptx?|odp)$/.test(n)) return '\uD83D\uDCD9';
  if(/\.(jpe?g|png|gif|webp|svg|heic)$/.test(n)) return '\uD83D\uDDBC';
  if(/\.(zip|rar|7z|tar|gz)$/.test(n)) return '\uD83D\uDDDC';
  return '\uD83D\uDCC4';
}

async function _readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      // result is "data:type;base64,XXXX" \u2014 strip prefix
      const m=String(r.result||'').match(/^data:[^;]+;base64,(.*)$/);
      resolve(m?m[1]:'');
    };
    r.onerror=()=>reject(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

async function addAttachmentFiles(fileList){
  if(!fileList||!fileList.length)return;
  if(!S.emailAttachments)S.emailAttachments=[];
  const existing = S.emailAttachments.length;
  if(existing >= _MAX_FILE_COUNT){
    toast(`Max ${_MAX_FILE_COUNT} attachments \u2014 remove one first`,1);
    return;
  }
  const remainingSlots = _MAX_FILE_COUNT - existing;
  const files = Array.from(fileList).slice(0, remainingSlots);
  let currentTotal = S.emailAttachments.reduce((s,a)=>s+(a.size||0),0);
  showLoad();
  for(const f of files){
    if(currentTotal + f.size > _MAX_TOTAL_ATT_SIZE){
      toast(`"${f.name}" skipped \u2014 would exceed 25 MB total`,1);
      continue;
    }
    try {
      const dataBase64 = await _readFileAsBase64(f);
      S.emailAttachments.push({
        name: f.name,
        mimeType: f.type || 'application/octet-stream',
        size: f.size,
        dataBase64
      });
      currentTotal += f.size;
    } catch(err){
      toast(`Failed to read ${f.name}: ${err.message}`,1);
    }
  }
  hideLoad();
  render();
}

function handleAttachmentInput(input){
  if(input.files && input.files.length) addAttachmentFiles(input.files);
  input.value = '';  // allow re-selecting same file
}
function handleAttachmentDrop(ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drop-active');
  const dt = ev.dataTransfer;
  if(dt && dt.files && dt.files.length) addAttachmentFiles(dt.files);
}
function removeAttachment(idx){
  if(!S.emailAttachments)return;
  S.emailAttachments.splice(idx,1);
  render();
}

function addNewVariant(stage){
  const label=prompt('New variant label (e.g. "PAYG", "Self-Employed", "Investor"):');
  if(!label||!label.trim())return;
  // Generate variant id from label: lowercase, alphanum + underscore
  const variant=label.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  if(!variant){toast('Invalid variant name',1);return;}
  if(S.emailTpls[stage+':'+variant]){toast('Variant already exists',1);return;}
  // Pre-fill with the main template body so user starts with something
  const main=S.emailTpls[stage]||{subject:'',body:''};
  S.emailTpls[stage+':'+variant]={subject:main.subject,body:main.body,label:label.trim(),variant,stage};
  S.tplEditVariant=variant;
  S.editTpl=true;
  render();
  toast('\u2713 New variant created \u2014 edit and Save to persist');
}
async function deleteVariant_(stage, variant){
  if(!confirm(`Delete variant "${variant}"? This cannot be undone.`))return;
  showLoad();
  const r=await gs_('deleteEmailTemplate',S.tok,stage,variant);
  hideLoad();
  if(r&&r.ok){
    delete S.emailTpls[stage+':'+variant];
    S.tplEditVariant='';
    toast('\u2713 Variant deleted');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}

async function sendEmailFromTemplate(){
  if(!S.emailPreviewCase){toast('Please select a case first',1);return;}
  const c=S.cases.find(x=>x.id===S.emailPreviewCase);
  if(!c){toast('Case not found',1);return;}
  const recipients=Array.from(S.emailSelectedRecipients||new Set());
  if(!recipients.length){toast('Pick at least one recipient',1);return;}
  const stage=S.emailSel;
  const variant=S.emailVariant||'';
  const tplKey=variant?`${stage}:${variant}`:stage;
  const tpl=S.emailTpls[tplKey]||S.emailTpls[stage]||{subject:'',body:''};
  const vars=_emailVars(c);
  const subject=S.emailDraftSubject!=null?S.emailDraftSubject:fillTpl(tpl.subject,vars);
  const body=S.emailDraftBody!=null?S.emailDraftBody:fillTpl(tpl.body,vars);
  const attachments=(S.emailAttachments||[]).map(a=>({name:a.name,mimeType:a.mimeType,dataBase64:a.dataBase64}));
  const fromAddr=S.companyInfo?.emailFromAddress||S.companyInfo?.email||'company email';
  const recipientLabel=recipients.length===1?recipients[0]:recipients.length+' recipients';
  let confirmMsg=`Send "${gs(stage).label}${variant?' ('+(tpl.label||variant)+')':''}" to ${recipientLabel}?`;
  if(attachments.length){
    const totalSize=(S.emailAttachments||[]).reduce((s,a)=>s+(a.size||0),0);
    confirmMsg+=`\n\n\uD83D\uDCCE ${attachments.length} attachment${attachments.length>1?'s':''} (${(totalSize/1048576).toFixed(2)} MB):\n  ${attachments.map(a=>'\u2022 '+a.name).join('\n  ')}`;
  }
  confirmMsg+=`\n\nFrom: ${fromAddr}\nReply-To: ${S.user.email||'[your email]'}`;
  if(!confirm(confirmMsg))return;
  showLoad();
  const r=await gs_('sendEmailGmail',S.tok,recipients,subject,body,c.id,stage,attachments);
  hideLoad();
  if(r&&r.ok){
    toast('\u2713 Sent to '+(r.recipients||recipients.length)+' recipient'+((r.recipients||recipients.length)>1?'s':'')+(attachments.length?' with '+attachments.length+' attachment'+(attachments.length>1?'s':''):''));
    // Reset draft, selections, AND attachments (per Ryan: don't store)
    S.emailDraftSubject=null;S.emailDraftBody=null;S.emailEditMode=false;
    S.emailAttachments=[];
    S.emailLog[c.id]=(S.emailLog[c.id]||[]).concat([{caseId:c.id,stage,sentByName:S.user.name,sentAt:new Date().toISOString(),to:recipients.join(', ')}]);
    S.matrixLoaded=false;S.sentEmailsLoaded=false;
    const tr=await gs_('getTasks',S.tok);
    if(tr&&tr.ok)S.tasks=tr.data||[];
    render();
  } else toast((r&&r.msg)||'Send failed',1);
}
async function saveTpl(){
  const subEl=document.getElementById('etpl-s');
  const bodyEl=document.getElementById('etpl-b');
  if(!subEl||!bodyEl){toast('Edit fields not found',1);return;}
  const sub=subEl.value||'';
  const body=bodyEl.value||'';
  const variant=S.tplEditVariant||'';
  const labelEl=document.getElementById('etpl-label');
  const label=labelEl?labelEl.value||'':'';
  showLoad();
  const r=await gs_('saveEmailTemplate',S.tok,S.emailSel,sub,body,variant,label);
  hideLoad();
  if(r&&r.ok){
    const key=variant?`${S.emailSel}:${variant}`:S.emailSel;
    S.emailTpls[key]={subject:sub,body:body,label:label,variant:variant,stage:S.emailSel};
    S.editTpl=false;
    toast('\u2713 Template saved');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}
function copyTpl(){
  const tpl=S.emailTpls[S.emailSel]||{subject:'',body:''};
  const vars=_emailVars(null);
  const text=`Subject: ${fillTpl(tpl.subject,vars)}\n\n${fillTpl(tpl.body,vars)}`;
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>toast('\u2713 Copied!')).catch(()=>toast('Copy failed',1));
  else toast('Clipboard unavailable',1);
}

// Helper: scope data to broker for non-admin users.
// Admin sees everything; brokers see only their own loans + commissions.
function _commScope(){
  const isAdmin = S.user.role === 'admin';
  return {
    isAdmin,
    myId: S.user.id,
    loans: isAdmin ? S.loanBook : S.loanBook.filter(l => l.brokerId === S.user.id),
    commissions: isAdmin ? S.commissions : S.commissions.filter(c => c.brokerId === S.user.id),
  };
}

// Compute "missing upfronts": loans whose Upfront commission is missing or still Pending.
// Returns array sorted most-overdue first.
function _missingUpfronts(){
  const scope = _commScope();
  const now = Date.now();
  const dayMs = 86400000;
  const out = [];
  scope.loans.forEach(l => {
    if(l.status === 'Written Off') return;
    const upComms = scope.commissions.filter(c => c.loanId === l.id && c.type === 'Upfront');
    const received = upComms.find(c => c.status === 'Received');
    if(received) return; // got it \u2014 not missing
    const pending = upComms.find(c => c.status === 'Pending');
    if(upComms.some(c => c.status === 'Waived')) return; // intentionally waived
    let daysSince = null;
    if(l.settlementDate){
      const sd = new Date(l.settlementDate).getTime();
      if(!isNaN(sd)) daysSince = Math.floor((now - sd) / dayMs);
    }
    out.push({
      loan: l,
      pending: pending || null,
      daysSince,
      expected: Number(l.upfrontAmount) || 0,
    });
  });
  out.sort((a, b) => {
    const da = a.daysSince == null ? -1 : a.daysSince;
    const db = b.daysSince == null ? -1 : b.daysSince;
    if(da !== db) return db - da;
    return b.expected - a.expected;
  });
  return out;
}

// Compute trail status for a given year + month0 (0-indexed Jan=0)
function _trailForMonth(year, month0){
  const scope = _commScope();
  const monthKey = `${year}-${String(month0+1).padStart(2,'0')}`;
  const monthName = new Date(year, month0, 1).toLocaleDateString('en-AU', {month:'long', year:'numeric'});
  const monthShort = new Date(year, month0, 1).toLocaleDateString('en-AU', {month:'short', year:'numeric'});
  // First payable trail month is the month AFTER settlement. (AU rule: lender
  // starts paying trail at end of the month following the settlement month.)
  // Compute "first eligible month key" per loan and skip earlier months.
  // Format YYYY-MM for comparison.
  const activeLoans = scope.loans.filter(l => {
    if(l.status !== 'Active') return false;
    const sd = String(l.settlementDate || '');
    if(!sd) return true;  // No settle date \u2192 can't filter, show
    // Parse YYYY-MM-DD; first trail = next calendar month
    const m = /^(\d{4})-(\d{2})/.exec(sd);
    if(!m) return true;
    const setY = parseInt(m[1], 10);
    const setM = parseInt(m[2], 10);  // 1-indexed
    // First eligible = setY-setM advanced by +1
    let firstY = setY, firstM = setM + 1;
    if(firstM > 12){ firstM = 1; firstY++; }
    const firstKey = `${firstY}-${String(firstM).padStart(2,'0')}`;
    return monthKey >= firstKey;
  });
  const rows = activeLoans.map(l => {
    const expected = Number(l.trailMonthly) || 0;
    // Match by receivedDate starting with monthKey OR period containing month name
    const matched = scope.commissions.filter(c => {
      if(c.loanId !== l.id || c.type !== 'Trail') return false;
      const rd = String(c.receivedDate || '');
      if(rd.startsWith(monthKey)) return true;
      const period = String(c.period || '').toLowerCase();
      if(period && (period.includes(monthShort.toLowerCase()) || period.includes(monthName.toLowerCase()))) return true;
      return false;
    });
    const received = matched
      .filter(c => c.status === 'Received')
      .reduce((s, c) => s + Number(c.amount || 0), 0);
    const pending = matched
      .filter(c => c.status === 'Pending')
      .reduce((s, c) => s + Number(c.amount || 0), 0);
    let status;
    if(received >= expected && expected > 0) status = 'received';
    else if(received > 0 && received < expected) status = 'partial';
    else if(pending > 0) status = 'pending';
    else if(expected > 0) status = 'missing';
    else status = 'no_trail';
    return { loan: l, expected, received, pending, status, matched };
  });
  const order = { missing: 0, partial: 1, pending: 2, received: 3, no_trail: 4 };
  rows.sort((a, b) => {
    if(order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return b.expected - a.expected;
  });
  return { monthKey, monthName, rows };
}

function rCommissions(){
  const tab = S.commTab || 'overview';
  const tabBtn = (id, label, count) => {
    const isOn = tab === id;
    return `<button class="btn-ghost" style="border-radius:0;padding:11px 18px;font-size:13px;border:none;${isOn?'color:#D4A843;border-bottom:2px solid #D4A843;font-weight:600;':'color:#6b7280;'}" onclick="S.commTab='${id}';render()">${label}${count != null && count > 0 ? ` <span style="background:${isOn?'#D4A843':'#1e2430'};color:${isOn?'#0A0D14':'#8b949e'};border-radius:9px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px;">${count}</span>` : ''}</button>`;
  };

  const missing = _missingUpfronts();
  const missingOverdue = missing.filter(m => m.daysSince != null && m.daysSince > 30).length;
  const today = new Date();
  const trail = _trailForMonth(today.getFullYear(), today.getMonth());
  const trailMissing = trail.rows.filter(r => r.status === 'missing' || r.status === 'partial').length;

  const activeLoanCount = S.loanBook.filter(l => l.status === 'Active').length;

  return `<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e2430;margin-bottom:14px;flex-shrink:0;flex-wrap:wrap;gap:8px;">
    <div style="display:flex;align-items:center;flex-wrap:wrap;">
      ${tabBtn('overview', '\uD83D\uDCCA Overview', null)}
      ${tabBtn('missing_upfront', '\u26A0 Missing Upfronts', missingOverdue || missing.length)}
      ${tabBtn('monthly_trail', '\uD83D\uDCC5 Monthly Trail', trailMissing)}
      ${tabBtn('all', '\uD83D\uDCCB All Commissions', null)}
    </div>
    <div style="display:flex;gap:7px;align-items:center;padding:0 4px 6px;flex-wrap:wrap;">
      ${activeLoanCount > 0 ? `<button class="btn-ghost" style="background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(124,58,237,.06));border:1px solid #A78BFA55;color:#A78BFA;padding:6px 12px;font-size:11.5px;font-weight:600;letter-spacing:.3px;border-radius:7px;display:flex;align-items:center;gap:5px;" onclick="autoGenerateTrailEntries_()" title="Auto-generate Pending trail entries (past catch-up + next 12 months) for every active loan">\uD83E\uDD16 Auto-generate trail</button>` : ''}
      <button class="btn-ghost" style="background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(16,185,129,.05));border:1px solid #34D39955;color:#34D399;padding:6px 12px;font-size:11.5px;font-weight:600;letter-spacing:.3px;border-radius:7px;display:flex;align-items:center;gap:5px;" onclick="exportCommissionsExcel_()" title="Export all commissions to a multi-tab Excel workbook (by year + month, with GST)">\uD83D\uDCCA Export to Excel</button>
    </div>
  </div>
  ${tab === 'overview' ? rCommOverview(missing, trail) :
    tab === 'missing_upfront' ? rCommMissingUpfronts(missing) :
    tab === 'monthly_trail' ? rCommMonthlyTrail() :
    rCommAll()}`;
}

// \u2500\u2500 TAB 1: Overview \u2014 top-level KPIs + actionable summary \u2500\u2500
// Commission reminders \u2014 upcoming + overdue trail receipts and pending upfronts.
// For admins this groups by broker so multi-broker teams can be managed centrally.
// Returns '' when nothing is pending (keeps the overview clean).
function _buildCommissionReminders(){
  const now = new Date();
  const todayIso = now.toISOString().slice(0,10);
  const in14 = new Date(now.getTime() + 14*86400000).toISOString().slice(0,10);
  const isAdmin = S.user && S.user.role === 'admin';
  const scope = _commScope();

  const trails = scope.commissions.filter(c => c.type === 'Trail' && String(c.status||'').toLowerCase() === 'pending');
  const dueSoon = [], overdue = [];
  trails.forEach(c => {
    const exp = _deriveTrailExpectedDate(c);
    if(!exp) return;
    if(exp < todayIso) overdue.push(Object.assign({}, c, {_exp: exp}));
    else if(exp <= in14) dueSoon.push(Object.assign({}, c, {_exp: exp}));
  });
  const pendingUpfront = scope.commissions.filter(c => c.type === 'Upfront' && String(c.status||'').toLowerCase() === 'pending');

  // Settled cases where the upfront isn't RECEIVED yet \u2014 broker's action list.
  // Includes cases with no entry AND cases with Pending entry (still needs follow-up
  // until lender actually pays). Excludes only when an upfront entry is RECEIVED.
  const upfrontReceivedByCaseId = new Set();
  const upfrontReceivedByLoanId = new Set();
  (S.commissions||[]).forEach(c => {
    if(c.type !== 'Upfront') return;
    if(String(c.status||'').toLowerCase() !== 'received') return;
    if(c.caseId) upfrontReceivedByCaseId.add(c.caseId);
    if(c.loanId) upfrontReceivedByLoanId.add(c.loanId);
  });
  // Also build map of pending upfront by caseId so we can show status per row
  const pendingUpfrontByCaseId = {};
  (S.commissions||[]).forEach(c => {
    if(c.type !== 'Upfront') return;
    if(String(c.status||'').toLowerCase() !== 'pending') return;
    if(c.caseId) pendingUpfrontByCaseId[c.caseId] = c;
  });
  const settledNoComm = (S.cases||[]).filter(cs => {
    if(cs.stage !== 'settled') return false;
    if(!isAdmin && cs.assignedTo !== S.user.id) return false;
    if(upfrontReceivedByCaseId.has(cs.id)) return false;
    const caseLoan = (S.loanBook||[]).find(l => l.caseId === cs.id);
    if(caseLoan && upfrontReceivedByLoanId.has(caseLoan.id)) return false;
    return true;
  }).slice().sort((a,b) => String(b.settlementDate||b.createdAt||'').localeCompare(String(a.settlementDate||a.createdAt||'')));

  // Case response / submit deadline warnings (admin sees all, broker sees own)
  const nowMs = Date.now();
  const overdueDeadlines = [];
  const dueSoonDeadlines = [];
  (S.cases||[]).forEach(cs => {
    // Only fresh-pipeline cases (not settled / declined / withdrawn)
    if(['settled','declined','withdrawn'].includes(cs.stage)) return;
    if(!isAdmin && cs.assignedTo !== S.user.id) return;
    const respMs = cs.responseDeadline ? new Date(cs.responseDeadline).getTime() : null;
    const subMs = cs.submitDeadline ? new Date(cs.submitDeadline).getTime() : null;
    if(respMs && !isNaN(respMs)){
      if(respMs < nowMs && cs.stage === 'new_enquiry') overdueDeadlines.push({case: cs, kind: 'response', when: respMs, label: 'Response'});
      else if(respMs - nowMs < 4*3600*1000 && cs.stage === 'new_enquiry') dueSoonDeadlines.push({case: cs, kind: 'response', when: respMs, label: 'Response'});
    }
    if(subMs && !isNaN(subMs)){
      if(subMs < nowMs && ['new_enquiry','docs','fact_find'].includes(cs.stage)) overdueDeadlines.push({case: cs, kind: 'submit', when: subMs, label: 'Submit'});
      else if(subMs - nowMs < 12*3600*1000 && ['new_enquiry','docs','fact_find'].includes(cs.stage)) dueSoonDeadlines.push({case: cs, kind: 'submit', when: subMs, label: 'Submit'});
    }
  });
  overdueDeadlines.sort((a,b) => a.when - b.when);
  dueSoonDeadlines.sort((a,b) => a.when - b.when);

  // Admin-only: pending edit + delete requests
  let editRequests = [];
  let deleteRequests = [];
  if(isAdmin){
    (S.commissions||[]).forEach(c => {
      if(c.editRequest){
        try {
          const req = JSON.parse(c.editRequest);
          if(req && req.by) editRequests.push({comm: c, req: req});
        } catch(e) {}
      }
      if(c.pendingDelete){
        try {
          const req = JSON.parse(c.pendingDelete);
          if(req && req.by) deleteRequests.push({comm: c, req: req});
        } catch(e) {}
      }
    });
  }

  if(dueSoon.length === 0 && overdue.length === 0 && pendingUpfront.length === 0 && editRequests.length === 0 && deleteRequests.length === 0 && settledNoComm.length === 0 && overdueDeadlines.length === 0 && dueSoonDeadlines.length === 0) return '';

  dueSoon.sort((a,b) => a._exp.localeCompare(b._exp));
  overdue.sort((a,b) => a._exp.localeCompare(b._exp));

  const dueSoonTotal = dueSoon.reduce((s,c)=>s+Number(c.amount||0),0);
  const overdueTotal = overdue.reduce((s,c)=>s+Number(c.amount||0),0);
  const upfrontTotal = pendingUpfront.reduce((s,c)=>s+Number(c.amount||0),0);

  const fmtDay = (iso) => {
    const d = new Date(iso);
    return isNaN(d.getTime()) ? iso : d.toLocaleDateString('en-AU', {day:'numeric', month:'short'});
  };
  const daysLate = (iso) => Math.floor((now - new Date(iso)) / 86400000);

  // Row renderer \u2014 shows date, amount, client, optional broker (admin only)
  const row = (c, opts) => {
    opts = opts || {};
    const late = opts.overdue ? daysLate(c._exp) : 0;
    return `<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #1e2430;">
      <div style="font-size:11px;color:${opts.overdue?'#DC2626':'#38BDF8'};font-weight:700;width:54px;flex-shrink:0;">${fmtDay(c._exp)}</div>
      <div style="font-size:12px;font-weight:700;color:#c9d1d9;width:90px;flex-shrink:0;text-align:right;">${fmtCur(c.amount)}</div>
      <div style="flex:1;min-width:0;font-size:12px;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.clientName||'\u2014')}${isAdmin&&c.brokerName?` <span style="color:#6b7280;">\u00B7 ${esc(c.brokerName)}</span>`:''}</div>
      ${opts.overdue?`<div style="font-size:10px;color:#DC2626;font-weight:700;flex-shrink:0;">${late}d late</div>`:''}
    </div>`;
  };

  return `<div class="ovr-section-title" style="color:#38BDF8;">\uD83D\uDCC5 Commission reminders</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px;">
    ${overdue.length ? `<div class="ovr-card" style="border-color:#DC262644;background:linear-gradient(135deg,rgba(220,38,38,.06),transparent);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="ovr-card-lbl" style="color:#DC2626;">\u26A0 Overdue trail \u00B7 chase up</div>
        <div style="font-size:13px;font-weight:800;color:#DC2626;">${fmtCur(overdueTotal)}</div>
      </div>
      ${overdue.slice(0,5).map(c => row(c, {overdue:true})).join('')}
      ${overdue.length > 5 ? `<div style="font-size:10.5px;color:#6b7280;text-align:center;margin-top:6px;cursor:pointer;" onclick="S.commTab='monthly_trail';render()">+ ${overdue.length-5} more \u00B7 view in Monthly Trail \u2192</div>` : ''}
    </div>` : ''}
    ${dueSoon.length ? `<div class="ovr-card" style="border-color:#38BDF844;background:linear-gradient(135deg,rgba(56,189,248,.05),transparent);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="ovr-card-lbl" style="color:#38BDF8;">\u23F1 Due next 14 days</div>
        <div style="font-size:13px;font-weight:800;color:#38BDF8;">${fmtCur(dueSoonTotal)}</div>
      </div>
      ${dueSoon.slice(0,5).map(c => row(c, {})).join('')}
      ${dueSoon.length > 5 ? `<div style="font-size:10.5px;color:#6b7280;text-align:center;margin-top:6px;">+ ${dueSoon.length-5} more in this window</div>` : ''}
    </div>` : ''}
    ${pendingUpfront.length ? `<div class="ovr-card" style="border-color:#818CF844;background:linear-gradient(135deg,rgba(129,140,248,.05),transparent);cursor:pointer;" onclick="S.commTab='missing_upfront';render()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="ovr-card-lbl" style="color:#818CF8;">\uD83D\uDCB5 Pending upfront</div>
        <div style="font-size:13px;font-weight:800;color:#818CF8;">${fmtCur(upfrontTotal)}</div>
      </div>
      <div style="font-size:12px;color:#8b949e;line-height:1.6;">${pendingUpfront.length} upfront commission${pendingUpfront.length!==1?'s':''} awaiting receipt.${isAdmin?` Across ${new Set(pendingUpfront.map(c=>c.brokerName||'?')).size} broker(s).`:''}<br><span style="color:#818CF8;font-size:11px;">View Missing Upfronts \u2192</span></div>
    </div>` : ''}
    ${settledNoComm.length ? (() => {
      // Split into "no entry yet" vs "pending entry exists"
      const noEntry = settledNoComm.filter(cs => !pendingUpfrontByCaseId[cs.id]);
      return `<div class="ovr-card" style="border-color:#FB923C55;background:linear-gradient(135deg,rgba(251,146,60,.07),transparent);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div class="ovr-card-lbl" style="color:#FB923C;">\uD83C\uDFE0 Settled \u00B7 upfront not received</div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${isAdmin && noEntry.length > 0 ? `<button class="btn-sm" style="background:linear-gradient(135deg,#FB923C18,#FB923C08);color:#FB923C;border:1px solid #FB923C66;padding:4px 9px;font-size:10.5px;font-weight:700;letter-spacing:.3px;" onclick="autoRecordPendingUpfronts_()" title="Create Pending Upfront entries for the ${noEntry.length} settled case(s) that have none">\uD83E\uDD16 Auto-record ${noEntry.length}</button>` : ''}
            <div style="font-size:13px;font-weight:800;color:#FB923C;">${settledNoComm.length}</div>
          </div>
        </div>
        ${settledNoComm.slice(0,6).map(cs => {
          const pend = pendingUpfrontByCaseId[cs.id];
          const statusBadge = pend
            ? `<span style="font-size:9.5px;color:#FBBF24;background:#FBBF2418;padding:1px 6px;border-radius:4px;font-weight:700;flex-shrink:0;">Pending</span>`
            : `<span style="font-size:9.5px;color:#6b7280;background:#1e2430;padding:1px 6px;border-radius:4px;font-weight:700;flex-shrink:0;">No entry</span>`;
          const onClick = pend
            ? `openEditComm('${esc(pend.id)}')`
            : `quickRecordUpfrontForCase_('${esc(cs.id)}')`;
          return `<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #1e2430;cursor:pointer;" onclick="${onClick}" title="${pend?'Edit pending upfront \u2014 mark Received when lender pays':'Record upfront commission for this case'}">
            <div style="font-size:10.5px;color:#FB923C;font-weight:700;flex-shrink:0;white-space:nowrap;">${esc(cs.settlementDate||'\u2014')}</div>
            ${statusBadge}
            <div style="flex:1;min-width:0;font-size:11px;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cs.clientName||'')} \u00B7 ${fmtCur(cs.loanAmount||0)}</div>
            <div style="font-size:10px;color:#6b7280;flex-shrink:0;">${esc(cs.assignedToName||'')}</div>
          </div>`;
        }).join('')}
        ${settledNoComm.length > 6 ? `<div style="font-size:10.5px;color:#6b7280;text-align:center;margin-top:6px;">+ ${settledNoComm.length-6} more</div>` : ''}
        <div style="font-size:10.5px;color:#FB923C99;margin-top:7px;line-height:1.4;">\uD83D\uDCA1 Click a row to record / edit \u00B7 auto-record creates pending entries (0.65% of loan, end of next month)</div>
      </div>`;
    })() : ''}
    ${overdueDeadlines.length ? `<div class="ovr-card" style="border-color:#DC262666;background:linear-gradient(135deg,rgba(220,38,38,.08),transparent);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="ovr-card-lbl" style="color:#DC2626;">\u23F0 Deadline OVERDUE \u00B7 act now</div>
        <div style="font-size:13px;font-weight:800;color:#DC2626;">${overdueDeadlines.length}</div>
      </div>

function rCommOverview(missing, trail){
  const scope = _commScope();
  const d = scope.commissions.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const rec = d.filter(c=>c.status==='Received').reduce((s,c)=>s+Number(c.amount||0),0);
  const pend = d.filter(c=>c.status==='Pending').reduce((s,c)=>s+Number(c.amount||0),0);
  const clawbackTotal = d.filter(c=>c.type==='Clawback'&&c.status==='Received').reduce((s,c)=>s+Math.abs(Number(c.amount||0)),0);
  const upfrontRec = d.filter(c=>c.status==='Received'&&c.type==='Upfront').reduce((s,c)=>s+Number(c.amount||0),0);
  const trailRec = d.filter(c=>c.status==='Received'&&c.type==='Trail').reduce((s,c)=>s+Number(c.amount||0),0);

  const missingTotal = missing.reduce((s, m) => s + m.expected, 0);
  const missingOverdue = missing.filter(m => m.daysSince != null && m.daysSince > 30);

  const trailExpected = trail.rows.reduce((s, r) => s + r.expected, 0);
  const trailReceived = trail.rows.reduce((s, r) => s + r.received, 0);
  const trailPct = trailExpected > 0 ? Math.round(trailReceived / trailExpected * 100) : 0;
  const trailMissingCount = trail.rows.filter(r => r.status === 'missing').length;

  const activeLoans = scope.loans.filter(l => l.status === 'Active').length;
  const expectedMonthlyTrail = scope.loans
    .filter(l => l.status === 'Active')
    .reduce((s, l) => s + (Number(l.trailMonthly) || 0), 0);
  const expectedAnnualTrail = expectedMonthlyTrail * 12;

  return `<style>

async function markUpfrontReceived(commId, loanId){
  const today = new Date().toISOString().split('T')[0];
  const dateInput = prompt(
    'Mark upfront commission as Received.\n\n' +
    'Actual receipt date (YYYY-MM-DD)?\n' +
    'Leave default for today.',
    today
  );
  if(dateInput === null) return;
  const rcvDate = String(dateInput||'').trim() || today;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(rcvDate)){
    toast('Invalid date format \u2014 use YYYY-MM-DD', 1);
    return;
  }
  showLoad();
  const r = await gs_('updateCommission', S.tok, commId, {status:'Received', receivedDate: rcvDate});
  hideLoad();
  if(r && r.ok){
    S.commissions = S.commissions.map(c => c.id === commId ? {...c, status:'Received', receivedDate: rcvDate} : c);
    toast(`\u2713 Marked Received on ${rcvDate}`);
    render();
  } else toast((r && r.msg) || 'Failed', 1);
}

function quickAddMissingUpfront(loanId){
  const loan = S.loanBook.find(l => l.id === loanId);
  if(!loan){toast('Loan not found', 1); return;}
  openModal('addComm');
  // Once modal renders, auto-pull from the loan
  setTimeout(() => {
    const sel = document.getElementById('cm-li');
    if(sel){
      sel.value = loanId;
      autofillCommFromLoan(loanId);
    }
  }, 60);
}

// Derive the expected receipt date for a Trail commission entry.
// Falls back through 3 sources in priority order:
//   1. expectedDate column (post-migration entries) \u2014 most reliable
//   2. Parse period text "Mar 2024" + look up loan's settlement day as anchor
//   3. receivedDate (for already-received entries)
// Returns 'YYYY-MM-DD' string, or '' if nothing usable.
function _deriveTrailExpectedDate(c){
  if(c.expectedDate){
    const s = String(c.expectedDate);
    if(s.length >= 10) return s.slice(0, 10);
  }
  // Parse period like "Mar 2024" \u2192 year + monthIdx
  let year = null, monthIdx = null;
  if(c.period){
    const m = /^([A-Za-z]{3,9})\s+(\d{4})$/.exec(String(c.period).trim());
    if(m){
      const monthNames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      const mLower = m[1].toLowerCase().slice(0,3);
      const mi = monthNames.indexOf(mLower);
      if(mi >= 0){
        monthIdx = mi;
        year = parseInt(m[2], 10);
      }
    }
  }
  // Look up loan to find anchor day-of-month (settlement day)
  let anchorDay = 15; // safe default mid-month
  if(c.loanId && Array.isArray(S.loanBook)){
    const loan = S.loanBook.find(l => l.id === c.loanId);
    if(loan && loan.settlementDate){
      const sd = new Date(loan.settlementDate);
      if(!isNaN(sd.getTime())){
        anchorDay = sd.getDate();
      }
    }
  }
  if(year !== null && monthIdx !== null){
    // Clip anchor to month length (e.g. anchor=31 in Feb \u2192 28/29)
    const lastDay = new Date(year, monthIdx+1, 0).getDate();
    const day = Math.min(anchorDay, lastDay);
    return year + '-' + String(monthIdx+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  }
  // Last-chance fallback: receivedDate (for entries already marked received)
  if(c.receivedDate){
    const s = String(c.receivedDate);
    if(s.length >= 10) return s.slice(0, 10);
  }
  return '';
}

// "Outstanding" past trail \u2014 entries marked Pending whose expectedDate (or month)
// is already in the past. This is the "money you should have received but haven't"
// figure \u2014 broker needs it prominent to chase lenders.
function _buildOutstandingTrailCard(){
  const now = new Date();
  const todayIso = now.toISOString().slice(0,10);

  const overdue = (S.commissions||[]).filter(c => {
    if(c.type !== 'Trail') return false;
    if(String(c.status||'').toLowerCase() !== 'pending') return false;
    const exp = _deriveTrailExpectedDate(c);
    if(!exp) return false;
    return exp < todayIso;  // strict day-level comparison \u2014 handles current-month overdues
  });

  if(overdue.length === 0) return '';

  const totalOverdue = overdue.reduce((s,c) => s + (Number(c.amount)||0), 0);

  // Group by loan with month count + oldest expected date
  const byLoan = {};
  overdue.forEach(c => {
    const k = c.loanId || ('client:'+(c.clientName||'unknown'));
    if(!byLoan[k]){
      byLoan[k] = {
        loanId: c.loanId || '',
        clientName: c.clientName || 'Unknown',
        caseId: c.caseId || '',
        items: [],
        total: 0,
        oldestExp: null,
      };
    }
    byLoan[k].items.push(c);
    byLoan[k].total += Number(c.amount) || 0;
    const exp = _deriveTrailExpectedDate(c);
    if(exp && (!byLoan[k].oldestExp || exp < byLoan[k].oldestExp)){
      byLoan[k].oldestExp = exp;
    }
  });
  const loans = Object.values(byLoan).sort((a,b) => b.total - a.total);

  // Compute global oldest for the header
  const oldestExp = loans.map(L => L.oldestExp).filter(Boolean).sort()[0] || '';
  let oldestDays = 0;
  if(oldestExp){
    oldestDays = Math.floor((now - new Date(oldestExp)) / 86400000);
  }

  return `<div class="card" style="padding:14px 17px;margin-bottom:14px;background:linear-gradient(135deg,rgba(220,38,38,.08),rgba(220,38,38,.02));border-color:#DC262655;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;flex-wrap:wrap;gap:8px;">
      <div>
        <div style="font-size:11.5px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:7px;">\uD83D\uDCB0 Outstanding \u00B7 not yet received</div>
        <div style="font-size:11px;color:#8b949e;margin-top:3px;">${overdue.length} pending entr${overdue.length===1?'y':'ies'} across ${loans.length} loan${loans.length===1?'':'s'}${oldestDays>0?` \u00B7 oldest <strong style="color:#DC2626;">${oldestDays} days</strong> overdue`:''}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:22px;font-weight:800;color:#DC2626;font-family:'Outfit',sans-serif;line-height:1;">${fmtCur(totalOverdue)}</div>
        <div style="font-size:10px;color:#8b949e;margin-top:3px;">total missing</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px;">
      ${loans.slice(0, 8).map(L => {
        const daysOverdue = L.oldestExp ? Math.floor((now - new Date(L.oldestExp)) / 86400000) : 0;
        return `<div style="background:#0f1420;border:1px solid #DC262633;border-radius:8px;padding:9px 11px;transition:border-color .15s;" onmouseover="this.style.borderColor='#DC262688'" onmouseout="this.style.borderColor='#DC262633'">
          <div style="font-size:11.5px;font-weight:700;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(L.clientName)}</div>
          <div style="font-size:10px;color:#6b7280;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(L.loanId||L.caseId||'\u2014')} \u00B7 ${L.items.length} month${L.items.length===1?'':'s'}${daysOverdue>0?` \u00B7 ${daysOverdue}d`:''}</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;">
            <span style="font-size:15px;font-weight:800;color:#DC2626;">${fmtCur(L.total)}</span>
            <span style="font-size:10px;color:#8b949e;">${fmtCur(L.total / L.items.length)}/mo</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${loans.length > 8 ? `<div style="font-size:11px;color:#6b7280;text-align:center;margin-top:9px;font-style:italic;">+ ${loans.length - 8} more loan${loans.length - 8 === 1 ? '' : 's'} with missing trail \u00B7 use "Missing only" filter below to see full list</div>` : ''}
    <div style="font-size:10.5px;color:#8b949e;margin-top:11px;line-height:1.5;padding-top:9px;border-top:1px dashed #DC262633;">\uD83D\uDCA1 Each entry's expected day = loan's settlement day-of-month. Past that \u2192 counted as outstanding. Mark "Received" below as money arrives.</div>
  </div>`;
}

// Build the "Upcoming Trail \u00B7 next 6 months" strip that sits at the top of the
// Monthly Trail tab. Excludes entries already counted in Outstanding (overdue)
// so each Pending entry appears in exactly one place.
function _buildUpcomingTrailStrip(){
  const now = new Date();
  // Build 6 month buckets starting from CURRENT month
  const buckets = [];
  for(let i = 0; i < 6; i++){
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const ymKey = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    buckets.push({
      key: ymKey,
      year: d.getFullYear(),
      month: d.getMonth(),
      label: d.toLocaleDateString('en-AU', {month:'short', year:'2-digit'}),
      total: 0,
      count: 0,
      anchorDay: null,  // most common day across entries
      receivedCount: 0,
    });
  }
  const bucketMap = {};
  buckets.forEach(b => { bucketMap[b.key] = b; });

  // Walk through all Trail commissions, using the shared expectedDate derivation.
  // Importantly: SKIP Pending entries whose expectedDate is already in the past \u2014
  // those are accounted for in the Outstanding card. This makes the two cards
  // mutually exclusive (no double-counting).
  const todayIso = now.toISOString().slice(0,10);
  const trailComms = (S.commissions||[]).filter(c => c.type === 'Trail');
  const dayCounts = {};
  buckets.forEach(b => { dayCounts[b.key] = {}; });
  trailComms.forEach(c => {
    const exp = _deriveTrailExpectedDate(c);
    if(!exp) return;
    const isPending = String(c.status||'').toLowerCase() === 'pending';
    // Exclude overdue pending \u2192 they're in the Outstanding card
    if(isPending && exp < todayIso) return;
    const ymKey = exp.slice(0,7);
    const b = bucketMap[ymKey];
    if(!b) return;  // outside 6-month window
    const amt = Number(c.amount) || 0;
    b.total += amt;
    b.count++;
    if(String(c.status||'').toLowerCase() === 'received') b.receivedCount++;
    const day = parseInt(exp.slice(8,10), 10);
    if(!isNaN(day)){
      dayCounts[b.key][day] = (dayCounts[b.key][day] || 0) + 1;
    }
  });

  // Derive anchor day per bucket \u2014 most common expectedDate day in that month
  buckets.forEach(b => {
    const dc = dayCounts[b.key] || {};
    let best = null, bestN = 0;
    Object.keys(dc).forEach(d => {
      if(dc[d] > bestN){ bestN = dc[d]; best = parseInt(d, 10); }
    });
    b.anchorDay = best;
  });

  // If no upcoming data at all, show a hint card
  const grandTotal = buckets.reduce((s,b) => s + b.total, 0);
  if(grandTotal === 0){
    return `<div class="card" style="padding:14px 17px;margin-bottom:14px;background:rgba(167,139,250,.04);border-color:#A78BFA22;">
      <div style="display:flex;align-items:center;gap:11px;">
        <div style="font-size:18px;">\uD83D\uDCC5</div>
        <div style="flex:1;">
          <div style="font-size:12.5px;font-weight:700;color:#A78BFA;">Upcoming Trail \u00B7 next 6 months</div>
          <div style="font-size:11px;color:#8b949e;margin-top:3px;">No forecast yet. Click <strong>\uD83E\uDD16 Auto-generate</strong> above to create future pending trail entries \u2014 you'll see when each month's trail is expected to land.</div>
        </div>
      </div>
    </div>`;
  }

  return `<div class="card" style="padding:13px 17px;margin-bottom:14px;background:linear-gradient(135deg,rgba(167,139,250,.04),transparent);border-color:#A78BFA33;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;">
      <div style="font-size:11.5px;font-weight:700;color:#A78BFA;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:7px;">\uD83D\uDCC5 Upcoming Trail \u00B7 next 6 months</div>
      <div style="font-size:11px;color:#8b949e;">Forecast total: <strong style="color:#A78BFA;">${fmtCur(grandTotal)}</strong></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:7px;">
      ${buckets.map(b => {
        const isCurrent = (b.year === now.getFullYear() && b.month === now.getMonth());
        const allReceived = b.count > 0 && b.receivedCount === b.count;
        const color = allReceived ? '#34D399' : isCurrent ? '#FBBF24' : '#A78BFA';
        return `<div onclick="jumpToTrailMonth_(${b.year},${b.month})" style="background:#0f1420;border:1px solid ${color}33;border-radius:8px;padding:9px 10px;cursor:pointer;transition:all .15s;${isCurrent?'box-shadow:inset 0 0 0 1px '+color+'55;':''}" onmouseover="this.style.borderColor='${color}88'" onmouseout="this.style.borderColor='${color}33'">
          <div style="font-size:10px;color:${color};text-transform:uppercase;letter-spacing:.7px;font-weight:700;">${esc(b.label)}${isCurrent?' \u00B7 NOW':''}</div>
          <div style="font-size:14px;font-weight:800;color:${b.total>0?'#c9d1d9':'#4a5568'};margin-top:2px;font-family:'Outfit',sans-serif;">${b.total>0?fmtCur(b.total):'\u2014'}</div>
          <div style="font-size:10px;color:#6b7280;margin-top:1px;">${b.count} ${b.count===1?'loan':'loans'}${b.anchorDay?` \u00B7 due ${_ordinal_(b.anchorDay)}`:''}</div>
          ${b.count>0?`<div style="font-size:9.5px;margin-top:3px;color:${allReceived?'#34D399':b.receivedCount>0?'#FBBF24':'#6b7280'};">${b.receivedCount}/${b.count} received</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:10.5px;color:#4a5568;margin-top:9px;line-height:1.5;">\uD83D\uDCA1 Click any month to jump to it. Auto-generate updates this strip with the next 12 months of pending trails per loan.</div>
  </div>`;
}

function _ordinal_(n){
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function changeTrailMonth(delta){
  if(!S.trailMonth){
    const t = new Date();
    S.trailMonth = {year: t.getFullYear(), month: t.getMonth()};
  }
  const d = new Date(S.trailMonth.year, S.trailMonth.month + delta, 1);
  S.trailMonth = {year: d.getFullYear(), month: d.getMonth()};
  render();
}
function resetTrailMonth(){
  const t = new Date();
  S.trailMonth = {year: t.getFullYear(), month: t.getMonth()};
  render();
}

// 1-click automation: auto-generate Pending Trail entries for every completed
// month since each Active loan settled, skipping months that already have entries.
// Respects role scope (broker sees own loans only; admin sees all).
async function autoGenerateTrailEntries_(){
  // Pre-compute frontend preview that mirrors backend logic exactly:
  //   - Past months catch-up (since loan settled, up to LAST FULL month)
  //   - Future months forecast (next 12 months from current month forward)
  // Both contribute to plannedCount/Amount but split for the confirm dialog
  // so the broker sees "I'm catching up X past months AND forecasting Y future".
  const scope = _commScope();
  const activeLoans = scope.loans.filter(l => String(l.status||'').toLowerCase() === 'active');
  if(!activeLoans.length){
    toast('No active loans found in scope', 1);
    return;
  }

  const today = new Date();
  let lastY = today.getFullYear();
  let lastM = today.getMonth() - 1;
  if(lastM < 0){ lastM = 11; lastY--; }
  const FUTURE_MONTHS = 12;
  const lastEligible = new Date(lastY, lastM, 1).toLocaleDateString('en-AU', {month:'long', year:'numeric'});

  let pastCount = 0, futureCount = 0;
  let pastAmount = 0, futureAmount = 0;
  const plannedByLoan = {};
  let skippedNoSettle = 0;
  let skippedNoTrail = 0;

  function periodToKey(p){
    if(!p) return '';
    const t = String(p).trim();
    const iso = t.match(/^(\d{4})-(\d{1,2})/);
    if(iso){
      const mm = parseInt(iso[2], 10);
      if(mm >= 1 && mm <= 12) return iso[1] + '-' + (mm < 10 ? '0' : '') + mm;
    }
    const monthMap = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
                      january:1,february:2,march:3,april:4,june:6,july:7,august:8,
                      september:9,october:10,november:11,december:12};
    const parts = t.toLowerCase().split(/[\s,\/\-]+/).filter(Boolean);
    let m = 0, y = 0;
    parts.forEach(p2 => {
      if(monthMap[p2]) m = monthMap[p2];
      else { const n = parseInt(p2,10); if(n>=2000 && n<=2100) y = n; }
    });
    if(m && y) return y + '-' + (m < 10 ? '0' : '') + m;
    return '';
  }

  activeLoans.forEach(loan => {
    if(!loan.settlementDate){ skippedNoSettle++; return; }
    const trailMonthly = Number(loan.trailMonthly) || 0;
    if(trailMonthly <= 0){ skippedNoTrail++; return; }
    const settled = new Date(loan.settlementDate);
    if(isNaN(settled.getTime())){ skippedNoSettle++; return; }

    let startY = settled.getFullYear();
    let startM = settled.getMonth() + 1;
    if(startM > 11){ startM = 0; startY++; }

    // Build existing key set per loan (already-recorded months we should skip)
    const existing = {};
    scope.commissions
      .filter(c => c.loanId === loan.id && c.type === 'Trail')
      .forEach(c => {
        if(c.receivedDate){
          const s = String(c.receivedDate);
          if(s.length >= 7) existing[s.slice(0,7)] = true;
        }
        if(c.expectedDate){
          const s = String(c.expectedDate);
          if(s.length >= 7) existing[s.slice(0,7)] = true;
        }
        if(c.period){
          const k = periodToKey(c.period);
          if(k) existing[k] = true;
        }
      });

    // Past months catch-up: from first eligible month \u2192 last full month
    let y = startY, m = startM;
    while(y < lastY || (y === lastY && m <= lastM)){
      const key = y + '-' + (m < 9 ? '0' : '') + (m + 1);
      if(!existing[key]){
        pastCount++;
        plannedByLoan[loan.id] = plannedByLoan[loan.id] || {count:0, amt:0, name:loan.clientName||''};
        plannedByLoan[loan.id].count++;
        plannedByLoan[loan.id].amt += trailMonthly;
        pastAmount += trailMonthly;
        existing[key] = true;
      }
      m++;
      if(m > 11){ m = 0; y++; }
    }

    // Future months: next 12 from current month forward
    let futureY = today.getFullYear();
    let futureM = today.getMonth();
    for(let i = 0; i < FUTURE_MONTHS; i++){
      const fkey = futureY + '-' + (futureM < 9 ? '0' : '') + (futureM + 1);
      const afterStart = futureY > startY || (futureY === startY && futureM >= startM);
      if(afterStart && !existing[fkey]){
        futureCount++;
        plannedByLoan[loan.id] = plannedByLoan[loan.id] || {count:0, amt:0, name:loan.clientName||''};
        plannedByLoan[loan.id].count++;
        plannedByLoan[loan.id].amt += trailMonthly;
        futureAmount += trailMonthly;
        existing[fkey] = true;
      }
      futureM++;
      if(futureM > 11){ futureM = 0; futureY++; }
    }
  });

  const totalCount = pastCount + futureCount;
  const totalAmount = pastAmount + futureAmount;
  const loansAffected = Object.keys(plannedByLoan).length;

  if(totalCount === 0){
    let msg = `Nothing to generate \u2014 all months already covered.\n\n`;
    msg += `\u00B7 Active loans in scope: ${activeLoans.length}\n`;
    msg += `\u00B7 Catch-up through: ${lastEligible}\n`;
    msg += `\u00B7 Forecast horizon: next ${FUTURE_MONTHS} months\n`;
    if(skippedNoSettle) msg += `\u00B7 Skipped (no settlement date): ${skippedNoSettle}\n`;
    if(skippedNoTrail) msg += `\u00B7 Skipped (no trail amount): ${skippedNoTrail}\n`;
    alert(msg);
    return;
  }

  // \u2500\u2500\u2500\u2500\u2500 Confirm dialog with full breakdown \u2500\u2500\u2500\u2500\u2500
  let confirmMsg = `Auto-generate ${totalCount} Trail entries across ${loansAffected} loan${loansAffected===1?'':'s'}?\n\n`;
  if(pastCount > 0){
    confirmMsg += `\uD83D\uDD04 Catch-up (past months)\n`;
    confirmMsg += `   ${pastCount} entries \u00B7 ${fmtCur(pastAmount)}\n`;
    confirmMsg += `   These will appear as OVERDUE in Outstanding card\n\n`;
  }
  if(futureCount > 0){
    confirmMsg += `\uD83D\uDCC5 Forecast (next ${FUTURE_MONTHS} months)\n`;
    confirmMsg += `   ${futureCount} entries \u00B7 ${fmtCur(futureAmount)}\n`;
    confirmMsg += `   These will appear in Upcoming Trail strip\n\n`;
  }
  confirmMsg += `\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n`;
  confirmMsg += `TOTAL: ${totalCount} entries \u00B7 ${fmtCur(totalAmount)}\n\n`;
  confirmMsg += `\u00B7 All status = Pending \u2014 mark Received as money arrives\n`;
  confirmMsg += `\u00B7 Expected date = settlement day-of-month each month\n`;
  if(skippedNoSettle) confirmMsg += `\u00B7 Loans skipped (no settlement date): ${skippedNoSettle}\n`;
  if(skippedNoTrail) confirmMsg += `\u00B7 Loans skipped (no trail amount): ${skippedNoTrail}\n`;
  confirmMsg += `\nProceed?`;

  if(!confirm(confirmMsg)) return;

  showLoad();
  const r = await gs_('autoGenerateTrailEntries', S.tok);
  hideLoad();

  if(r && r.ok){
    const cr = await gs_('getCommissions', S.tok);
    if(cr && cr.ok){
      S.commissions = cr.data || [];
    }
    const data = r.data || {};

    // \u2500\u2500\u2500\u2500\u2500 Detailed result summary \u2500\u2500\u2500\u2500\u2500
    // Build per-loan breakdown sorted by amount descending
    const loanBreakdown = Object.keys(plannedByLoan)
      .map(id => ({id, ...plannedByLoan[id]}))
      .sort((a,b) => b.amt - a.amt);

    let resultMsg = `\u2705 ${data.created} trail entries created\n\n`;
    resultMsg += `\uD83D\uDCCA BREAKDOWN\n`;
    resultMsg += `   Past catch-up:   ${pastCount} entries \u00B7 ${fmtCur(pastAmount)}\n`;
    resultMsg += `   Future forecast: ${futureCount} entries \u00B7 ${fmtCur(futureAmount)}\n`;
    resultMsg += `   \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n`;
    resultMsg += `   Total committed: ${fmtCur(totalAmount)}\n\n`;
    resultMsg += `\uD83C\uDFE6 LOANS (${loansAffected})\n`;
    loanBreakdown.slice(0, 8).forEach(L => {
      const name = (L.name || L.id || 'Unknown').slice(0, 28);
      resultMsg += `   ${name.padEnd(30)} ${L.count}\u00D7 = ${fmtCur(L.amt)}\n`;
    });
    if(loanBreakdown.length > 8){
      resultMsg += `   + ${loanBreakdown.length - 8} more loans\n`;
    }
    resultMsg += `\n\uD83D\uDCA1 NEXT STEPS\n`;
    if(pastCount > 0){
      resultMsg += `   1. Check Outstanding card \u2014 chase up ${fmtCur(pastAmount)} past due\n`;
    }
    resultMsg += `   ${pastCount > 0 ? '2' : '1'}. Watch Upcoming Trail strip for next monthly receipts\n`;
    resultMsg += `   ${pastCount > 0 ? '3' : '2'}. Each row \u2192 click "+ Record" to mark Received\n`;

    alert(resultMsg);
    toast(`\u2713 ${data.created} entries \u00B7 ${fmtCur(totalAmount)} committed`);

    // Switch to Monthly Trail tab so user sees the new entries immediately
    S.commTab = 'monthly_trail';
    render();
  } else {
    toast((r && r.msg) || 'Failed to generate trail entries', 1);
  }
}

          <div><div style="font-size:9.5px;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;">Period</div><div style="font-size:13px;color:#c9d1d9;font-weight:600;margin-top:1px;">${esc(c.period||'\u2014')}</div></div>

          <div><div style="font-size:9.5px;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;">Expected</div><div style="font-size:12px;color:#8b949e;font-weight:600;margin-top:1px;">${expDate?esc(expDate):'\u2014'}</div></div>
        </div>

        <!-- Status toggle -->
        <div>
          <label class="fl">Status</label>
          <div style="display:flex;gap:7px;margin-top:3px;">
            <button type="button" id="tr-st-pending" class="btn-sec" style="flex:1;padding:9px;font-size:13px;${!isReceived?'background:#38BDF818;color:#38BDF8;border-color:#38BDF855;':''}" onclick="_trSetStatus('Pending')">\u23F1 Pending</button>
            <button type="button" id="tr-st-received" class="btn-sec" style="flex:1;padding:9px;font-size:13px;${isReceived?'background:#34D39918;color:#34D399;border-color:#34D39955;':''}" onclick="_trSetStatus('Received')">\u2713 Received</button>

async function saveTrailReceipt_(){
  const c = S.commissions.find(x => x.id === S.trailReceiptId);
  if(!c) return;
  const g = (id) => { const e = document.getElementById(id); return e ? e.value : ''; };
  const amount = unfmtMoney(g('tr-am'));
  const status = g('tr-st') || 'Received';
  const date = g('tr-rd');
  const notes = g('tr-no');

  if(amount <= 0){ toast('Amount must be greater than zero', 1); return; }

  if(status === 'Received'){
    if(!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)){ toast('Pick a valid receipt date', 1); return; }
    showLoad();
    // markTrailReceived handles status+date+amount AND re-anchors future months
    // (mode B: only on the first received trail of the loan)
    const r = await gs_('markTrailReceived', S.tok, c.id, date, amount);
    if(r && r.ok && notes !== (c.notes||'')){
      await gs_('updateCommission', S.tok, c.id, {notes});
    }
    hideLoad();
    if(r && r.ok){
      const cr = await gs_('getCommissions', S.tok);
      if(cr && cr.ok) S.commissions = cr.data || [];
      const reanchored = (r.data && r.data.reanchored) || 0;
      const wasFirst = r.data && r.data.wasFirst;
      let msg = `\u2713 Received ${fmtCur(amount)} on ${date}`;
      if(wasFirst && reanchored > 0){
        msg += ` \u00B7 Locked future ${reanchored} month${reanchored===1?'':'s'} to day ${(r.data.newAnchorDay)}`;
      }
      toast(msg);
      closeModal(); render();
    } else toast((r && r.msg) || 'Failed', 1);
  } else {
    // Keep Pending \u2014 update editable fields only, don't re-anchor
    showLoad();
    const changes = { status:'Pending', amount, notes, receivedDate:'' };
    const r = await gs_('updateCommission', S.tok, c.id, changes);
    hideLoad();
    if(r && r.ok){
      S.commissions = S.commissions.map(x => x.id === c.id ? {...x, ...changes} : x);
      toast('\u2713 Updated');
      closeModal(); render();
    } else toast((r && r.msg) || 'Failed', 1);
  }
}

async function markTrailReceivedDialog_(commId, expectedAmount, loanLabel){
  const today = new Date().toISOString().split('T')[0];

  // Step 1 \u2014 date
  const dateInput = prompt(
    `Mark Trail Received \u00B7 ${loanLabel}\n\n` +
    `Actual receipt date (YYYY-MM-DD):\n` +
    `Leave default for today.\n\n` +
    `\uD83D\uDCCC On the FIRST receipt for a loan, this date's day-of-month\n` +
    `   becomes the locked anchor for all future expected dates.\n` +
    `   Later receipts won't shift the schedule.`,
    today
  );
  if(dateInput === null) return;
  const actualDate = String(dateInput||'').trim() || today;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(actualDate)){
    toast('Invalid date format \u2014 use YYYY-MM-DD', 1);
    return;
  }

  // Step 2 \u2014 amount
  const amtInput = prompt(
    `Actual amount received?\n\n` +
    `Default expected: $${Number(expectedAmount||0).toFixed(2)}\n` +
    `Enter the different amount if lender paid a different figure.`,
    String(Number(expectedAmount||0).toFixed(2))
  );
  if(amtInput === null) return;
  const actualAmount = Number(String(amtInput||'').replace(/[$,\s]/g, '')) || Number(expectedAmount) || 0;
  if(actualAmount <= 0){
    toast('Amount must be greater than zero', 1);
    return;
  }

  showLoad();
  const r = await gs_('markTrailReceived', S.tok, commId, actualDate, actualAmount);
  hideLoad();

  if(r && r.ok){
    // Refresh commissions to pick up the updated row + any re-anchored future rows
    const cr = await gs_('getCommissions', S.tok);
    if(cr && cr.ok) S.commissions = cr.data || [];
    const reanchored = (r.data && r.data.reanchored) || 0;
    const newDay = (r.data && r.data.newAnchorDay) || 0;
    const wasFirst = r.data && r.data.wasFirst;
    let msg = `\u2713 Received ${fmtCur(actualAmount)} on ${actualDate}`;
    if(wasFirst && reanchored > 0){
      msg += ` \u00B7 First receipt \u2014 locked future ${reanchored} month${reanchored===1?'':'s'} to day ${newDay}`;
    }
    toast(msg);
    render();
  } else toast((r && r.msg) || 'Failed to mark received', 1);
}

// Auto-saves YTD + RecNotes drafts to the linked case ~2s after typing stops.
// Survives page refresh, lets broker pick up where they left off on a case.
let _docSaveTimer = null;
let _docYtdDirty = false;
let _docRecDirty = false;
let _docYtdSavedAt = 0;
let _docRecSavedAt = 0;
let _docYtdSaving = false;
let _docRecSaving = false;

function _scheduleDocSave(which){
  if(which === 'ytd') _docYtdDirty = true;
  else if(which === 'rec') _docRecDirty = true;
  if(_docSaveTimer) clearTimeout(_docSaveTimer);
  _docSaveTimer = setTimeout(_flushDocSave, 2000);
}

async function _flushDocSave(){
  _docSaveTimer = null;
  const calls = [];
  if(_docYtdDirty && S.docYtd && S.docYtd.caseId){
    _docYtdSaving = true;
    calls.push({kind:'ytd', caseId: S.docYtd.caseId, data: {...S.docYtd}});
  }
  if(_docRecDirty && S.docRec && S.docRec.caseId){
    _docRecSaving = true;
    calls.push({kind:'rec', caseId: S.docRec.caseId, data: {...S.docRec}});
  }
  if(!calls.length){ _docYtdDirty = _docRecDirty = false; return; }

  await Promise.all(calls.map(async c => {
    try {
      const r = await gs_('saveCaseDocData', S.tok, c.caseId, c.kind, c.data);
      if(r && r.ok){
        // Update local case cache so reopening shows the saved data
        const caseObj = S.cases.find(x => x.id === c.caseId);
        if(caseObj){
          caseObj[c.kind === 'ytd' ? 'ytdData' : 'recNotesData'] = JSON.stringify(c.data);
        }
        if(c.kind === 'ytd'){ _docYtdSavedAt = Date.now(); _docYtdDirty = false; _docYtdSaving = false; }
        else { _docRecSavedAt = Date.now(); _docRecDirty = false; _docRecSaving = false; }
      } else {
        if(c.kind === 'ytd') _docYtdSaving = false;
        else _docRecSaving = false;
      }
    } catch(e){
      if(c.kind === 'ytd') _docYtdSaving = false;
      else _docRecSaving = false;
    }
  }));

  // Trigger a render to update the save indicator
  _renderSaveIndicator();
}

// Update the small "Last saved" indicator without re-rendering whole form
// (avoids interrupting typing focus)
function _renderSaveIndicator(){
  const indi = document.getElementById('doc-save-indi');
  if(indi){
    const which = S.docTab === 'ytd' ? 'ytd' : 'rec';
    const savedAt = which === 'ytd' ? _docYtdSavedAt : _docRecSavedAt;
    const saving = which === 'ytd' ? _docYtdSaving : _docRecSaving;
    const dirty = which === 'ytd' ? _docYtdDirty : _docRecDirty;
    indi.innerHTML = _saveIndicatorHtml(savedAt, saving, dirty);
  }
}

function _saveIndicatorHtml(savedAt, saving, dirty){
  if(saving) return '<span style="color:#FBBF24;">\u27F3 Saving\u2026</span>';
  if(dirty) return '<span style="color:#6b7280;">\u25CF Unsaved changes</span>';
  if(savedAt > 0){
    const ago = Math.floor((Date.now() - savedAt) / 1000);
    let agoText;
    if(ago < 5) agoText = 'just now';
    else if(ago < 60) agoText = ago + 's ago';
    else if(ago < 3600) agoText = Math.floor(ago/60) + 'm ago';
    else agoText = Math.floor(ago/3600) + 'h ago';
    return `<span style="color:#34D399;">\u2713 Saved \u00B7 ${agoText}</span>`;
  }
  return '';
}

// Load saved draft from case (if any) when linking a case to YTD form.
function _loadYtdFromCase(c){
  if(!c) return false;
  if(c.ytdData){
    try {
      const saved = JSON.parse(c.ytdData);
      if(saved && typeof saved === 'object'){
        // Merge: saved data wins over defaults; ensure caseId stays in sync
        S.docYtd = {...S.docYtd, ...saved, caseId: c.id};
        // Backfill arrays if missing
        if(!Array.isArray(S.docYtd.additionalIncomes)) S.docYtd.additionalIncomes = [];
        if(!Array.isArray(S.docYtd.deductions)) S.docYtd.deductions = [];
        return true;
      }
    } catch(e){ /* fall through to defaults */ }
  }
  return false;
}
function _loadRecFromCase(c){
  if(!c) return false;
  if(c.recNotesData){
    try {
      const saved = JSON.parse(c.recNotesData);
      if(saved && typeof saved === 'object'){
        S.docRec = {...S.docRec, ...saved, caseId: c.id};
        if(!Array.isArray(S.docRec.otherDebts)) S.docRec.otherDebts = [];
        return true;
      }
    } catch(e){}
  }
  return false;
}

// Small inline copy button \u2014 renders a \uD83D\uDCCB icon that copies the number-only form
// (no $ or commas) to clipboard. Perfect for paste-into-lender-app workflow.
function _copyBtn(num){
  const raw = Number(num) || 0;
  // 2-decimal precision is standard for income figures
  const cleanVal = raw.toFixed(2);
  return `<button class="ytd-copy" title="Copy ${cleanVal} to clipboard" onclick="copyVal_('${cleanVal}',event)" style="background:transparent;border:none;color:#6b7280;cursor:pointer;font-size:11px;margin-left:6px;padding:1px 4px;border-radius:3px;vertical-align:middle;opacity:.6;transition:opacity .15s,color .15s;" onmouseover="this.style.opacity='1';this.style.color='#D4A843'" onmouseout="this.style.opacity='.6';this.style.color='#6b7280'">\uD83D\uDCCB</button>`;
}

async function copyVal_(text, ev){
  if(ev){ ev.stopPropagation(); }
  try {
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    } else {
      // Fallback: temporary textarea + execCommand
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast(`\u2713 Copied ${text}`);
  } catch(e){
    toast('Copy failed \u2014 select manually', 1);
  }
}

// Compute YTD preview values from the form state. Returns null when not enough
// data is present. Cheap: just date math + sums.
function _computeYtdPreview(d){
  if(!d.firstPayDay || !d.lastPayDay || !(Number(d.ytdIncome) > 0)) return null;
  const days360 = (d1, d2) => {
    let y1 = d1.getFullYear(), m1 = d1.getMonth()+1, dd1 = d1.getDate();
    let y2 = d2.getFullYear(), m2 = d2.getMonth()+1, dd2 = d2.getDate();
    if(dd1 === 31) dd1 = 30;
    if(dd2 === 31) dd2 = 30;
    return (y2-y1)*360 + (m2-m1)*30 + (dd2-dd1);
  };
  const days = days360(new Date(d.firstPayDay), new Date(d.lastPayDay));
  if(days <= 0) return null;
  const baseYtd = Number(d.ytdIncome);
  const addIncomes = Array.isArray(d.additionalIncomes) ? d.additionalIncomes : [];
  const deds = Array.isArray(d.deductions) ? d.deductions : [];
  const addYtd = addIncomes.reduce((s,x)=>s+(Number(x.ytdAmount)||0),0);
  const dedYtd = deds.reduce((s,x)=>s+(Number(x.ytdAmount)||0),0);
  const totalYtd = baseYtd + addYtd;
  const netYtd = totalYtd - dedYtd;
  const perDay = netYtd / days;
  const yearly = perDay * 365;
  const base = Number(d.baseAnnual) || 0;
  const ot = yearly - base;
  return {
    days, baseYtd, addYtd, totalYtd, dedYtd, netYtd, perDay, yearly,
    base, ot,
    ot40: ot/52*40, ot46: ot/52*46, ot48: ot/52*48, ot52: ot,
    annPlus40: base + ot/52*40, annPlus46: base + ot/52*46,
    annPlus48: base + ot/52*48, annPlus52: base + ot,
  };
}

function _matchLender(name){
  const n = String(name||'').toLowerCase().trim();
  if(!n) return null;
  for(const key in LENDER_QUIRKS){
    const q = LENDER_QUIRKS[key];
    if(q.aliases.some(a => n.includes(a))) return q;
  }
  return null;
}

// Updates DOM directly so the lender input doesn't lose focus during typing.
function _recOnLenderChange(){
  const d = S.docRec;
  if(!d) return;
  const q = _matchLender(d.lenderName);
  if(!q) return;
  const pt = d.propertyType || 'investment';
  let didFill = false;
  if(!d.product && q.productExamples[pt]){
    d.product = q.productExamples[pt];
    didFill = true;
  }
  if(!d.bufferPolicyNote && q.bufferPolicy[pt]){
    d.bufferPolicyNote = q.bufferPolicy[pt];
    didFill = true;
  }
  if(didFill){
    // Update visible inputs in-place without re-rendering
    const prodInput = document.querySelector('input[oninput*="S.docRec.product"]');
    if(prodInput && !prodInput.value) prodInput.value = d.product;
    const bufTextarea = document.getElementById('rec-buffer');
    if(bufTextarea && !bufTextarea.value) bufTextarea.value = d.bufferPolicyNote;
    // Show a subtle toast so broker knows
    try { toast(`\u2713 Auto-applied ${q.label} ${pt === 'investment' ? 'INV' : 'OOC'} defaults`); } catch(_){}
  }
}

function updateRecPreview_(){
  if(_recPreviewRaf) return;
  _recPreviewRaf = requestAnimationFrame(() => {
    _recPreviewRaf = null;
    const d = S.docRec;
    if(!d) return;

    // 1. Preview page content
    const page = document.getElementById('rec-preview-page');
    if(page) page.innerHTML = recBuildPreviewHtml_(d);

    // 2. Placeholder helper (re-mount entirely since list of brackets may change)
    const oldHelper = document.getElementById('rec-ph-wrap');
    const newHelperHtml = recPlaceholderHelperHtml_(d);
    if(oldHelper){
      if(newHelperHtml){
        oldHelper.outerHTML = newHelperHtml;
      } else {
        oldHelper.remove();
      }
    } else if(newHelperHtml){
      // Insert after the preview toolbar
      const toolbar = document.querySelector('.preview-toolbar');
      if(toolbar) toolbar.insertAdjacentHTML('afterend', newHelperHtml);
    }

    // 3. LVR display (auto-calculated from loanAmount + estimatedValue)
    const lvrEl = document.getElementById('rec-lvr-display');
    if(lvrEl){
      const loanAmt = Number(d.loanAmount) || 0;
      const estVal = Number(d.estimatedValue) || 0;
      const lvr = estVal > 0 ? (loanAmt / estVal * 100) : 0;
      lvrEl.value = estVal > 0 ? lvr.toFixed(2) + '%' : '';
      lvrEl.style.color = lvr > 80 ? '#FB923C' : lvr > 0 ? '#34D399' : '#6b7280';
    }

    // 4. Save indicator + schedule auto-save
    _renderSaveIndicator();
    if(d.caseId) _scheduleDocSave('rec');
  });
}

async function ytdGenerate_(format){
  const d = S.docYtd;
  if(!d.clientName) { toast('Client name is required', 1); return; }
  if(!d.firstPayDay) { toast('First pay day is required', 1); return; }
  if(!d.lastPayDay) { toast('Last pay day is required', 1); return; }
  if(!Number(d.ytdIncome)) { toast('Base YTD income must be greater than zero', 1); return; }

  const payload = {
    clientName: d.clientName,
    firstPayDay: d.firstPayDay,
    lastPayDay: d.lastPayDay,
    ytdIncome: Number(d.ytdIncome),
    baseAnnual: Number(d.baseAnnual) || 0,
    additionalIncomes: (d.additionalIncomes||[])
      .filter(x => Number(x.ytdAmount) > 0)
      .map(x => ({label:x.label||'Other income', ytdAmount:Number(x.ytdAmount)||0})),
    deductions: (d.deductions||[])
      .filter(x => Number(x.ytdAmount) > 0)
      .map(x => ({label:x.label||'Deduction', ytdAmount:Number(x.ytdAmount)||0})),
  };

  showLoad();
  const r = await gs_('generateYtdCalc', S.tok, payload, format);
  hideLoad();

  if(r && r.ok && r.data && r.data.base64){
    triggerBase64Download_(r.data.base64, r.data.filename, r.data.mime);
    toast(`\u2713 YTD ${format.toUpperCase()} downloaded`);
  } else {
    toast((r && r.msg) || 'Failed to generate file', 1);
  }
}

  });
  (S.users||[]).filter(u => u.role==='broker' || u.role==='admin').forEach(u => {
    if(!brokerSet[u.id]) brokerSet[u.id] = u.name;
  });
  const brokers = Object.keys(brokerSet).map(id => ({id, name: brokerSet[id]}))

  // Preview scope

    if(!isAdmin) return c.brokerId === S.user.id;

    return true;
  });
  const typeFiltered0 = scopedComms.filter(c => opts.types[c.type]);
  // Apply same future-pending filter that the backend uses, so the preview row
  // count matches what actually exports.
  const todayIso = new Date().toISOString().slice(0, 10);
  function _periodEndIsoLocal(p){
    const m = /^([A-Za-z]{3,9})\s+(\d{4})$/.exec(String(p||'').trim());
    if(!m) return '';
    const mn = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const mi = mn.indexOf(m[1].toLowerCase().slice(0,3));
    if(mi < 0) return '';
    const y = parseInt(m[2], 10);
    const lastDay = new Date(y, mi+1, 0).getDate();
    return `${y}-${String(mi+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  }
  let futureExcluded = 0;
  const currentMonthKey = todayIso.slice(0,7);

    if(!eff) eff = _periodEndIsoLocal(c.period);
    if(!eff) eff = String(c.receivedDate || '').slice(0,10);
    if(!eff) return true;
    // Compare by month \u2014 current month stays in, only future months excluded
    if(eff.slice(0,7) > currentMonthKey){ futureExcluded++; return false; }
    return true;
  });
  const scopeYears = {};

    const d = c.receivedDate || c.expectedDate || c.createdAt || '';

      </div>
      <div style="padding:20px;display:grid;gap:15px;overflow-y:auto;max-height:70vh;">

        ${isAdmin ? `

        <div>
          <label class="fl" style="display:flex;align-items:center;gap:6px;">\uD83E\uDDD1 Broker scope</label>
          <select class="fi" id="ex-bk" onchange="S.exportOpts.brokerId=this.value;renderModal();" style="font-size:13px;">

            ${brokers.map(b => `<option value="${esc(b.id)}"${opts.brokerId===b.id?' selected':''}>${esc(b.name)}</option>`).join('')}
          </select>
          <div style="font-size:10.5px;color:#6b7280;margin-top:4px;">Pick a single broker to scope this export, or leave All for the whole team.</div>

          <div style="font-size:10.5px;color:#4a5568;margin-top:3px;">Only your own commissions are included.</div>
        </div>
        `}

        <!-- Commission types -->
        <div>
          <label class="fl" style="display:flex;align-items:center;gap:6px;">\uD83D\uDCCB Commission types</label>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:3px;">
            ${['Upfront','Trail','Clawback'].map(t => {
              const on = opts.types[t];
              const tc = t==='Upfront'?'#818CF8':t==='Trail'?'#A78BFA':'#ef4444';

          <div style="display:grid;gap:5px;margin-top:3px;">
            ${[

              {v:'inc', label:'Amounts INCLUDE GST',  hint:'Bank figure \u2014 GST = amount \u00F7 11'},
              {v:'none',label:'No GST / tax',         hint:'United States or non-taxed'},
            ].map(o => {

                  </div>
                </div>
              </button>`;
            }).join('')}
          </div>
        </div>

        <!-- Live preview -->
        <div style="background:linear-gradient(135deg,rgba(52,211,153,.06),transparent);border:1px solid #34D39933;border-radius:8px;padding:11px 13px;">
          <div style="font-size:9.5px;color:#34D399;text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:5px;">\uD83D\uDCE6 Export preview \u00B7 as at ${todayIso}</div>

            <div><span style="color:#6b7280;">Tabs:</span> <strong style="color:#c9d1d9;">Summary + ${yearList.length}</strong></div>
          </div>
          ${futureExcluded > 0 ? `<div style="margin-top:8px;padding:7px 10px;background:#0A0D14;border-left:2px solid #FB923C;border-radius:4px;font-size:11px;color:#FB923C;">\u23E9 ${futureExcluded} future-dated pending entr${futureExcluded===1?'y':'ies'} excluded (forecast \u2014 not yet earned)</div>` : ''}

// The actual export call \u2014 invoked from the modal Save button.
async function _doExportCommissions(){
  const opts = S.exportOpts || {};
  const types = Object.keys(opts.types || {}).filter(t => opts.types[t]);
  if(types.length === 0){
    toast('Pick at least one commission type', 1);
    return;
  }
  closeModal();
  showLoad();
  const r = await gs_('exportCommissionsExcel', S.tok, {
    brokerId: opts.brokerId || '',
    types: types,
    gstMode: opts.gstMode || 'ex',
  });
  hideLoad();

  if(r && r.ok && r.data && r.data.base64){
    triggerBase64Download_(r.data.base64, r.data.filename, r.data.mime);
    toast(`\u2713 Exported ${r.data.rows} commission${r.data.rows!==1?'s':''} across ${r.data.years} year${r.data.years!==1?'s':''}`);
  } else {
    const msg = (r && r.msg) || 'Export failed';
    const stack = (r && r.stack) || '';
    // Persist in bell so Ryan can review later (toast disappears too fast for stack traces)
    const detail = stack ? (msg + '\n\n\u2014 Stack \u2014\n' + stack) : msg;
    notifPush('error', 'Excel export failed', detail);
    console.error('Export error:', msg, stack);
    toast('Export failed \u2014 see \uD83D\uDD14 System tab', 1);
  }
}

function triggerBase64Download_(b64, filename, mime){
  try {
    const byteChars = atob(b64);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0; i<byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
    const blob = new Blob([bytes], {type: mime || 'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'download';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e){
    toast('Download failed: ' + e.message, 1);
  }
}
