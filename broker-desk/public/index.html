// ---- Reconciliation engine (frontend) ----
function _revNameKey(s){ return String(s||'').toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean).sort().join(' '); }
function _revReconcile(){
  // Only loans that have been entered into the Loan Book count as "settled" for tracking.
  var loans=(S.loanBook||[]).filter(function(l){ return S.user.role==='admin'?true:l.brokerId===S.user.id; });
  var rows=S.commRows||[];
  var myComm=S.commissions||[];
  // statement coverage; expectation window runs to current month - 1 (trail paid in arrears)
  var latest=''; rows.forEach(function(r){ if(r.periodMonth>latest)latest=r.periodMonth; });
  var nowMk=_revMonthKey(new Date());
  var endMonth=_revAddMonths(nowMk,-1);
  if(latest>endMonth) endMonth=latest;
  // index statement rows by ref and by normalized client name
  var byRef={}, byName={};
  rows.forEach(function(r){
    var k=String(r.ref||'').trim(); if(k)(byRef[k]=byRef[k]||[]).push(r);
    var nk=_revNameKey(r.clientRaw); if(nk)(byName[nk]=byName[nk]||[]).push(r);
  });
  var refsUsed={};
  var missingUpfront=[],missingTrail=[],variance=[],matched=0;
  var now=Date.now();
  loans.forEach(function(l){
    var st=String(l.status||'').toLowerCase();
    if(st==='closed'||st==='discharged'||st==='paid out'||st==='refinanced') return;
    var settleMk=_revMonthKey(l.settlementDate); if(!settleMk) return;
    var ref=String(l.finsureRef||'').trim();
    var nameKey=_revNameKey(l.clientName);
    // statement rows for this loan: by ref if linked, else by client name
    var lr = (ref&&byRef[ref]) ? byRef[ref] : (byName[nameKey]||[]);
    if(ref) refsUsed[ref]=true;
    lr.forEach(function(r){ if(r.ref) refsUsed[String(r.ref).trim()]=true; });
    var stUp=lr.filter(function(r){return /up/i.test(r.type);});
    var stTrailByM={}; lr.forEach(function(r){ if(/trail/i.test(r.type)&&r.periodMonth) stTrailByM[r.periodMonth]=r; });
    // also count what you've already recorded yourself (match by loanId OR caseId,
    // since settle-created placeholders carry caseId but no loanId). Only RECEIVED
    // commissions count as actual money in; Pending placeholders do NOT suppress a flag.
    var mc=myComm.filter(function(c){ return (c.loanId&&c.loanId===l.id) || (c.caseId&&l.caseId&&c.caseId===l.caseId); });
    var recv=function(c){ return String(c.status||'').toLowerCase()==='received'; };
    var mcUp=mc.filter(function(c){return /up/i.test(c.type)&&recv(c);});
    var mcTrailByM={}; mc.forEach(function(c){ if(/trail/i.test(c.type)&&recv(c)&&c.period) mcTrailByM[_revMonthKey(c.period)||c.period]=c; });
    // estimates ("tam tinh")
    var estUp=_revNum(l.upfrontAmount)||_revNum(l.loanAmount)*(_revNum(l.upfrontRate)/100);
    var estTrail=_revNum(l.trailMonthly)||_revNum(l.loanAmount)*(_revNum(l.trailRate)/100)/12;
    // UPFRONT
    var settledMs=new Date(l.settlementDate).getTime();
    if(stUp.length===0 && mcUp.length===0){
      if(!isNaN(settledMs)&&(now-settledMs)>30*86400000) missingUpfront.push({loan:l,ref:ref,est:estUp});
    } else matched++;
    // TRAIL months: settle+1 .. endMonth
    var mk=_revAddMonths(settleMk,1),guard=0;
    while(mk<=endMonth && guard<120){
      if(stTrailByM[mk]||mcTrailByM[mk]) matched++;
      else missingTrail.push({loan:l,ref:ref,month:mk,est:estTrail});
      mk=_revAddMonths(mk,1); guard++;
    }
    // variance from statement trails
    var sorted=Object.keys(stTrailByM).sort().map(function(m){return stTrailByM[m];});
    for(var i=1;i<sorted.length;i++){
      var prev=_revNum(sorted[i-1].commission),cur=_revNum(sorted[i].commission);
      if(prev>5&&cur>0&&cur<prev*0.55) variance.push({loan:l,ref:ref,month:sorted[i].periodMonth,prev:prev,cur:cur,pct:Math.round((1-cur/prev)*100)});
    }
  });
  // unknown: statement rows whose ref matched no loan
  var unknownMap={};
  rows.forEach(function(r){ var k=String(r.ref||'').trim(); if(k&&!refsUsed[k]) unknownMap[k]=r; });
  var unknown=Object.keys(unknownMap).map(function(k){return unknownMap[k];});
  return {latest:latest,endMonth:endMonth,matched:matched,missingUpfront:missingUpfront,missingTrail:missingTrail,variance:variance,unknown:unknown};
}

  rec.unknown.forEach(function(r){ items.push({client:r.clientRaw||'(unknown)',lender:r.lenderRaw||'',ref:r.ref,type:/trail/i.test(r.type)?'Trail':'Upfront',period:_revMonthLabel(r.periodMonth)||'-',settle:'',loanAmt:'',issue:'Unknown payment - not in loan book',est:0,color:'#60A5FA'}); });
  var totalEst=items.reduce(function(s,it){return s+(_revNum(it.est)||0);},0);

      +'</div></div>';

        +'<td><span style="background:'+it.color+'18;color:'+it.color+';border:1px solid '+it.color+'33;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;">'+esc(it.issue)+'</span></td>'
        +'<td style="text-align:right;color:#c9d1d9;">'+(it.est>0?'~$'+_revNum(it.est).toFixed(2):'-')+'</td></tr>';
    });
    h+='</tbody></table>';
    h+='<div style="margin-top:12px;font-size:12px;color:#8b949e;">Amounts are the <b style="color:#c9d1d9;">full commission Finsure owes Easy Loan Finance (100%)</b> \u2014 broker share is applied later when invoicing a broker, not here. Email goes to <b style="color:#c9d1d9;">finance@loankit.com.au</b> via <b style="color:#c9d1d9;">Compose email</b>. <a href="#" onclick="_revCopyTable();return false;" style="color:#D4A843;">Copy table (TSV)</a></div>';

// ---- Actual Received (per broker): Expected (loan x rate) vs Actual received (Finsure statements) ----
function rRevReceived(){
  var isAdmin=S.user.role==='admin';
  var loans=(S.loanBook||[]).filter(function(l){ return isAdmin?true:l.brokerId===S.user.id; });
  var rows=S.commRows||[];
  var byRef={},byName={};
  rows.forEach(function(r){ var k=String(r.ref||'').trim(); if(k)(byRef[k]=byRef[k]||[]).push(r); var nk=_revNameKey(r.clientRaw); if(nk)(byName[nk]=byName[nk]||[]).push(r); });
  var groups={},order=[];
  loans.forEach(function(l){
    var ref=String(l.finsureRef||'').trim(), nameKey=_revNameKey(l.clientName);
    var lr=(ref&&byRef[ref])?byRef[ref]:(byName[nameKey]||[]);
    var actUp=lr.filter(function(r){return /up/i.test(r.type);}).reduce(function(s,r){return s+_revNum(r.commission);},0);
    var actTr=lr.filter(function(r){return /trail/i.test(r.type);}).reduce(function(s,r){return s+_revNum(r.commission);},0);
    var expUp=_revNum(l.upfrontAmount)||_revNum(l.loanAmount)*(_revNum(l.upfrontRate)/100);
    if(expUp<=0 && actUp<=0 && actTr<=0) return;
    var bn=l.brokerName||l.broker||'(unassigned)';
    if(!groups[bn]){ groups[bn]={rows:[],expUp:0,actUp:0,actTr:0}; order.push(bn); }
    var g=groups[bn]; g.rows.push({l:l,expUp:expUp,actUp:actUp,actTr:actTr}); g.expUp+=expUp; g.actUp+=actUp; g.actTr+=actTr;
  });
  var h='<div style="overflow-y:auto;max-height:calc(100vh - 170px);padding-right:4px;">';
  h+='<div style="font-size:12px;color:#8b949e;margin-bottom:12px;">Per broker &mdash; <b style="color:#c9d1d9;">Expected</b> (loan x rate, indicative estimate) vs <b style="color:#c9d1d9;">Actual received</b> (from the Finsure statements). Figures are the full commission (100%, ex-GST); each broker net = x 1.1 GST x broker share.</div>';
  if(!order.length){ h+='<div class="card" style="padding:30px;text-align:center;color:#6b7280;">No settled loans yet. Add loans in Loan Book and upload a Finsure statement to see actual received.</div></div>'; return h; }
  order.forEach(function(bn){
    var g=groups[bn];
    h+='<div style="font-weight:700;color:#D4A843;font-size:13px;margin:16px 0 6px;">'+esc(bn)+'</div>';
    h+='<table class="tbl"><thead><tr><th>Client</th><th>Lender</th><th style="text-align:right;">Loan</th><th style="text-align:right;">Expected upfront</th><th style="text-align:right;">Actual upfront</th><th style="text-align:right;">Trail received</th><th style="text-align:right;">Variance</th></tr></thead><tbody>';
    g.rows.forEach(function(x){
      var v=x.actUp-x.expUp; var vc=x.actUp<=0?'#6b7280':(v<-1?'#FB923C':'#34D399');
      h+='<tr><td style="font-weight:600;color:#c9d1d9;">'+esc(x.l.clientName||'')+'</td><td>'+esc(x.l.lenderName||'')+'</td>'
        +'<td style="text-align:right;">'+(x.l.loanAmount?'$'+_revNum(x.l.loanAmount).toLocaleString():'-')+'</td>'
        +'<td style="text-align:right;color:#8b949e;">$'+x.expUp.toFixed(2)+'</td>'

// ---- Parse uploaded statement ----
function _revParseFile(input){
  var f=input.files&&input.files[0]; if(!f)return;
  if(typeof XLSX==='undefined'){ toast('Spreadsheet engine still loading, try again in a moment',1); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      var allRows=[];
      wb.SheetNames.forEach(function(sn){
        var aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:false,defval:''});
        allRows=allRows.concat(_revExtract(aoa).rows);
      });
      // de-dupe identical ref|type|month within this one upload (keep last seen)
      var seen={},dedup=[];
      allRows.forEach(function(o){ var k=(o.ref||'')+'|'+o.type+'|'+(o.periodMonth||''); seen[k]=o; });
      Object.keys(seen).forEach(function(k){ dedup.push(seen[k]); });
      var maxPm=''; dedup.forEach(function(o){ if(o.periodMonth>maxPm)maxPm=o.periodMonth; });
      S._revPreview={fileName:f.name, periodMonth:maxPm, rows:dedup};
      openModal('revPreview');
    }catch(err){ toast('Parse error: '+err.message,1); }
  };
  reader.readAsArrayBuffer(f);
}
function _revFindAll(cells,re){ var x=[]; for(var i=0;i<cells.length;i++){ if(re.test(String(cells[i]||'')))x.push(i); } return x; }
function _revFindIn(cells,re,from,to){ for(var i=from;i<=to&&i<cells.length;i++){ if(re.test(String(cells[i]||'')))return i; } return -1; }
// Build one record from a column block of a data row.
function _revRowFromBlock(d,mp,fy){
  var ref=mp.ref>=0?String(d[mp.ref]||'').trim():'';
  var client=mp.client>=0?String(d[mp.client]||'').trim():'';
  if(!ref && !client) return null;
  if(/total/i.test(client)) return null;
  var comm=mp.commission>=0?_revNum(d[mp.commission]):0;
  var bal=mp.balance>=0?_revNum(d[mp.balance]):0;
  var sd=mp.settleDate>=0?String(d[mp.settleDate]||'').slice(0,10):'';
  var sa=mp.settledAmount>=0?_revNum(d[mp.settledAmount]):0;
  if(!ref && !comm && !bal) return null; // junk row
  // detect a real month label in this block (header col first, then strict scan, skipping settlement-date col)
  var pm=mp.period>=0?_revMonthStrict(d[mp.period],fy):'';
  if(!pm){ for(var c=mp.be;c>=mp.bs;c--){ if(c===mp.settleDate) continue; var k=_revMonthStrict(d[c],fy); if(k){ pm=k; break; } } }
  // Classify by commission size relative to balance: trail is tiny (~0.01%/mo of balance),
  // upfront is large (~0.5-0.7% of loan). This separates them far more reliably than month presence.
  var base=bal>0?bal:sa;
  var ratio=base>0?Math.abs(comm)/base:0;
  var type;
  if(comm!==0 && base>0) type = ratio<0.0015 ? 'Trail' : 'Upfront';
  else type = (pm || (bal>0&&sa>0&&Math.abs(bal-sa)>1)) ? 'Trail' : 'Upfront';
  if(type==='Upfront') pm=_revMonthKey(sd,fy);
  else if(!pm) pm=_revMonthKey(sd,fy);
  return {ref:ref,type:type,periodMonth:pm,clientRaw:client,
    lenderRaw:mp.lender>=0?String(d[mp.lender]||'').trim():'',
    brokerRaw:mp.broker>=0?String(d[mp.broker]||'').trim():'',
    settledAmount:sa||'',settleDate:sd,balanceW:bal||(type==='Trail'?sa:'')||'',
    commission:comm||'',gst:mp.gst>=0?_revNum(d[mp.gst]):'',
    net:mp.net>=0?_revNum(d[mp.net]):'',splitPct:mp.split>=0?_revNum(d[mp.split]):''};
}
// Extractor: handles 1+ column blocks per header row (upfront left + trail right),
// multiple stacked header sections, and unlabeled trail period columns.
function _revExtract(aoa){
  var out=[]; var fy=new Date().getFullYear();
  for(var r=0;r<aoa.length;r++){ for(var c=0;c<(aoa[r]||[]).length;c++){ var mm=/(\d{4})-\d{2}-\d{2}/.exec(String(aoa[r][c]||'')); if(mm){fy=mm[1];break;} } }
  var refRe=/ref\s*#|reference|account|loan\s*(no|number)/i, commRe=/commission/i;
  var rr=0;
  while(rr<aoa.length){
    var row=aoa[rr]||[];
    var refCols=_revFindAll(row,refRe), commCols=_revFindAll(row,commRe);
    if(refCols.length && commCols.length){
      // block starts = %Split or Broker Name, merging adjacent (within 2 cols)
      var raw=_revFindAll(row,/%\s*split|broker\s*name/i).sort(function(a,b){return a-b;});
      var starts=[]; raw.forEach(function(c){ if(!starts.length||c-starts[starts.length-1]>2)starts.push(c); });
      if(!starts.length) starts=[0];
      var blocks=[];
      for(var k=0;k<starts.length;k++){
        var bs=starts[k], be=(k+1<starts.length?starts[k+1]-1:row.length-1);
        if(refCols.some(function(c){return c>=bs&&c<=be;})) blocks.push({bs:bs,be:be});
      }
      if(!blocks.length) blocks=[{bs:0,be:row.length-1}];
      var maps=blocks.map(function(b){ return {
        bs:b.bs, be:b.be,
        split:_revFindIn(row,/%\s*split|^split/i,b.bs,b.be),
        broker:_revFindIn(row,/broker/i,b.bs,b.be),
        lender:_revFindIn(row,/lender/i,b.bs,b.be),
        client:_revFindIn(row,/client|customer|borrower|applicant/i,b.bs,b.be),
        ref:_revFindIn(row,refRe,b.bs,b.be),
        settledAmount:_revFindIn(row,/settled.*amount|loan amount/i,b.bs,b.be),
        settleDate:_revFindIn(row,/settlement date|settled date/i,b.bs,b.be),
        commission:_revFindIn(row,commRe,b.bs,b.be),
        gst:_revFindIn(row,/^gst$/i,b.bs,b.be),
        net:_revFindIn(row,/remitted|net/i,b.bs,b.be),
        period:_revFindIn(row,/period|payment month|^month|paid month/i,b.bs,b.be),
        balance:_revFindIn(row,/balance|outstanding/i,b.bs,b.be)
      }; });
      rr++;
      while(rr<aoa.length){
        var d=aoa[rr]||[];
        var joined=d.join('').trim();
        if(joined===''){ rr++; continue; }
        if(_revFindAll(d,refRe).length && _revFindAll(d,commRe).length) break; // next header
        if(/total\s*for|^total/i.test(joined)){ rr++; continue; }
        maps.forEach(function(mp){ var rec=_revRowFromBlock(d,mp,fy); if(rec) out.push(rec); });
        rr++;
      }
    } else rr++;
  }
  return {rows:out};
}

  var p=S._revPreview; if(!p)return '';

  var body='<div style="max-height:55vh;overflow:auto;border:1px solid #1e2430;border-radius:8px;">'

    var big=(/trail/i.test(o.type)&&_revNum(o.commission)>2000)||_revNum(o.commission)>200000; // likely garbage
    body+='<tr style="'+(big?'background:rgba(239,68,68,.08);':'')+'">'
      +'<td><input type="checkbox" class="rev-pv-row" '+(o._skip?'':'checked')+' onchange="S._revPreview.rows['+idx+']._skip=!this.checked;_revPvCount()"></td>'
      +'<td><span style="color:'+(/trail/i.test(o.type)?'#60A5FA':'#D4A843')+';font-weight:600;">'+esc(o.type)+'</span></td>'
      +'<td>'+esc(o.clientRaw)+'</td><td>'+esc(o.lenderRaw)+'</td><td style="font-family:monospace;font-size:11px;">'+esc(o.ref)+'</td>'
      +'<td>'+esc(o.periodMonth||'-')+'</td><td style="'+(big?'color:#ef4444;font-weight:700;':'')+'">'+(o.commission!==''?'$'+_revNum(o.commission).toFixed(2):'-')+'</td>'
      +'<td>'+(o.balanceW!==''?'$'+_revNum(o.balanceW).toLocaleString():'-')+'</td></tr>';
  });
  body+='</tbody></table></div>';
  var ups=rows.filter(function(o){return /up/i.test(o.type);}).length;
  var trs=rows.filter(function(o){return /trail/i.test(o.type);}).length;
  return '<div class="m-ct"><div class="m-box">'
    +'<div style="padding:16px 20px;border-bottom:1px solid #1e2430;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">'
    +'<div style="font-size:15px;font-weight:700;color:#c9d1d9;">Preview statement import</div>'
    +'<button class="btn-ghost" onclick="closeModal()"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'
    +'<div style="padding:18px 20px;overflow-y:auto;max-height:70vh;">'
    +'<div style="font-size:12px;color:#8b949e;margin-bottom:10px;">'+esc(p.fileName)+' &middot; '+rows.length+' rows ('+ups+' upfront, '+trs+' trail)'
    +(p.periodMonth?(' &middot; period '+_revMonthLabel(p.periodMonth)):'')+'</div>'
    +'<div style="font-size:11px;color:#6b7280;margin-bottom:10px;">Untick any rows you don\'t want (e.g. your manual scratch rows at the top of the file). <span style="color:#ef4444;">Red rows</span> have an unusually large amount \u2014 likely a parse/scratch error; leave them unticked. Rows are keyed by Ref# + type + month.</div>'
    +body+'</div>'
    +'<div style="padding:14px 20px;border-top:1px solid #1e2430;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-shrink:0;">'
    +'<div style="display:flex;gap:7px;"><button class="btn-ghost" style="font-size:11px;" onclick="_revPvToggleAll(true)">Select all</button><button class="btn-ghost" style="font-size:11px;" onclick="_revPvToggleAll(false)">None</button><button class="btn-ghost" style="font-size:11px;" onclick="_revPvSkipBig()">Untick red</button></div>'
    +'<div style="display:flex;gap:10px;"><button class="btn-sec" onclick="closeModal()">Cancel</button><button class="btn-gold" onclick="_revConfirmImport()">Import <span id="rev-pv-count">'+rows.filter(function(o){return !o._skip;}).length+'</span> rows</button></div>'
    +'</div></div></div>';
}
function _revPvCount(){ var p=S._revPreview; if(!p)return; var n=(p.rows||[]).filter(function(o){return !o._skip;}).length; var el=document.getElementById('rev-pv-count'); if(el)el.textContent=n; }
function _revPvToggleAll(on){ var p=S._revPreview; if(!p)return; (p.rows||[]).forEach(function(o){o._skip=!on;}); renderModal(); }
function _revPvSkipBig(){ var p=S._revPreview; if(!p)return; (p.rows||[]).forEach(function(o){ var big=(/trail/i.test(o.type)&&_revNum(o.commission)>2000)||_revNum(o.commission)>200000; if(big)o._skip=true; }); renderModal(); }
async function _revConfirmImport(){
  var p=S._revPreview; if(!p)return;
  var sel=(p.rows||[]).filter(function(o){return !o._skip;});
  if(!sel.length){ toast('No rows selected',1); return; }
  showLoad();
  var r=await gs_('importCommStatement',S.tok,{fileName:p.fileName,periodMonth:p.periodMonth},sel);
  hideLoad();
  if(r&&r.ok){ toast('Imported: '+r.inserted+' new, '+r.updated+' updated'); closeModal(); await _loadRevenueData(true); }
  else toast((r&&r.msg)||'Import failed',1);
}

// ---- Loans tab: link Ref# + repayment info + forecast ----
function rRevLoans(){
  var loans=(S.loanBook||[]).filter(function(l){ return S.user.role==='admin'?true:l.brokerId===S.user.id; });
  var rows=S.commRows||[];
  var h='<div style="overflow-y:auto;max-height:calc(100vh - 170px);padding-right:4px;">';
  h+='<div style="background:linear-gradient(135deg,rgba(212,168,67,.07),transparent);border:1px solid #D4A84333;border-radius:10px;padding:12px 15px;margin-bottom:14px;font-size:12px;color:#8b949e;line-height:1.7;">'
    +'<b style="color:#D4A843;">How this tab works:</b><br>'
    +'\u2022 <b style="color:#c9d1d9;">Ref #</b> \u2014 link each loan to its Finsure reference once; every statement then matches automatically.<br>'
    +'\u2022 <b style="color:#c9d1d9;">Repay + Rate %</b> \u2014 used to estimate the next trail.<br>'
    +'\u2022 <b style="color:#c9d1d9;">Broker %</b> \u2014 the broker\'s share of commission <u>for this case</u> (e.g. 100 = broker keeps full, 80 = broker gets 80%). This is <b>only</b> applied when you <b>invoice the broker</b> \u2014 the Finsure query always asks for the full 100%. Saved on the loan, shown in Commissions &amp; on the invoice.<br>'
    +'Edit any field then click <b style="color:#c9d1d9;">Save</b> on that row.</div>';
  h+='<table class="tbl"><thead><tr><th>Client</th><th>Lender</th><th>Loan</th><th>Ref #</th><th>Repay</th><th>Rate %</th><th>Broker %</th><th>Next trail est.</th><th></th></tr></thead><tbody>';
  loans.forEach(function(l){
    var ref=String(l.finsureRef||'').trim();
    var lr=rows.filter(function(r){return String(r.ref||'').trim()===ref && /trail/i.test(r.type);}).sort(function(a,b){return a.periodMonth<b.periodMonth?-1:1;});
    var lastBal=lr.length?_revNum(lr[lr.length-1].balanceW):0;
    var tr=_revNum(l.trailRate)|| (l.trailRate? _revNum(l.trailRate):0.15);
    var split=lr.length?(_revNum(lr[lr.length-1].splitPct)||1):1;
    var est = lastBal>0 ? (lastBal*(tr/100)/12*(split>1?1:split||1)) : 0;
    h+='<tr>'
      +'<td style="font-weight:600;color:#c9d1d9;">'+esc(l.clientName||'')+'</td>'
      +'<td>'+esc(l.lenderName||'')+'</td>'
      +'<td>$'+_revNum(l.loanAmount).toLocaleString()+'</td>'
      +'<td><input class="fi" style="width:120px;font-family:monospace;font-size:11px;padding:4px 6px;" value="'+esc(ref)+'" id="rref-'+esc(l.id)+'" placeholder="Ref #"></td>'
      +'<td><select class="fi" style="width:75px;padding:4px;" id="rrep-'+esc(l.id)+'"><option value=""'+(!l.repaymentType?' selected':'')+'>-</option><option'+(l.repaymentType==='P&I'?' selected':'')+'>P&I</option><option'+(l.repaymentType==='IO'?' selected':'')+'>IO</option></select></td>'
      +'<td><input class="fi" style="width:60px;padding:4px 6px;" value="'+esc(l.trailRate||'')+'" id="rrate-'+esc(l.id)+'" placeholder="0.15"></td>'
      +'<td><input class="fi" style="width:58px;padding:4px 6px;text-align:center;" value="'+esc(l.brokerSharePct!=null&&l.brokerSharePct!==''?l.brokerSharePct:100)+'" id="rbsp-'+esc(l.id)+'" placeholder="100" title="Broker share % for invoicing this case"></td>'
      +'<td style="color:#34D399;font-weight:600;">'+(est>0?'$'+est.toFixed(2):(ref?'-':'link ref'))+'</td>'
      +'<td><button class="btn-sec" style="font-size:11px;padding:4px 9px;" onclick="_revSaveLoan(\''+esc(l.id)+'\')">Save</button></td>'
      +'</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
async function _revSaveLoan(id){
  var ref=(document.getElementById('rref-'+id)||{}).value||'';
  var rep=(document.getElementById('rrep-'+id)||{}).value||'';
  var rate=(document.getElementById('rrate-'+id)||{}).value||'';
  var bspRaw=(document.getElementById('rbsp-'+id)||{}).value;
  var bsp=Math.max(0,Math.min(100,parseFloat(bspRaw)||0)); if(!(bsp>0))bsp=100;
  var r=await gs_('updateLoanRevenue',S.tok,id,{finsureRef:ref.trim(),repaymentType:rep,trailRate:rate,brokerSharePct:bsp});
  if(r&&r.ok){ var l=(S.loanBook||[]).find(function(x){return x.id===id;}); if(l){l.finsureRef=ref.trim();l.repaymentType=rep;l.trailRate=rate;l.brokerSharePct=bsp;} _invalidateCache(); toast('Saved'); render(); }
  else toast((r&&r.msg)||'Save failed',1);
}

// ---- Sync matched statement rows into Commissions (feeds invoices) ----
function _revPeriodLabel(mk){ if(!mk)return''; var p=mk.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-AU',{month:'short',year:'numeric'}); }
function _revBuildSyncPlan(){
  var loans=S.loanBook||[], rows=S.commRows||[], existing=S.commissions||[];
  var loanByRef={}, loanByName={};
  loans.forEach(function(l){ var r=String(l.finsureRef||'').trim(); if(r)loanByRef[r]=l; var n=_revNameKey(l.clientName); if(n&&!loanByName[n])loanByName[n]=l; });
  var plan=[], unmatched=0;
  rows.forEach(function(r){
    var ref=String(r.ref||'').trim();
    var loan=(ref&&loanByRef[ref])?loanByRef[ref]:loanByName[_revNameKey(r.clientRaw)];
    if(!loan){ unmatched++; return; }
    var type=/trail/i.test(r.type)?'Trail':'Upfront';
    var gross=_revNum(r.commission), net=_revNum(r.net);
    var amt=(net>0 && net<=gross*1.05) ? net : gross; // net after split if sane, else gross (never a stray balance/total)
    var period=type==='Trail'?_revPeriodLabel(r.periodMonth):'';
    plan.push({loanId:loan.id,caseId:loan.caseId||'',brokerId:loan.brokerId||'',brokerName:loan.brokerName||'',clientName:loan.clientName||'',type:type,amount:amt,period:period,periodMonth:r.periodMonth||'',ref:ref,receivedDate:new Date().toISOString().slice(0,10),batchId:r.batchId||''});
  });
  function norm(p){ return _revMonthKey(p)||String(p||'').toLowerCase(); }
  plan.forEach(function(it){
    var ex=existing.filter(function(c){ return c.loanId===it.loanId&&c.type===it.type&&String(c.status||'').toLowerCase()!=='clawback'&&(it.type==='Trail'?norm(c.period)===norm(it.period||it.periodMonth):true); });
    if(ex.length){ it._cls=String(ex[0].invoiceNumber||'').trim()?'skip':'update'; }
    else it._cls='create';
  });
  return {plan:plan, create:plan.filter(function(p){return p._cls==='create';}).length, update:plan.filter(function(p){return p._cls==='update';}).length, skip:plan.filter(function(p){return p._cls==='skip';}).length, unmatched:unmatched};
}
function _revOpenSync(){ S._revSyncPlan=_revBuildSyncPlan(); openModal('revSync'); }
function rRevSyncModal(){
  var sp=S._revSyncPlan; if(!sp)return '';
  var clsColor={create:'#34D399',update:'#D4A843',skip:'#6b7280'};
  var clsLabel={create:'New',update:'Update',skip:'Skip (invoiced)'};
  var body='<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">'
    +'<div style="flex:1;min-width:90px;background:#11161f;border:1px solid #34D39933;border-radius:8px;padding:9px 12px;"><div style="font-size:10px;color:#34D399;font-weight:700;text-transform:uppercase;">Create new</div><div style="font-size:20px;font-weight:800;color:#c9d1d9;">'+sp.create+'</div></div>'
    +'<div style="flex:1;min-width:90px;background:#11161f;border:1px solid #D4A84333;border-radius:8px;padding:9px 12px;"><div style="font-size:10px;color:#D4A843;font-weight:700;text-transform:uppercase;">Update</div><div style="font-size:20px;font-weight:800;color:#c9d1d9;">'+sp.update+'</div></div>'
    +'<div style="flex:1;min-width:90px;background:#11161f;border:1px solid #6b728033;border-radius:8px;padding:9px 12px;"><div style="font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;">Skip (invoiced)</div><div style="font-size:20px;font-weight:800;color:#c9d1d9;">'+sp.skip+'</div></div>'
    +(sp.unmatched?'<div style="flex:1;min-width:90px;background:#11161f;border:1px solid #60A5FA33;border-radius:8px;padding:9px 12px;"><div style="font-size:10px;color:#60A5FA;font-weight:700;text-transform:uppercase;">Unmatched</div><div style="font-size:20px;font-weight:800;color:#c9d1d9;">'+sp.unmatched+'</div></div>':'')+'</div>';
  if(sp.unmatched) body+='<div style="font-size:11px;color:#60A5FA;margin-bottom:10px;">'+sp.unmatched+' row(s) could not match a loan (no Ref# link / name mismatch) - link them in the Loans tab, then sync again.</div>';
  body+='<div style="max-height:48vh;overflow:auto;border:1px solid #1e2430;border-radius:8px;"><table class="tbl"><thead><tr><th>Action</th><th>Client</th><th>Type</th><th>Period</th><th style="text-align:right;">Net $</th></tr></thead><tbody>';
  sp.plan.slice(0,300).forEach(function(it){
    body+='<tr><td><span style="color:'+clsColor[it._cls]+';font-weight:600;font-size:11px;">'+clsLabel[it._cls]+'</span></td><td>'+esc(it.clientName)+'</td><td>'+esc(it.type)+'</td><td>'+esc(it.period||'-')+'</td><td style="text-align:right;">$'+_revNum(it.amount).toFixed(2)+'</td></tr>';
  });
  body+='</tbody></table></div>';
  return '<div class="m-ct"><div class="m-box">'
    +'<div style="padding:16px 20px;border-bottom:1px solid #1e2430;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;"><div style="font-size:15px;font-weight:700;color:#c9d1d9;">Sync to Commissions</div>'
    +'<button class="btn-ghost" onclick="closeModal()"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'
    +'<div style="padding:18px 20px;overflow-y:auto;max-height:70vh;"><div style="font-size:11px;color:#6b7280;margin-bottom:12px;line-height:1.6;">Net amounts (after split) become Received commissions you can invoice, each stamped with its Finsure Ref#. The Ref# is also linked back to the loan so future statements auto-match. Protected: invoiced records are never changed, an existing different Ref# is never overwritten (flagged instead), and any amount change keeps the old value in notes.</div>'+body+'</div>'
    +'<div style="padding:14px 20px;border-top:1px solid #1e2430;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;"><button class="btn-sec" onclick="closeModal()">Cancel</button><button class="btn-gold" onclick="_revConfirmSync()">Sync '+(sp.create+sp.update)+' records</button></div>'
    +'</div></div>';
}
async function _revConfirmSync(){
  var sp=S._revSyncPlan; if(!sp)return;
  var list=sp.plan.filter(function(p){return p._cls!=='skip';}).map(function(p){return {loanId:p.loanId,caseId:p.caseId,brokerId:p.brokerId,brokerName:p.brokerName,clientName:p.clientName,type:p.type,amount:p.amount,period:p.period,periodMonth:p.periodMonth,ref:p.ref,receivedDate:p.receivedDate,batchId:p.batchId};});
  showLoad();
  var r=await gs_('syncCommissions',S.tok,list);
  if(r&&r.ok){
    var cr=await gs_('getCommissions',S.tok); if(cr&&cr.ok)S.commissions=cr.data||[];
    var lb=await gs_('getLoanBook',S.tok); if(lb&&lb.ok)S.loanBook=lb.data||[];
    hideLoad();
    var msg='Synced: '+r.created+' new, '+r.updated+' updated, '+r.skipped+' skipped';
    if(r.linked) msg+=' | '+r.linked+' Ref# linked';
    toast(msg);
    closeModal();
    if(r.conflicts&&r.conflicts.length){
      alert('Ref# conflicts (old ref kept, NOT overwritten) - review in Loans tab:\n\n'+r.conflicts.map(function(c){return '- '+c.client+': loan has '+c.existing+', statement says '+c.fromStatement;}).join('\n'));
    }
    render();
  }
  else { hideLoad(); toast((r&&r.msg)||'Sync failed',1); }
}

// ---- Batches tab ----
function rRevBatches(){
  var b=(S.commBatches||[]).slice().sort(function(a,c){return a.uploadedAt<c.uploadedAt?1:-1;});
  var h='<div style="overflow-y:auto;max-height:calc(100vh - 170px);padding-right:4px;">';
  h+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap;"><button class="btn-sec" style="font-size:12px;padding:7px 13px;color:#FB923C;border-color:#FB923C44;" onclick="_revDedupe()">Clean duplicate commissions</button><button class="btn-sec" style="font-size:12px;padding:7px 13px;" onclick="_revClearImports()" title="Removes imported statement rows but KEEPS the commission ledger / received history">Clear imported files (keep history)</button><button class="btn-sec" style="font-size:12px;padding:7px 13px;color:#ef4444;border-color:#ef444444;" onclick="_revClearAll()" title="Full reset \u2014 also deletes the commission ledger / received history">Reset ALL (incl. history)</button></div>';
  if(!b.length){ h+='<div class="card" style="padding:30px;text-align:center;color:#6b7280;">No statements imported yet.</div></div>'; return h; }
  h+='<table class="tbl"><thead><tr><th>Uploaded</th><th>File</th><th>Period</th><th>Rows</th><th>New</th><th>Updated</th><th>By</th><th></th></tr></thead><tbody>';
  b.forEach(function(x){
    h+='<tr><td>'+esc(String(x.uploadedAt||'').slice(0,16).replace('T',' '))+'</td><td>'+esc(x.fileName||'')+'</td>'
      +'<td>'+esc(_revMonthLabel(x.periodMonth)||'-')+'</td><td>'+esc(x.rowCount||0)+'</td><td>'+esc(x.insertedCount||0)+'</td><td>'+esc(x.updatedCount||0)+'</td>'
      +'<td>'+esc(x.uploadedByName||'')+'</td>'
      +'<td><button class="btn-sec" style="font-size:11px;padding:4px 9px;color:#ef4444;border-color:#ef444444;" onclick="_revRevert(\''+esc(x.id)+'\')">Revert</button></td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
async function _revClearImports(){
  if(!confirm('Clear imported statement files?\n\n\u00B7 Removes ALL imported statement rows + upload batches\n\u00B7 KEEPS your commission ledger (received history + invoice links stay intact)\n\nUse this to re-import statements cleanly.'))return;
  showLoad();
  var r=await gs_('clearCommImports',S.tok);
  if(r&&r.ok){
    S.commRows=[]; S.commBatches=[]; S._revFetched=false;
    _invalidateCache();
    hideLoad();
    toast('Cleared '+r.rows+' statement rows, '+r.batches+' batches \u2014 ledger kept');
    await _loadRevenueData(true);
  } else { hideLoad(); toast((r&&r.msg)||'Failed',1); }
}
async function _revClearAll(){
  if(!confirm('CLEAR ALL TRACKING DATA?\n\nThis permanently deletes:\n\u00B7 ALL imported statement rows\n\u00B7 ALL upload batches\n\u00B7 ALL commission records (Received + Pending)\n\nInvoices are NOT deleted, but their commission links are gone. Use this only for a full reset.'))return;
  var typed=prompt('Type DELETE to confirm wiping all commission/tracking data:');
  if(String(typed||'').trim().toUpperCase()!=='DELETE'){ toast('Cancelled',1); return; }
  showLoad();
  var r=await gs_('clearAllCommData',S.tok);
  if(r&&r.ok){
    S.commissions=[]; S.commRows=[]; S.commBatches=[]; S._revFetched=false; S._stampsRepaired=false;
    _invalidateCache();
    var cr=await gs_('getCommissions',S.tok); if(cr&&cr.ok)S.commissions=cr.data||[];
    hideLoad();
    toast('Cleared '+r.commissions+' commissions, '+r.rows+' rows, '+r.batches+' batches');
    await _loadRevenueData(true);
  } else { hideLoad(); toast((r&&r.msg)||'Failed',1); }
}
async function _revDedupe(){
  if(!confirm('Remove duplicate commission records (same loan + type + period)? Invoiced ones are kept. This cannot be undone.'))return;
  showLoad();
  var r=await gs_('dedupeCommissions',S.tok);
  if(r&&r.ok){ var cr=await gs_('getCommissions',S.tok); if(cr&&cr.ok)S.commissions=cr.data||[]; hideLoad(); toast('Removed '+r.removed+' duplicate commission(s)'); _invalidateCache(); render(); }
  else { hideLoad(); toast((r&&r.msg)||'Failed',1); }
}
async function _revRevert(id){
  if(!confirm('Revert this upload? All rows from this batch are removed. Other batches/months stay intact.'))return;
  showLoad();
  var r=await gs_('revertCommBatch',S.tok,id);
  hideLoad();
  if(r&&r.ok){ toast('Reverted: '+r.removed+' rows removed'); _invalidateCache(); await _loadRevenueData(true); }
  else toast((r&&r.msg)||'Revert failed',1);
}

window.addEventListener('load',init);
</script>
