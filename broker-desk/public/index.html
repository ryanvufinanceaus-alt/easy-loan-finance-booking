        </div>
        <div class="lux-stat">
          <div class="lux-stat-num ${(urgent24h.length+urgentTasksNon24h.length)?'red':''}">${urgent24h.length+urgentTasksNon24h.length}</div>
          <div class="lux-stat-lbl">Action items</div>
          <div class="lux-stat-trend" style="color:${(urgent24h.length+urgentTasksNon24h.length)?'#DC2626':'#6b7280'};">${(urgent24h.length+urgentTasksNon24h.length)?'next 24h':'all clear'}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- \u2550\u2550\u2550 24h RESPONSE \u2014 dedicated panel (always shown when items exist) \u2550\u2550\u2550 -->
  <!-- \u2550\u2550\u2550 24h RESPONSE \u2014 most time-critical, surfaces above all else \u2550\u2550\u2550 -->
  ${rDash24hResponse(response24hTasks, filterId, myCaseIdsForFilter)}

  <!-- \u2550\u2550\u2550 14-DAY TIMELINE \u2014 at-a-glance pipeline visual \u2550\u2550\u2550 -->
  ${rDashTimeline(filterId)}

  <!-- \u2550\u2550\u2550 ACTION REQUIRED \u00B7 WHAT TO DO NEXT \u2014 side-by-side \u2550\u2550\u2550 -->
  <div class="lux-grid-2">
    ${rDashActionRequired(urgent24h, urgentTasksNon24h)}
    ${rDashNextActions(nextActions)}
  </div>

  <!-- \u2550\u2550\u2550 STUCK CASES \u2014 SLA-based pipeline health \u2550\u2550\u2550 -->
  ${rDashStuckCases(active)}`;
}

// Action Required \u2014 urgent items needing attention in the next 24h.
// Excludes 24h Response tasks (those have their own dedicated panel above).
// Includes: cases marked Urgent priority, finance/settlement deadlines today/overdue,
// and other tasks (non-response_24h) due within 24h.
function rDashActionRequired(urgent24h, urgentTasks){
  const rows = [];
  urgent24h.forEach(u=>rows.push({
    type:'case', case:u.c, label:u.label, iconName:u.iconName, color:u.color, click:`openCase('${esc(u.c.id)}')`
  }));
  urgentTasks.forEach(t=>{
    const c = S.cases.find(x=>x.id===t.caseId);
    rows.push({
      type:'task', task:t, case:c, label:t.title||t.text||'(task)',
      iconName:'list', color:'#FBBF24',
      click:c?`openCase('${esc(c.id)}','tasks')`:''
    });
  });

  // Empty state \u2014 keeps the dashboard layout symmetrical
  if(!rows.length){
    return `<div class="lux-section">
      <div class="lux-section-hd">
        <div class="lux-section-hd-icon" style="background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.4);">
          ${_iconSvg('check',16,'#34D399')}
        </div>
        <div style="flex:1;">
          <div class="lux-section-title" style="text-transform:uppercase;letter-spacing:.6px;font-size:11px;">Action Required \u00B7 Next 24 Hours</div>
          <div class="lux-section-sub">Nothing urgent right now</div>
        </div>
      </div>
      <div style="padding:32px 22px;text-align:center;">
        <div style="font-size:13px;color:#c9d1d9;font-weight:600;letter-spacing:.2px;">All clear</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px;letter-spacing:.3px;">No urgent items in the next 24 hours</div>
      </div>
    </div>`;
  }

  return`<div class="lux-section" style="border-color:#DC262633;">
    <div class="lux-section-hd" style="background:linear-gradient(90deg,rgba(220,38,38,.08),transparent);">
      <div class="lux-section-hd-icon" style="background:rgba(220,38,38,.15);border:1px solid #DC262655;">
        ${_iconSvg('alert',16,'#DC2626')}
      </div>
      <div style="flex:1;">
        <div class="lux-section-title" style="color:#DC2626;letter-spacing:.6px;text-transform:uppercase;font-size:11px;">Action Required \u00B7 Next 24 Hours</div>
        <div class="lux-section-sub">${rows.length} item${rows.length!==1?'s':''} need immediate attention</div>
      </div>
    </div>
    <div style="max-height:480px;overflow-y:auto;">
      ${rows.slice(0,8).map(r=>{
        // Determine owner: task \u2192 assignedToName, case \u2192 assignedToName, else nothing
        let ownerName='', ownerId='';
        if(r.task && r.task.assignedToName){ ownerName = r.task.assignedToName; ownerId = r.task.assignedTo; }
        else if(r.case && r.case.assignedToName){ ownerName = r.case.assignedToName; ownerId = r.case.assignedTo; }
        const ownerInitials = ownerName ? ownerName.split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() : '';
        return `<div class="lux-row" ${r.click?`onclick="${r.click}"`:''}>
        <div class="lux-row-icon" style="background:${r.color}1c;border:1px solid ${r.color}55;">${_iconSvg(r.iconName,14,r.color)}</div>
        <div class="lux-row-main">
          <div class="lux-row-title">${esc(r.label)}</div>
          ${r.case?`<div class="lux-row-meta">
            <span style="color:#D4A843;font-weight:600;">${esc(r.case.clientName)}</span>
            <span class="lux-row-meta-dot">\u00B7</span>
            <span>${esc(r.case.id)}</span>
            <span class="lux-row-meta-dot">\u00B7</span>
            <span style="color:${gs(r.case.stage).color};">${esc(gs(r.case.stage).label)}</span>
          </div>`:''}
        </div>
        ${ownerName?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;" title="Owner: ${esc(ownerName)}">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#0A0D14;background:${ucolor(ownerId)};">${esc(ownerInitials)}</span>
          <span style="font-size:10.5px;color:#8b949e;font-weight:500;letter-spacing:.2px;">${esc(ownerName.split(' ')[0])}</span>
        </div>`:''}
        <div class="lux-row-tag" style="background:${r.color}22;color:${r.color};">${r.type}</div>
      </div>`;}).join('')}
      ${rows.length>8?`<div style="padding:10px 22px;text-align:center;font-size:11px;color:#6b7280;background:#0A0D14;letter-spacing:.3px;">+ ${rows.length-8} more items</div>`:''}
    </div>
  </div>`;
}

// Refined "What to do next"
function rDashNextActions(nextActions){
  if(!nextActions.length){
    return `<div class="lux-section" style="padding:36px 22px;text-align:center;">
      <div style="margin-bottom:10px;opacity:.5;">${_iconSvg('check',32,'#34D399',{display:'inline-block'})}</div>
      <div style="font-size:14px;color:#c9d1d9;font-weight:600;letter-spacing:.2px;">All clear</div>
      <div style="font-size:11px;color:#6b7280;margin-top:4px;letter-spacing:.3px;">No pending workflow tasks across your active cases</div>
    </div>`;
  }
  const visible = nextActions.slice(0, 8);
  return`<div class="lux-section">
    <div class="lux-section-hd">
      <div class="lux-section-hd-icon" style="background:rgba(212,168,67,.13);border:1px solid #D4A84355;">
        ${_iconSvg('list',16,'#D4A843')}
      </div>
      <div style="flex:1;">
        <div class="lux-section-title" style="text-transform:uppercase;letter-spacing:.6px;font-size:11px;">What To Do Next</div>
        <div class="lux-section-sub">Workflow priorities by case</div>
      </div>
      <button class="btn-ghost" style="font-size:10px;color:#D4A843;letter-spacing:.4px;text-transform:uppercase;font-weight:600;" onclick="setView('workflow')">All \u2192</button>
    </div>
    <div style="max-height:520px;overflow-y:auto;">
      ${visible.map(({c, item, stats, isMandatory})=>{
        const stageObj = gs(c.stage);
        const pctColor = stats.allMandatoryDone?'#34D399':stats.pct>50?'#FBBF24':'#FB923C';
        const ownerName = c.assignedToName || '';
        const ownerInitials = ownerName ? ownerName.split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() : '';
        return`<div class="lux-row" style="align-items:flex-start;">
          <input type="checkbox" onclick="event.stopPropagation();toggleChecklistItemFromDash('${esc(c.id)}','${esc(c.stage)}','${esc(item.id)}',this.checked)" style="margin-top:2px;width:16px;height:16px;cursor:pointer;accent-color:${stageObj.color};flex-shrink:0;">
          <div class="lux-row-main" onclick="openCase('${esc(c.id)}','checklist');">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <div class="lux-row-title" style="white-space:normal;">${esc(item.text)}</div>
              ${isMandatory?`<span class="lux-row-tag" style="background:rgba(212,168,67,.18);color:#D4A843;">Required</span>`:''}
            </div>
            <div class="lux-row-meta">
              <span style="color:#D4A843;font-weight:600;">${esc(c.clientName)}${c.clientName2?' & '+esc(c.clientName2.split(' ')[0]):''}</span>
              <span class="lux-row-meta-dot">\u00B7</span>
              <span style="color:${stageObj.color};">${esc(stageObj.label)}</span>
              <span class="lux-row-meta-dot">\u00B7</span>
              <span style="color:${pctColor};font-weight:600;font-family:'JetBrains Mono',Consolas,monospace;">${stats.done}/${stats.total}</span>
            </div>
          </div>
          ${ownerName?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;" title="Owner: ${esc(ownerName)}">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#0A0D14;background:${ucolor(c.assignedTo)};">${esc(ownerInitials)}</span>
            <span style="font-size:10.5px;color:#8b949e;font-weight:500;letter-spacing:.2px;">${esc(ownerName.split(' ')[0])}</span>
          </div>`:''}
        </div>`;
      }).join('')}
      ${nextActions.length>8?`<div style="padding:10px 22px;text-align:center;font-size:11px;color:#6b7280;background:#0A0D14;letter-spacing:.3px;">+ ${nextActions.length-8} more cases</div>`:''}
    </div>
  </div>`;
}

// Stuck cases \u2014 cases sitting in the same stage for too long.
// Threshold: based on stage-specific industry-standard SLAs from _stageTimingHint
// Surfaces cases that need broker intervention: chase lender, follow up client, etc.
// \u26A1 24h Response \u2014 dedicated panel for the most time-critical task class
function rDash24hResponse(tasks, filterId, myCaseIdsForFilter){
  const now = Date.now();
  const dayMs = 86400000;

  // Categorize: overdue / due today / due tomorrow / later
  const enriched = tasks.map(t=>{
    const c = t.caseId ? S.cases.find(x=>x.id===t.caseId) : null;
    let dueMs = null;
    if(t.dueDate){
      // Parse YYYY-MM-DD as local date
      if(/^\d{4}-\d{2}-\d{2}/.test(t.dueDate)){
        const [yy,mm,dn] = t.dueDate.slice(0,10).split('-').map(Number);
        const d = new Date(yy, mm-1, dn); d.setHours(23,59,59,999);
        dueMs = d.getTime();
      } else {
        const d = new Date(t.dueDate);
        if(!isNaN(d.getTime())) dueMs = d.getTime();
      }
    }
    let bucket, bucketColor, bucketLabel;
    const hrMs = 3600000;
    if(dueMs === null){
      bucket = 'unsched'; bucketColor = '#6b7280'; bucketLabel = 'No due date';
    } else if(dueMs < now){
      const oh = Math.floor((now - dueMs)/hrMs);
      bucket = 'overdue'; bucketColor = '#DC2626';
      bucketLabel = oh < 1 ? 'OVERDUE' : (oh < 24 ? `OVERDUE ${oh}h` : `OVERDUE ${Math.floor(oh/24)}d`);
    } else if(dueMs - now <= 4*hrMs){
      // Nearly out of time \u2014 most urgent live state
      const hl = Math.max(1, Math.ceil((dueMs - now)/hrMs));
      bucket = 'soon'; bucketColor = '#EF4444'; bucketLabel = `${hl}h left`;
    } else if(dueMs - now < dayMs){
      bucket = 'today'; bucketColor = '#FB923C'; bucketLabel = 'Due today';
    } else if(dueMs - now < 2*dayMs){
      bucket = 'tomorrow'; bucketColor = '#FBBF24'; bucketLabel = 'Due tomorrow';
    } else {
      bucket = 'later'; bucketColor = '#7AC8B4'; bucketLabel = 'Upcoming';
    }
    return {t, c, dueMs, bucket, bucketColor, bucketLabel};
  });
  // Sort: overdue \u2192 soon \u2192 today \u2192 tomorrow \u2192 later \u2192 unsched
  const order = {overdue:0, soon:1, today:2, tomorrow:3, later:4, unsched:5};
  enriched.sort((a,b)=>{
    const oa = order[a.bucket], ob = order[b.bucket];
    if(oa !== ob) return oa - ob;
    if(a.dueMs && b.dueMs) return a.dueMs - b.dueMs;
    return 0;
  });

  // Empty state
  if(!enriched.length){
    return `<div class="lux-section" style="border-color:#34D39933;">
      <div class="lux-section-hd" style="background:linear-gradient(90deg,rgba(52,211,153,.05),transparent);">
        <div class="lux-section-hd-icon" style="background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.4);">
          ${_iconSvg('check',16,'#34D399')}
        </div>
        <div style="flex:1;">
          <div class="lux-section-title" style="text-transform:uppercase;letter-spacing:.6px;font-size:11px;">\u26A1 24h Response</div>
          <div class="lux-section-sub">No outstanding 24-hour response tasks</div>
        </div>
        <button class="btn-ghost" style="font-size:10px;color:#D4A843;letter-spacing:.4px;text-transform:uppercase;font-weight:600;" onclick="setView('tasks');S.taskFilter='response_24h';render()">Tasks \u2192</button>
      </div>
    </div>`;
  }

  const overdueCount = enriched.filter(e=>e.bucket==='overdue').length;
  const todayCount = enriched.filter(e=>e.bucket==='today').length;
  const soonCount = enriched.filter(e=>e.bucket==='soon').length;
  const visible = enriched.slice(0, 6);
  const isAdmin = S.user && S.user.role==='admin';

  return `<div class="lux-section" style="border-color:#DC262644;background:linear-gradient(180deg,rgba(220,38,38,.03),transparent 60%);">
    <div class="lux-section-hd" style="background:linear-gradient(90deg,rgba(220,38,38,.10),transparent);">
      <div class="lux-section-hd-icon" style="background:#DC2626;border:1px solid #DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.15);">
        ${_iconSvg('alert',16,'#0A0D14')}
      </div>
      <div style="flex:1;">
        <div class="lux-section-title" style="color:#DC2626;text-transform:uppercase;letter-spacing:.7px;font-size:12px;font-weight:800;">\u26A1 24h Response</div>
        <div class="lux-section-sub">${enriched.length} task${enriched.length!==1?'s':''}${overdueCount?` \u00B7 <span style="color:#DC2626;font-weight:700;">${overdueCount} overdue</span>`:''}${soonCount?` \u00B7 <span style="color:#EF4444;font-weight:700;">${soonCount} nearly out of time</span>`:''}${todayCount?` \u00B7 <span style="color:#FB923C;font-weight:600;">${todayCount} due today</span>`:''}</div>
      </div>
      ${isAdmin && overdueCount?`<button class="btn-ghost" style="font-size:10px;color:#fff;background:#DC2626;border:1px solid #DC2626;letter-spacing:.4px;text-transform:uppercase;font-weight:700;padding:5px 10px;border-radius:6px;margin-right:8px;" onclick="event.stopPropagation();reportOverdue24h()" title="Email the assigner + Ryan about overdue tasks">\u26A0 Report overdue</button>`:''}
      <button class="btn-ghost" style="font-size:10px;color:#DC2626;letter-spacing:.4px;text-transform:uppercase;font-weight:700;" onclick="setView('tasks');S.taskFilter='response_24h';render()">View All \u2192</button>
    </div>
    <div style="max-height:380px;overflow-y:auto;">
      ${visible.map(({t, c, bucket, bucketColor, bucketLabel, dueMs})=>{
        const ownerName = t.assignedToName || '';
        const ownerInitials = ownerName ? ownerName.split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() : '';
        const click = c ? `openCase('${esc(c.id)}','tasks')` : `setView('tasks');S.taskFilter='response_24h';render()`;
        const dueLabel = dueMs ? new Date(dueMs).toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'}) : '';
        return `<div class="lux-row" onclick="${click}">
          <div class="lux-row-icon" style="background:${bucketColor}1c;border:1px solid ${bucketColor}55;">
            ${_iconSvg(bucket==='overdue'?'alert':'clock',14,bucketColor)}
          </div>
          <div class="lux-row-main">
            <div class="lux-row-title">${esc(t.text || '24h Response')}</div>
            <div class="lux-row-meta">
              ${c?`<span style="color:#D4A843;font-weight:600;">${esc(c.clientName)}</span><span class="lux-row-meta-dot">\u00B7</span><span style="color:${gs(c.stage).color};">${esc(gs(c.stage).label)}</span><span class="lux-row-meta-dot">\u00B7</span>`:'<span style="color:#6b7280;">No case linked</span><span class="lux-row-meta-dot">\u00B7</span>'}
              ${dueLabel?`<span style="color:${bucketColor};font-weight:600;">${esc(dueLabel)}</span>`:''}
            </div>
          </div>
          ${ownerName?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;" title="Owner: ${esc(ownerName)}">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#0A0D14;background:${ucolor(t.assignedTo)};">${esc(ownerInitials)}</span>
            <span style="font-size:10.5px;color:#8b949e;font-weight:500;letter-spacing:.2px;">${esc(ownerName.split(' ')[0])}</span>
          </div>`:''}
          <div class="lux-row-tag" style="background:${bucketColor}22;color:${bucketColor};">${esc(bucketLabel)}</div>
        </div>`;
      }).join('')}
      ${enriched.length>6?`<div style="padding:10px 22px;text-align:center;font-size:11px;color:#6b7280;background:#0A0D14;letter-spacing:.3px;">+ ${enriched.length-6} more \u00B7 click View All</div>`:''}
    </div>
  </div>`;
}

function rDashStuckCases(active){
  // Stage SLA thresholds in days \u2014 beyond this, the case is "stuck"
  const stageSla = {
    new_enquiry: 3,       // should respond + qualify within 3 days
    fact_find: 14,        // 1-2 weeks to gather docs
    assessment: 7,        // lender comparison should complete in a week
    submitted: 10,        // typical lender SLA
    pre_approval: 90,     // pre-approval validity period
    conditional: 21,      // conditions can take a few weeks
    unconditional: 14,    // signing + return
    ready_settle: 10,     // settlement booking lead time
  };

  const now = Date.now();
  const dayMs = 86400000;
  const stuck = [];

  active.forEach(c=>{
    const threshold = stageSla[c.stage];
    if(!threshold) return;
    // Use createdAt as fallback if no stage timestamp (could be enhanced with stage-change history later)
    const since = new Date(c.createdAt).getTime();
    if(isNaN(since)) return;
    const daysIn = Math.floor((now - since) / dayMs);
    if(daysIn >= threshold){
      stuck.push({c, daysIn, threshold, overBy: daysIn - threshold});
    }
  });

  // Sort: most overdue first
  stuck.sort((a,b)=>b.overBy - a.overBy);

  if(!stuck.length){
    return `<div class="lux-section" style="margin-bottom:0;">
      <div class="lux-section-hd">
        <div class="lux-section-hd-icon" style="background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.4);">
          ${_iconSvg('check',16,'#34D399')}
        </div>
        <div style="flex:1;">
          <div class="lux-section-title" style="text-transform:uppercase;letter-spacing:.6px;font-size:11px;">Pipeline Health</div>
          <div class="lux-section-sub">All cases are progressing within expected timeframes</div>
        </div>
      </div>
      <div style="padding:24px 22px;text-align:center;font-size:12px;color:#6b7280;letter-spacing:.3px;">
        No cases are stuck. Industry-standard SLA thresholds: enquiry 3d \u00B7 fact find 2w \u00B7 assessment 1w \u00B7 submitted 10d
      </div>
    </div>`;
  }

  const visible = stuck.slice(0, 8);
  return `<div class="lux-section" style="margin-bottom:0;border-color:#FB923C26;">
    <div class="lux-section-hd" style="background:linear-gradient(90deg,rgba(251,146,60,.06),transparent);">
      <div class="lux-section-hd-icon" style="background:rgba(251,146,60,.13);border:1px solid #FB923C55;">
        ${_iconSvg('clock',16,'#FB923C')}
      </div>
      <div style="flex:1;">
        <div class="lux-section-title" style="color:#FB923C;text-transform:uppercase;letter-spacing:.6px;font-size:11px;">Stuck Cases \u00B7 Need Attention</div>
        <div class="lux-section-sub">${stuck.length} case${stuck.length!==1?'s':''} sitting longer than industry-standard SLA</div>
      </div>
      <button class="btn-ghost" style="font-size:10px;color:#FB923C;letter-spacing:.4px;text-transform:uppercase;font-weight:600;" onclick="setView('pipeline')">Pipeline \u2192</button>
    </div>
    <div style="max-height:400px;overflow-y:auto;">
      ${visible.map(({c, daysIn, threshold, overBy})=>{
        const stageObj = gs(c.stage);
        const severity = overBy < threshold ? 'warn' : overBy < 2*threshold ? 'critical' : 'severe';
        const sevColor = severity==='severe' ? '#DC2626' : severity==='critical' ? '#ef4444' : '#FB923C';
        const sevLabel = severity==='severe' ? 'STALE' : severity==='critical' ? 'OVERDUE' : 'AT RISK';
        const ownerName = c.assignedToName || '';
        const ownerInitials = ownerName ? ownerName.split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() : '';
        return `<div class="lux-row" onclick="openCase('${esc(c.id)}')">
          <div class="lux-row-icon" style="background:${sevColor}1c;border:1px solid ${sevColor}55;">
            ${_iconSvg('clock',14,sevColor)}
          </div>
          <div class="lux-row-main">
            <div class="lux-row-title">
              <span style="color:#c9d1d9;">${esc(c.clientName)}</span>
              ${c.clientName2?`<span style="color:#6b7280;font-weight:400;"> & ${esc(c.clientName2.split(' ')[0])}</span>`:''}
            </div>
            <div class="lux-row-meta">
              <span style="color:${stageObj.color};">${esc(stageObj.label)}</span>
              <span class="lux-row-meta-dot">\u00B7</span>
              <span style="font-family:'JetBrains Mono',Consolas,monospace;color:${sevColor};font-weight:600;">${daysIn}d</span>
              <span style="color:#4a5568;">/ SLA ${threshold}d</span>
              <span class="lux-row-meta-dot">\u00B7</span>
              <span>${fmtCur(c.loanAmount)}</span>
            </div>
          </div>
          ${ownerName?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;" title="Owner: ${esc(ownerName)}">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#0A0D14;background:${ucolor(c.assignedTo)};">${esc(ownerInitials)}</span>
            <span style="font-size:10.5px;color:#8b949e;font-weight:500;letter-spacing:.2px;">${esc(ownerName.split(' ')[0])}</span>
          </div>`:''}
          <div class="lux-row-tag" style="background:${sevColor}22;color:${sevColor};">+${overBy}d ${sevLabel}</div>
        </div>`;
      }).join('')}
      ${stuck.length>8?`<div style="padding:10px 22px;text-align:center;font-size:11px;color:#6b7280;background:#0A0D14;letter-spacing:.3px;">+ ${stuck.length-8} more stuck cases</div>`:''}
    </div>
  </div>`;
}

// Inline SVG icons \u2014 clean, scalable, no emoji rendering inconsistency
function _iconSvg(name, size, color, extra){
  size = size || 16;
  color = color || 'currentColor';
  const styleStr = extra ? Object.keys(extra).map(k=>k+':'+extra[k]).join(';') : '';
  const paths = {
    home: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    money: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    alert: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${styleStr}">${paths[name]||''}</svg>`;
}

async function toggleChecklistItemFromDash(cid, stageId, itemId, done){
  const c = S.cases.find(x=>x.id===cid);
  if(!c) return;
  let progress = {};
  try { progress = JSON.parse(c.checklist || '{}'); } catch(e) { progress = {}; }
  if(!progress[stageId]) progress[stageId] = [];
  const arr = progress[stageId];
  const idx = arr.indexOf(itemId);
  if(done && idx<0) arr.push(itemId);
  else if(!done && idx>=0) arr.splice(idx,1);
  progress[stageId] = arr;
  c.checklist = JSON.stringify(progress);
  // Re-render dashboard
  if(S.view==='dashboard') render();
  const r = await gs_('updateCaseChecklist', S.tok, cid, stageId, itemId, done, S.user.name);
  if(!r||!r.ok){
    toast((r&&r.msg)||'Save failed',1);
  } else if(done) {
    toast('\u2713 Task marked done');
  }
}

// \u2500\u2500 14-day Action Timeline (Gantt-style infographic) \u2500\u2500
function rDashTimeline(filterId){
  // filterId: 'all' or a user ID \u2014 limits cases + tasks shown
  const today = new Date();
  today.setHours(0,0,0,0);
  const dayMs = 86400000;

  // Parse 'YYYY-MM-DD' as local date (not UTC), to avoid timezone shift in AU.
  // Without this, new Date('2026-05-03') = UTC midnight = May 2 ~14:30 in Adelaide.
  const parseLocal = (val) => {
    if(!val) return null;
    if(typeof val === 'string' && /^\d{4}-\d{2}-\d{2}/.test(val)){
      const [yy, mm, dn] = val.slice(0,10).split('-').map(Number);
      const d = new Date(yy, mm-1, dn);
      return isNaN(d.getTime()) ? null : d;
    }
    const d = new Date(val);
    return isNaN(d.getTime()) ? null : d;
  };

  // Build 14-day window: Today + 13 forward
  const days = [];
  for(let i=0; i<14; i++){
    const d = new Date(today.getTime() + i*dayMs);
    days.push({
      idx: i,
      date: d,
      isToday: i===0,
      isTomorrow: i===1,
      isWeekend: d.getDay()===0 || d.getDay()===6,
      dayName: d.toLocaleDateString('en-AU',{weekday:'short'}).toUpperCase(),
      dayNum: d.getDate(),
      month: d.toLocaleDateString('en-AU',{month:'short'}).toUpperCase()
    });
  }

  // Build per-case event list within window (overdue items folded onto Today)
  const caseEvents = [];
  // Map caseId \u2192 events array, so we can add task events to existing case rows
  const eventsByCaseId = {};
  const ensureEvents = (cid) => {
    if (!eventsByCaseId[cid]) eventsByCaseId[cid] = [];
    return eventsByCaseId[cid];
  };

  // Apply person filter if provided
  const passesFilter = (c) => {
    if(!filterId || filterId === 'all') return true;
    return c.assignedTo === filterId || c.createdBy === filterId;
  };

  S.cases.filter(c => !c.archived && ['settled','not_proceeding'].indexOf(c.stage) < 0 && passesFilter(c)).forEach(c => {
    const events = ensureEvents(c.id);
    // 24h response is now surfaced in its own dedicated dashboard panel \u2014 no longer
    // auto-added to the timeline. Users explicitly create response_24h tasks instead.
    // Finance Due Date
    const fd = parseLocal(c.financeDueDate);
    if(fd){
      fd.setHours(0,0,0,0);
      const dayIdx = Math.round((fd.getTime() - today.getTime()) / dayMs);
      if(dayIdx >= 0 && dayIdx < 14){
        events.push({kind:'finance', dayIdx, label:`Finance Due ${fd.toLocaleDateString('en-AU')}`, date: fd, overdue:false});
      } else if(dayIdx < 0 && dayIdx >= -14){
        events.push({kind:'finance', dayIdx:0, label:`Finance OVERDUE (${Math.abs(dayIdx)}d ago)`, date: fd, overdue:true});
      }
    }
    // Settlement Date
    const sd = parseLocal(c.settlementDate);
    if(sd){
      sd.setHours(0,0,0,0);
      const dayIdx = Math.round((sd.getTime() - today.getTime()) / dayMs);
      if(dayIdx >= 0 && dayIdx < 14){
        events.push({kind:'settlement', dayIdx, label:`Settlement ${sd.toLocaleDateString('en-AU')}`, date: sd, overdue:false});
      } else if(dayIdx < 0 && dayIdx >= -14){
        events.push({kind:'settlement', dayIdx:0, label:`Settlement OVERDUE (${Math.abs(dayIdx)}d ago)`, date: sd, overdue:true});
      }
    }
  });

  // Add open tasks with due dates \u2014 visible to admin (all) or owner (own).
  // Tasks attached to a case land on that case's row; orphan tasks get their own row.
  // Filter: include tasks assigned to the filter person OR tasks on cases owned by the filter person.
  // This lets a broker see all tasks across their own cases, even those delegated to support.
  const myCaseIdsForTasks = new Set(
    filterId && filterId !== 'all'
      ? S.cases.filter(c=>c.assignedTo===filterId || c.createdBy===filterId).map(c=>c.id)
      : []
  );
  S.tasks.filter(t => !isTrue(t.done) && t.dueDate).forEach(t => {
    // 24h Response tasks are surfaced in their dedicated dashboard panel only
    if(t.kind === 'response_24h') return;
    // Hard role gate: support can only see own
    if(S.user.role === 'support' && t.assignedTo !== S.user.id) return;
    // Person filter: pass if assignedTo matches filterId, OR task is on a case owned by filterId
    if(filterId && filterId !== 'all'){
      const isOwnTask = t.assignedTo === filterId;
      const isTaskOnMyCase = t.caseId && myCaseIdsForTasks.has(t.caseId);
      if(!isOwnTask && !isTaskOnMyCase) return;
    }
    const dd = parseLocal(t.dueDate);
    if(!dd) return;
    dd.setHours(0,0,0,0);
    const dayIdx = Math.round((dd.getTime() - today.getTime()) / dayMs);
    let computedIdx = null;
    let overdue = false;
    if(dayIdx >= 0 && dayIdx < 14){
      computedIdx = dayIdx;
    } else if(dayIdx < 0 && dayIdx >= -30){
      computedIdx = 0;
      overdue = true;
    }
    if(computedIdx === null) return;
    const isUrgent = t.priority === 'Urgent';
    const events = ensureEvents(t.caseId || ('orphan_task_' + t.id));
    events.push({
      kind: isUrgent ? 'task_urgent' : 'task',
      dayIdx: computedIdx,
      label: (isUrgent?'\u26A1 ':'') + (t.title || t.text || 'Task') + (overdue ? ` (OVERDUE ${Math.abs(dayIdx)}d)` : ''),
      date: dd,
      overdue,
      task: t,
    });
  });

  // Materialize caseEvents from the eventsByCaseId map
  Object.keys(eventsByCaseId).forEach(cid => {
    const events = eventsByCaseId[cid];
    if (!events.length) return;
    events.sort((a,b)=>a.dayIdx - b.dayIdx);
    let c;
    if (cid.indexOf('orphan_task_') === 0) {
      // Orphan task \u2014 synthesize a pseudo-case row label from the task itself
      const t = events[0].task;
      c = {
        id: cid,
        clientName: t.title || t.text || 'Standalone Task',
        loanAmount: 0,
        stage: 'task',
        _isOrphanTask: true
      };
    } else {
      c = S.cases.find(x => x.id === cid);
      if (!c) return;
    }
    caseEvents.push({c, events, hasOverdue: events.some(e=>e.overdue), firstIdx: events[0].dayIdx});
  });

  // Sort: overdue first, then by earliest event
  caseEvents.sort((a,b)=>{
    if(a.hasOverdue !== b.hasOverdue) return a.hasOverdue ? -1 : 1;
    return a.firstIdx - b.firstIdx;
  });
  const visible = caseEvents.slice(0, 30);

  if(!visible.length){
    return`<div class="card" style="padding:36px 20px;margin-bottom:14px;text-align:center;color:#6b7280;">
      <div style="margin-bottom:10px;opacity:.7;">${_iconSvg('check',32,'#34D399',{display:'inline-block'})}</div>
      <div style="font-size:14px;font-weight:600;color:#c9d1d9;">All clear for the next 14 days</div>
      <div style="font-size:11px;margin-top:4px;">No upcoming finance due dates, settlements, or 24h response deadlines.</div>
    </div>`;

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D4A843" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  PIPELINE                                       \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
function rPipeline(){
  // By default, hide "completed" stages (Settled + Not Proceeding) \u2014 they pile up over time
  // and are not actively worked on. Toggle stays in localStorage so each user has their own preference.
  const hideCompleted=S.pipelineHideCompleted!==false; // default true
  const completedIds=['settled','not_proceeding'];
  const visibleStages=hideCompleted?STAGES.filter(s=>!completedIds.includes(s.id)):STAGES;
  const activeCases = S.cases.filter(c => !c.archived);
  const stageCounts = {};
  STAGES.forEach(s => { stageCounts[s.id] = activeCases.filter(c => c.stage === s.id).length; });
  const settledCount=stageCounts.settled||0;
  const npCount=stageCounts.not_proceeding||0;
  const hiddenCount=settledCount+npCount;
  const view = S.pipelineView || 'board';

  // Toolbar: view toggle (Board / Compact) + hide-completed
  const toolbar = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <div style="background:#0f1420;border:1px solid #1e2430;border-radius:7px;padding:2px;display:flex;gap:2px;">
        <button class="${view==='board'?'btn-gold':'btn-ghost'}" style="font-size:11px;padding:4px 10px;border-radius:5px;${view==='board'?'':'color:#8b949e;'}" onclick="setPipelineView('board')" title="Kanban board with drag-and-drop">\uD83D\uDFE6 Board</button>
        <button class="${view==='compact'?'btn-gold':'btn-ghost'}" style="font-size:11px;padding:4px 10px;border-radius:5px;${view==='compact'?'':'color:#8b949e;'}" onclick="setPipelineView('compact')" title="Vertical list \u2014 better for PC / iPad / laptop overview">\uD83D\uDCCB Compact</button>
      </div>
      <div style="font-size:11px;color:#6b7280;margin-left:6px;">${visibleStages.length} stage${visibleStages.length!==1?'s':''}${activeCases.length?` \u00B7 ${activeCases.length} active`:''}</div>
    </div>
    <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
      ${hideCompleted?`<button class="chip" style="background:#0f1420;color:#8b949e;font-size:10.5px;padding:3px 9px;" onclick="setPipelineHideCompleted(false)" title="Show settled + not-proceeding">\uD83D\uDC41 +${hiddenCount} done</button>`:`<button class="chip" style="background:#D4A84318;color:#D4A843;border-color:#D4A84355;font-size:10.5px;padding:3px 9px;" onclick="setPipelineHideCompleted(true)">\u2298 Hide done</button>`}
    </div>
  </div>`;

  if(view === 'compact') return toolbar + rPipelineCompact_(visibleStages);

  // Board view \u2014 all stages render normally with drag-drop. Use Compact view for an
  // all-at-once overview on PC; Board is for active triage where horizontal scroll is OK.
  return toolbar + `<div id="pb">${visibleStages.map(stage=>{
    const sc=S.cases.filter(c=>c.stage===stage.id && !c.archived);
    const tv=sc.reduce((s,c)=>s+Number(c.loanAmount||0),0);
    return`<div class="pc" data-stage="${esc(stage.id)}" ondragover="event.preventDefault();this.classList.add('stage-drop-target');" ondragleave="this.classList.remove('stage-drop-target');" ondrop="handlePipelineDrop(event,'${esc(stage.id)}')">
      <div class="pc-hd" style="border-top:3px solid ${stage.color};">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:12px;font-weight:700;color:#c9d1d9;">${esc(stage.label)}</div>
          <div style="background:${stage.bg};color:${stage.color};width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">${sc.length}</div>
        </div>
        ${sc.length?`<div style="font-size:10px;color:#4a5568;margin-top:2px;">${fmtCur(tv)}</div>`:''}
      </div>
      <div class="pc-body">
        ${sc.map(c=>pCard(c,stage)).join('')}
        ${!sc.length?'<div style="text-align:center;padding:20px;color:#21262D;font-size:11px;">Empty \u2014 drop here</div>':''}
      </div>
    </div>`;}).join('')}</div>`;
}

// Compact view \u2014 single vertical column with collapsible stage groups.
// Designed for iPad / small laptop where horizontal kanban scrolling is painful.
function rPipelineCompact_(visibleStages){
  const expanded = S.pipelineExpanded || {};
  // Default: expand stages that have cases AND haven't been explicitly collapsed
  return `<div style="max-width:1100px;margin:0 auto;">
    ${visibleStages.map(stage => {
      const sc = S.cases.filter(c => c.stage === stage.id && !c.archived);
      const tv = sc.reduce((s,c) => s + Number(c.loanAmount||0), 0);
      const isOpen = expanded[stage.id] !== false && sc.length > 0;  // default open if has cases
      return `<div class="pc-grp${isOpen?' open':''}" style="--sc:${stage.color};">
        <div class="pc-grp-hd" onclick="togglePipelineGroup_('${esc(stage.id)}')">
          <span style="color:${stage.color};font-size:14px;font-weight:700;flex-shrink:0;">${isOpen?'\u25BC':'\u25B6'}</span>
          <span style="width:8px;height:8px;border-radius:50%;background:${stage.color};flex-shrink:0;"></span>
          <span style="font-size:13px;font-weight:700;color:#c9d1d9;">${esc(stage.label)}</span>
          <span style="background:${stage.bg};color:${stage.color};padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;">${sc.length}</span>
          ${sc.length?`<span style="font-size:11px;color:#6b7280;margin-left:auto;">${fmtCur(tv)}</span>`:'<span style="font-size:11px;color:#21262D;margin-left:auto;font-style:italic;">empty</span>'}
        </div>
        <div class="pc-grp-body">
          ${sc.map(c => pCardCompact_(c, stage)).join('')}
          ${!sc.length?'<div style="text-align:center;padding:14px;color:#21262D;font-size:11px;">No cases in this stage</div>':''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// Risk class for cards \u2014 red for stuck >7d, yellow for deadline \u22643d, none otherwise
function _caseRiskClass_(c, prefix){
  if(!c) return '';
  const now = new Date();
  // Deadline check first (more urgent than stuck)
  const fd = c.financeDueDate ? new Date(c.financeDueDate) : null;
  const sd = c.settlementDate ? new Date(c.settlementDate) : null;
  for(const d of [fd, sd].filter(Boolean)){
    const daysToDeadline = Math.floor((d - now) / 86400000);
    if(daysToDeadline >= 0 && daysToDeadline <= 3) return prefix + '-deadline';
  }
  // Stuck check: use createdAt as proxy (no per-stage timestamp available)
  // Skip for "settled" and "not_proceeding" \u2014 those don't have a "stuck" concept
  if(c.stage === 'settled' || c.stage === 'not_proceeding') return '';
  if(c.createdAt){
    const created = new Date(c.createdAt);
    const daysSinceCreate = Math.floor((now - created) / 86400000);
    if(daysSinceCreate >= 7) return prefix + '-stuck';
  }
  return '';
}

function setPipelineHideCompleted(v){
  S.pipelineHideCompleted=v;
  localStorage.setItem('bd_pipeline_hide_completed',v?'1':'0');
  render();
}

function setPipelineView(v){
  S.pipelineView = v;
  localStorage.setItem('bd_pipeline_view', v);
  render();
}

function togglePipelineGroup_(stageId){
  if(!S.pipelineExpanded) S.pipelineExpanded = {};
  // Toggle \u2014 flip current state; default is "open" if cases exist, so first toggle closes it
  const current = S.pipelineExpanded[stageId];
  S.pipelineExpanded[stageId] = (current === false);
  localStorage.setItem('bd_pipeline_expanded', JSON.stringify(S.pipelineExpanded));
  render();
}

// \u2500\u2500 Pipeline drag & drop \u2500\u2500
async function handlePipelineDrop(ev, newStage){
  ev.preventDefault();
  document.querySelectorAll('.stage-drop-target').forEach(el=>el.classList.remove('stage-drop-target'));
  const cid = ev.dataTransfer.getData('text/cid');
  if(!cid) return;
  const c = S.cases.find(x=>x.id===cid);
  if(!c || c.stage===newStage) return;
  if(isTrue(c.locked)){
    toast(`\uD83D\uDD12 "${c.clientName}" is locked at ${gs(c.stage).label}. Open the case and click \uD83D\uDD13 Unlock to allow stage changes.`,1);
    return;
  }
  const oldStage = c.stage;
  c.stage = newStage;  // optimistic
  render();
  toast('Moved to '+gs(newStage).label);
  const r = await gs_('updateCase', S.tok, cid, { stage: newStage });
  if(!r||!r.ok){
    c.stage = oldStage;
    render();
    toast((r&&r.msg)||'Failed to move case \u2014 reverted',1);
    return;
  }
  // If moved INTO settled or OUT OF settled, refresh tasks (reminders auto-created/deleted)
  if(newStage==='settled' || oldStage==='settled'){
    const tr=await gs_('getTasks',S.tok);
    if(tr&&tr.ok){S.tasks=tr.data||[];render();}
  }
}
function handleCardDragStart(ev, cid){
  const c = S.cases.find(x=>x.id===cid);
  if(c && isTrue(c.locked)){
    ev.preventDefault();
    toast(`\uD83D\uDD12 ${c.clientName} is locked. Unlock from the case to move.`,1);
    return false;
  }
  ev.dataTransfer.setData('text/cid', cid);
  ev.dataTransfer.effectAllowed = 'move';
  ev.currentTarget.classList.add('case-card-dragging');
}
function handleCardDragEnd(ev){
  ev.currentTarget.classList.remove('case-card-dragging');
  document.querySelectorAll('.stage-drop-target').forEach(el=>el.classList.remove('stage-drop-target'));
}

function pCard(c,stage){
  const ot=cTasks(c.id).filter(t=>!isTrue(t.done)).length;
  const ep=cTasks(c.id).filter(t=>!isTrue(t.done)&&isTrue(t.isEmailTask)).length;
  const isLocked=isTrue(c.locked);
  const risk = _caseRiskClass_(c, 'pk');  // 'pk-stuck' / 'pk-deadline' / ''
  const stageOpts=STAGES.filter(s=>s.id!==c.stage).map(s=>`<button class="dd-i" onclick="event.stopPropagation();moveCase('${esc(c.id)}','${s.id}');"><span style="color:${s.color};font-size:14px;margin-right:3px;">\u203A</span>${esc(s.label)}</button>`).join('');
  return`<div class="pk ${risk} ${isLocked?'case-locked':'case-card-draggable'}" ${isLocked?'':'draggable="true"'} style="--sc:${stage.color};${isLocked?'cursor:pointer;':''}" onclick="openCase('${esc(c.id)}')" ${isLocked?'':"ondragstart=\"handleCardDragStart(event,'"+esc(c.id)+"')\" ondragend=\"handleCardDragEnd(event)\""}>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;">
      <div style="flex:1;min-width:0;"><div style="font-size:10px;color:#4a5568;display:flex;align-items:center;gap:4px;">${esc(c.id)}${isLocked?' <span style="color:#A78BFA;" title="Locked \u2014 drag disabled">\uD83D\uDD12</span>':''}${risk==='pk-stuck'?' <span style="color:#DC2626;font-weight:700;" title="Stuck >7 days">\uD83D\uDD34</span>':risk==='pk-deadline'?' <span style="color:#FBBF24;font-weight:700;" title="Deadline within 3 days">\uD83D\uDFE1</span>':''}</div>
        <div style="font-size:13px;font-weight:700;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.clientName)}</div></div>
      <div style="display:flex;align-items:center;gap:4px;">
        ${pbadge(c.priority)}
        <div class="dd-w" onclick="event.stopPropagation();">
          <button class="btn-ghost" style="padding:2px;" onclick="toggleMenu('dm${esc(c.id)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </button>
          <div class="dd-m" id="dm${esc(c.id)}">
            <div style="padding:7px 12px 4px;font-size:9px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;">Move to stage</div>
            ${stageOpts}
          </div>
        </div>
      </div>
    </div>
    <div class="pk-amt" style="font-size:15px;font-weight:800;color:${stage.color};margin-bottom:5px;">${fmtCur(c.loanAmount)}</div>

}

// Compact-view row \u2014 1-line card, optimised for iPad/laptop vertical scroll.

function pCardCompact_(c, stage){

  return `<div class="pc-row ${risk}" style="--sc:${stage.color};" onclick="openCase('${esc(c.id)}')">
    <div style="font-size:10px;color:#4a5568;font-family:'JetBrains Mono',Consolas,monospace;flex-shrink:0;width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.id)}</div>
    <div style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;">
      ${av(c.assignedToName, 22, ucolor(c.assignedTo))}
      <div style="min-width:0;overflow:hidden;">
        <div style="font-size:13px;font-weight:700;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.clientName||'')}${isLocked?' \uD83D\uDD12':''}</div>
        ${c.lenderName?`<div style="font-size:10.5px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.lenderName)}${c.loanPurpose?' \u00B7 '+esc(c.loanPurpose):''}</div>`:''}
      </div>
    </div>
    <div style="font-size:13px;font-weight:800;color:${stage.color};flex-shrink:0;text-align:right;min-width:90px;">${fmtCur(c.loanAmount)}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      ${risk==='pc-row-stuck'?'<span style="color:#DC2626;font-size:13px;" title="Stuck >7 days">\uD83D\uDD34</span>':risk==='pc-row-deadline'?'<span style="color:#FBBF24;font-size:13px;" title="Deadline within 3 days">\uD83D\uDFE1</span>':''}
      ${pbadge(c.priority)}
      ${ot?`<span style="font-size:10px;color:#FBBF24;font-weight:700;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:8px;">${ot}</span>`:''}
      ${c.settlementDate?`<span style="font-size:10px;color:#FBBF24;" title="Settlement: ${esc(c.settlementDate)}">\uD83D\uDCC5</span>`:''}
      <div class="dd-w" onclick="event.stopPropagation();">
        <button class="btn-ghost" style="padding:4px;" onclick="toggleMenu('dmc${esc(c.id)}')" title="Move to stage">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
        <div class="dd-m" id="dmc${esc(c.id)}">
          <div style="padding:7px 12px 4px;font-size:9px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;">Move to stage</div>
          ${stageOpts}

      </div>
    </div>
  </div>`;
}

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  CASES LIST                                     \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
function rCases(){
  const q=(S.search||'').toLowerCase(),f=S.caseFilter;
  const fl=S.cases.filter(c=>{
    const ms=!q||(c.clientName||'').toLowerCase().indexOf(q)>=0||(c.id||'').toLowerCase().indexOf(q)>=0||(c.email||'').toLowerCase().indexOf(q)>=0;
    const mf=f==='all'||c.stage===f||(f==='active'&&['settled','not_proceeding'].indexOf(c.stage)<0);
    return ms&&mf;
  });
  return`<div class="filter-row">
    <div class="sw-wrap"><svg class="sw-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="fi" id="cs-search" value="${esc(S.search)}" placeholder="Search client, ID, email\u2026" oninput="S.search=this.value;rerenderCasesTable();"></div>
    <select class="fi" style="width:auto;" onchange="S.caseFilter=this.value;rerenderCasesTable();">
      <option value="all"${f==='all'?' selected':''}>All Cases</option>
      <option value="active"${f==='active'?' selected':''}>Active Only</option>
      ${STAGES.map(s=>`<option value="${s.id}"${f===s.id?' selected':''}>${esc(s.label)}</option>`).join('')}
    </select>
  </div>
  <div id="cs-table-wrap">${casesTableHtml(fl)}</div>
  <div style="margin-top:9px;font-size:12px;color:#4a5568;">${fl.length} case${fl.length!==1?'s':''}</div>`;
}
function casesTableHtml(fl){
  return `<div class="card" style="overflow:hidden;overflow-x:auto;">
    <table class="tbl"><thead><tr>${['Case ID','Client','Amount','Purpose','Lender','Stage','Assigned','Priority','Settlement'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${fl.map(c=>`<tr onclick="openCase('${esc(c.id)}')">
        <td style="color:#D4A843;font-weight:700;font-size:11px;white-space:nowrap;">${esc(c.id)}</td>
        <td><div style="font-weight:600;color:#c9d1d9;white-space:nowrap;">${esc(c.clientName)}${c.clientName2?`<span style="color:#A78BFA;"> &amp; ${esc(c.clientName2)}</span>`:''}</div><div style="font-size:11px;color:#4a5568;">${esc(c.email)}${c.clientName2?' \u00B7 joint':''}</div></td>
        <td style="font-weight:800;white-space:nowrap;">${fmtCur(c.loanAmount)}</td>
        <td style="color:#6b7280;font-size:12px;white-space:nowrap;">${esc(c.loanPurpose)}</td>
        <td style="color:#6b7280;font-size:12px;">${esc(c.lenderName||'\u2013')}</td>
        <td>${sbadge(c.stage,true)}</td>
        <td><div style="display:flex;align-items:center;gap:6px;white-space:nowrap;">${av(c.assignedToName,21,ucolor(c.assignedTo))}<span style="font-size:12px;color:#6b7280;">${esc(c.assignedToName||'\u2013')}</span></div></td>
        <td>${pbadge(c.priority)}</td>
        <td style="color:#6b7280;font-size:12px;white-space:nowrap;">${esc(c.settlementDate||'\u2013')}</td>
      </tr>`).join('')}</tbody>
    </table>
    ${!fl.length?'<div style="text-align:center;padding:30px;color:#4a5568;">No cases found</div>':''}
  </div>`;
}
function rerenderCasesTable(){
  const q=(S.search||'').toLowerCase(),f=S.caseFilter;
  const fl=S.cases.filter(c=>{
    const ms=!q||(c.clientName||'').toLowerCase().indexOf(q)>=0||(c.id||'').toLowerCase().indexOf(q)>=0||(c.email||'').toLowerCase().indexOf(q)>=0;
    const mf=f==='all'||c.stage===f||(f==='active'&&['settled','not_proceeding'].indexOf(c.stage)<0);
    return ms&&mf;
  });
  const w=document.getElementById('cs-table-wrap');if(w)w.innerHTML=casesTableHtml(fl);
}

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  TASKS                                          \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  REMINDERS \u2014 post-settlement client follow-up   \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
function rReminders(){
  const role=S.user.role;
  // All post-settlement reminder tasks (auto-created when a case settles)
  let reminders=S.tasks.filter(t=>String(t.kind)==='post_settlement_followup');
  if(role==='support') reminders=reminders.filter(t=>t.assignedTo===S.user.id);
  // Filter
  const filter=S.reminderFilter||'pending';
  const now=Date.now();
  if(filter==='pending') reminders=reminders.filter(t=>!isTrue(t.done));
  else if(filter==='overdue') reminders=reminders.filter(t=>!isTrue(t.done) && t.dueDate && new Date(t.dueDate).getTime()<now);
  else if(filter==='due_soon') reminders=reminders.filter(t=>!isTrue(t.done) && t.dueDate && (new Date(t.dueDate).getTime()-now)<30*86400000 && new Date(t.dueDate).getTime()>=now);
  else if(filter==='done') reminders=reminders.filter(t=>isTrue(t.done));
  // Sort: overdue first, then by due date asc
  reminders.sort((a,b)=>{
    if(isTrue(a.done)!==isTrue(b.done)) return isTrue(a.done)?1:-1;
    const ad=a.dueDate?new Date(a.dueDate).getTime():Infinity;
    const bd=b.dueDate?new Date(b.dueDate).getTime():Infinity;
    return ad-bd;
  });
  const counts={
    pending: S.tasks.filter(t=>String(t.kind)==='post_settlement_followup'&&!isTrue(t.done)).length,
    overdue: S.tasks.filter(t=>String(t.kind)==='post_settlement_followup'&&!isTrue(t.done)&&t.dueDate&&new Date(t.dueDate).getTime()<now).length,
    due_soon: S.tasks.filter(t=>String(t.kind)==='post_settlement_followup'&&!isTrue(t.done)&&t.dueDate&&(new Date(t.dueDate).getTime()-now)<30*86400000&&new Date(t.dueDate).getTime()>=now).length,
    done: S.tasks.filter(t=>String(t.kind)==='post_settlement_followup'&&isTrue(t.done)).length
  };
  return`<div style="margin-bottom:12px;">
    <div class="card" style="padding:13px 16px;background:linear-gradient(135deg,rgba(212,168,67,.06),transparent);border-color:#D4A84333;">
      <div style="font-size:13px;color:#c9d1d9;font-weight:700;margin-bottom:4px;">\uD83E\uDD1D Post-settlement client care</div>
      <div style="font-size:11px;color:#8b949e;line-height:1.6;">When a case is marked Settled, a 6-month follow-up reminder is auto-created. Use this to call the client, check in, and ask for referrals. Each reminder can be reassigned and marked done once contact is made.</div>
    </div>
  </div>
  <div class="filter-row" style="margin-bottom:12px;flex-wrap:wrap;">
    <button class="chip${filter==='pending'?' on':''}" onclick="S.reminderFilter='pending';render()">\uD83D\uDCCB Pending (${counts.pending})</button>
    <button class="chip${filter==='overdue'?' on':''}" style="${filter==='overdue'?'background:#ef444418;color:#ef4444;border-color:#ef444444':''}" onclick="S.reminderFilter='overdue';render()">\u26A0 Overdue (${counts.overdue})</button>
    <button class="chip${filter==='due_soon'?' on':''}" style="${filter==='due_soon'?'background:#FB923C18;color:#FB923C;border-color:#FB923C44':''}" onclick="S.reminderFilter='due_soon';render()">\u23F1 Due in 30 days (${counts.due_soon})</button>
    <button class="chip${filter==='done'?' on':''}" style="${filter==='done'?'background:#34D39918;color:#34D399;border-color:#34D39944':''}" onclick="S.reminderFilter='done';render()">\u2713 Done (${counts.done})</button>
  </div>
  <div class="card" style="overflow:hidden;">
    ${reminders.length?reminders.map(t=>{
      const c=S.cases.find(x=>x.id===t.caseId);
      const due=t.dueDate?new Date(t.dueDate):null;
      const dueValid=due&&!isNaN(due);
      const overdue=dueValid&&!isTrue(t.done)&&due.getTime()<now;
      const dueSoon=dueValid&&!isTrue(t.done)&&!overdue&&(due.getTime()-now)<30*86400000;
      const dueLabel=dueValid?due.toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}):'No due date';
      const dayDiff=dueValid?Math.round((due.getTime()-now)/86400000):null;
      const dayLabel=dayDiff===null?'':dayDiff>0?`in ${dayDiff} day${dayDiff!==1?'s':''}`:dayDiff<0?`${Math.abs(dayDiff)} day${Math.abs(dayDiff)!==1?'s':''} overdue`:'today';
      const done=isTrue(t.done);
      return`<div style="display:flex;align-items:flex-start;gap:11px;padding:13px 17px;border-bottom:1px solid #1e2430;${done?'opacity:.55;':''}${overdue?'background:rgba(239,68,68,.05);':''}">
        <input type="checkbox" ${done?'checked':''} onchange="toggleReminder_('${esc(t.id)}',this.checked)" style="margin-top:3px;cursor:pointer;width:18px;height:18px;accent-color:#D4A843;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:#c9d1d9;${done?'text-decoration:line-through;':''}">${esc(t.title||t.text||'(no title)')}</div>
          ${t.description?`<div style="font-size:11px;color:#8b949e;margin-top:3px;line-height:1.6;">${esc(t.description)}</div>`:''}
          <div style="display:flex;gap:9px;align-items:center;margin-top:7px;flex-wrap:wrap;font-size:11px;">
            ${c?`<button class="btn-ghost" style="padding:2px 7px;font-size:11px;color:#D4A843;background:#D4A84318;border-radius:6px;" onclick="openCase('${esc(c.id)}')">\uD83D\uDCC1 ${esc(c.id)} \u00B7 ${esc(c.clientName)}</button>`:''}
            ${dueValid?`<span style="color:${overdue?'#ef4444':dueSoon?'#FB923C':'#6b7280'};font-weight:${overdue||dueSoon?'600':'400'};">\uD83D\uDCC5 ${esc(dueLabel)} <span style="opacity:.7;">(${esc(dayLabel)})</span></span>`:''}
            ${t.assignedToName?`<span style="display:flex;align-items:center;gap:4px;color:#8b949e;">${av(t.assignedToName,15,ucolor(t.assignedTo))}<span>${esc(t.assignedToName)}</span></span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;">
          ${!done&&c?.email?`<button class="btn-sec" style="font-size:10px;padding:4px 8px;" onclick="openCase('${esc(c.id)}','emails')" title="Send a follow-up email">\u2709</button>`:''}
          ${!done&&c?.phone?`<a href="tel:${esc(fmtPhone(c.phone))}" class="btn-sec" style="font-size:10px;padding:4px 8px;text-decoration:none;display:inline-flex;align-items:center;" title="Call ${esc(fmtPhone(c.phone))}" onclick="event.stopPropagation()">\uD83D\uDCDE</a>`:''}
          ${role!=='support'?`<button class="btn-sec" style="font-size:10px;padding:4px 8px;" onclick="reassignReminder_('${esc(t.id)}')" title="Reassign">\u21BB</button>`:''}
        </div>
      </div>`;
    }).join(''):`<div style="text-align:center;padding:50px 20px;color:#4a5568;font-size:13px;">
      ${filter==='done'?'No completed follow-ups yet.':filter==='overdue'?'\uD83C\uDF89 No overdue follow-ups \u2014 well done!':filter==='due_soon'?'No follow-ups due in the next 30 days.':'No reminders. They are auto-created when a case is marked Settled.'}
    </div>`}
  </div>`;
}
async function toggleReminder_(tid, done){
  showLoad();
  const r=await gs_('updateTask',S.tok,tid,{done:done});
  hideLoad();
  if(r&&r.ok){
    const t=S.tasks.find(x=>x.id===tid);
    if(t){t.done=done; if(done){t.doneAt=new Date().toISOString();t.doneBy=S.user.id;t.doneByName=S.user.name;}}
    toast(done?'\u2713 Marked as done':'Re-opened');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}
async function reassignReminder_(tid){
  const t=S.tasks.find(x=>x.id===tid);if(!t)return;
  const opts=S.users.map((m,i)=>`${i+1}. ${m.name}`).join('\n');
  const choice=prompt('Reassign to:\n\n'+opts+'\n\nEnter number:');
  if(!choice)return;
  const idx=parseInt(choice,10)-1;
  if(isNaN(idx)||!S.users[idx]){toast('Invalid choice',1);return;}
  const m=S.users[idx];
  showLoad();
  const r=await gs_('updateTask',S.tok,tid,{assignedTo:m.id,assignedToName:m.name});
  hideLoad();
  if(r&&r.ok){t.assignedTo=m.id;t.assignedToName=m.name;toast('\u2713 Reassigned to '+m.name);render();}
  else toast((r&&r.msg)||'Failed',1);
}
function rTasks(){
  const role=S.user.role;
  let tasks=S.tasks.slice();
  if(role==='support') tasks=tasks.filter(t=>t.assignedTo===S.user.id);
  if(S.taskFilter==='mine') tasks=tasks.filter(t=>t.assignedTo===S.user.id);
  else if(S.taskFilter==='response_24h') tasks=tasks.filter(t=>t.kind==='response_24h');
  else if(S.taskFilter==='email') tasks=tasks.filter(t=>isTrue(t.isEmailTask));
  else if(S.taskFilter!=='all') tasks=tasks.filter(t=>t.assignedTo===S.taskFilter);
  const open=tasks.filter(t=>!isTrue(t.done));
  const done=tasks.filter(t=>isTrue(t.done));
  const showMembers=role!=='support';
  const myOpen=S.tasks.filter(t=>t.assignedTo===S.user.id&&!isTrue(t.done)).length;

  return`<div class="filter-row" style="margin-bottom:12px;flex-wrap:wrap;">
    <button class="chip${S.taskFilter==='all'?' on':''}" onclick="S.taskFilter='all';render()">All (${S.tasks.filter(t=>!isTrue(t.done)).length})</button>
    <button class="chip${S.taskFilter==='mine'?' on':''}" style="${S.taskFilter==='mine'?`background:${ucolor(S.user.id)}18;color:${ucolor(S.user.id)};border-color:${ucolor(S.user.id)}40`:''}" onclick="S.taskFilter='mine';render()">\u2605 My Tasks (${myOpen})</button>

// Dedicated 24h Response \u2014 single click, fixed semantics, no priority/preset bullshit.
// kind='response_24h' lets the dashboard surface these in their own panel.
async function addQuick24h_(){
  const cid = document.getElementById('r24-case')?.value || '';
  const note = (document.getElementById('r24-note')?.value || '').trim();
  const assignVal = document.getElementById('r24-assign')?.value || `${S.user.id}|${S.user.name}`;

  // Validation: case is REQUIRED so the assignee has context
  if(!cid){
    toast('Please select a case for the 24h Response',1);
    document.getElementById('r24-case')?.focus();
    return;
  }
  if(!note){
    toast('Please add a note so the assignee knows what to do',1);
    document.getElementById('r24-note')?.focus();
    return;
  }

  const c = S.cases.find(x=>x.id===cid);
  // Auto due 24h from now (date only)
  const d = new Date(); d.setHours(d.getHours()+24);
  const dueDate = d.toISOString().slice(0,10);
  // Title is fixed for the kind; the note becomes the task body
  const title = c ? `24h Response \u2014 ${c.clientName}` : '24h Response';
  const text = note;

  showLoad();
  const r = await gs_('addTask', S.tok, {
    caseId: cid,
    text: text,           // the human-actionable note
    title: title,         // short header used in dashboard panel
    description: note,    // duplicate stored in description for completeness
    assignedTo: assignVal,
    dueDate: dueDate,
    priority: 'Urgent',
    kind: 'response_24h',
  });
  hideLoad();
  if(r&&r.ok){
    S.tasks.unshift(r.data);
    // Clear form
    const noteEl = document.getElementById('r24-note'); if(noteEl) noteEl.value='';
    const caseEl = document.getElementById('r24-case'); if(caseEl) caseEl.value='';
    toast('\u26A1 24h Response task added');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}

async function quickAddTask_(){
  const draft = S.qaTaskDraft || {};
  const text = (draft.text || document.getElementById('qa-text')?.value || '').trim();
  const cid = draft.caseId !== undefined ? draft.caseId : (document.getElementById('qa-case')?.value || '');
  const assignVal = draft.assignedTo || document.getElementById('qa-assign')?.value || `${S.user.id}|${S.user.name}`;
  const dueDate = draft.dueDate || document.getElementById('qa-due')?.value || '';
  const priority = draft.priority || 'Medium';
  if(!text){toast('Task text required',1);return;}
  showLoad();
  const r=await gs_('addTask',S.tok,{
    caseId:cid,
    text:text,
    assignedTo:assignVal,
    dueDate:dueDate,
    priority:priority,
  });
  hideLoad();
  if(r&&r.ok){
    S.tasks.unshift(r.data);
    S.qaTaskDraft = null;  // reset draft
    toast(`\u2713 Task added${priority==='Urgent'?' (URGENT \u00B7 24h)':''}`);
    render();
  } else toast((r&&r.msg)||'Failed',1);
}

// Quick-add helpers for the standalone Tasks view
function setQaPriority(p){
  S.qaTaskDraft = {...(S.qaTaskDraft||{}), priority: p};
  // Auto-set 24h due if Urgent and no due chosen
  if(p==='Urgent' && !(S.qaTaskDraft.dueDate)){
    const d = new Date(); d.setHours(d.getHours()+24);
    S.qaTaskDraft.dueDate = d.toISOString().slice(0,10);
  }
  render();
}
function setQaDue(hoursFromNow){
  const d = new Date(); d.setHours(d.getHours()+hoursFromNow);
  S.qaTaskDraft = {...(S.qaTaskDraft||{}), dueDate: d.toISOString().slice(0,10)};
  render();
}
function applyQaPreset(id, text, priority, hoursFromNow){
  const d = new Date(); d.setHours(d.getHours()+hoursFromNow);
  S.qaTaskDraft = {
    text: text,
    priority: priority,
    dueDate: d.toISOString().slice(0,10),
    caseId: (S.qaTaskDraft||{}).caseId || '',
    assignedTo: (S.qaTaskDraft||{}).assignedTo || (S.user.id+'|'+S.user.name)
  };
  render();
  // Focus input so user can edit text
  setTimeout(()=>{ const el=document.getElementById('qa-text'); if(el){el.focus();el.select();} },50);
}
async function saveTaskEdit_(tid){
  const text=document.getElementById('te-text')?.value?.trim();
  const assignVal=document.getElementById('te-assign')?.value||'';
  if(!text){toast('Task text required',1);return;}
  const parts=assignVal.split('|');
  const ch={text:text,assignedTo:parts[0]||S.user.id,assignedToName:parts[1]||S.user.name};
  showLoad();
  const r=await gs_('updateTask',S.tok,tid,ch);
  hideLoad();
  if(r&&r.ok){
    S.tasks=S.tasks.map(t=>t.id===tid?{...t,...ch}:t);
    S.editingTaskId='';
    toast('\u2713 Saved');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}
async function delTask_(tid){
  if(!confirm('Delete this task? Cannot undo.'))return;
  showLoad();
  const r=await gs_('deleteTask',S.tok,tid);
  hideLoad();
  if(r&&r.ok){
    S.tasks=S.tasks.filter(t=>t.id!==tid);
    S.editingTaskId='';
    toast('Deleted');
    render();
  } else toast((r&&r.msg)||'Failed',1);
}

// \u2500\u2500 Email Matrix \u2500\u2500
// Loads ALL email logs (across all cases) and renders a case \u00D7 stage matrix.
async function loadMatrixData_(){
  if(!S.matrixLoaded){
    showLoad();
    const r=await gs_('getEmailLog',S.tok);  // no cid = all
    hideLoad();
    if(r&&r.ok){
      // Group emails by caseId then stage
      S.matrixData={};
      (r.data||[]).forEach(e=>{
        if(!S.matrixData[e.caseId])S.matrixData[e.caseId]={};
        if(!S.matrixData[e.caseId][e.stage])S.matrixData[e.caseId][e.stage]=[];
        S.matrixData[e.caseId][e.stage].push(e);
      });
      S.matrixLoaded=true;
    }
  }
  render();
}
function rEmailMatrix(){
  if(!S.matrixLoaded){return'<div style="text-align:center;padding:40px;color:#6b7280;">Loading email history\u2026</div>';}

  const filterStage=S.matrixFilter||'';
  const showCompleted=S.matrixShowCompleted!==false;
  const search=(S.matrixSearch||'').toLowerCase();

  // Filter cases
  let cases=S.cases.filter(c=>!c.archived);
  if(!showCompleted)cases=cases.filter(c=>c.stage!=='settled' && c.stage!=='not_proceeding');
  if(filterStage)cases=cases.filter(c=>c.stage===filterStage);
  if(search)cases=cases.filter(c=>
    String(c.clientName||'').toLowerCase().includes(search) ||
    String(c.id||'').toLowerCase().includes(search) ||
    String(c.email||'').toLowerCase().includes(search));

  // Sort by stage order (active stages first), then by createdAt desc
  const stageOrder={};STAGES.forEach((s,i)=>stageOrder[s.id]=i);
  cases.sort((a,b)=>{
    const sa=stageOrder[a.stage]??99, sb=stageOrder[b.stage]??99;
    if(sa!==sb)return sa-sb;
    return String(b.createdAt||'').localeCompare(String(a.createdAt||''));
  });

  // Compute summary stats
  const totalCases=cases.length;
  const totalSends=cases.reduce((sum,c)=>{
    const sent=S.matrixData[c.id]||{};
    return sum+Object.keys(sent).reduce((s,st)=>s+(sent[st]?.length||0),0);
  },0);
  // How many cases are "behind" \u2014 current stage past due but no email sent for it
  const behindCount=cases.filter(c=>{
    const stageIdx=stageOrder[c.stage];
    const sent=S.matrixData[c.id]||{};
    // Check if any required prior stage email is missing
    for(let i=0;i<=stageIdx;i++){
      const stg=STAGES[i];
      if(stg.optional)continue;
      if(!sent[stg.id]||!sent[stg.id].length)return true;
    }
    return false;
  }).length;

  return`
    <!-- Filter bar -->
    <div class="card" style="padding:14px 16px;margin-bottom:11px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.8px;">Filter:</div>
        <input class="fi" placeholder="Search client, case ID, or email\u2026" value="${esc(search)}" oninput="debouncedSet('matrixSearch',this.value)" style="flex:1;min-width:240px;font-size:12px;">
        <select class="fi" onchange="S.matrixFilter=this.value;render()" style="max-width:200px;font-size:12px;">
          <option value="">All stages</option>
          ${STAGES.map(s=>`<option value="${s.id}"${filterStage===s.id?' selected':''}>${esc(s.label)}</option>`).join('')}
        </select>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e;cursor:pointer;white-space:nowrap;">
          <input type="checkbox" ${showCompleted?'checked':''} onchange="S.matrixShowCompleted=this.checked;render()">
          Show settled/not proceeding
        </label>
        <button class="btn-sec" style="font-size:11px;" onclick="S.matrixLoaded=false;loadMatrixData_()">\u21BB Refresh</button>
      </div>
      <div style="display:flex;gap:18px;margin-top:9px;font-size:11px;color:#6b7280;flex-wrap:wrap;">
        <span><strong style="color:#c9d1d9;">${totalCases}</strong> cases</span>
        <span><strong style="color:#34D399;">${totalSends}</strong> emails sent</span>
        <span><strong style="color:${behindCount?'#FB923C':'#34D399'};">${behindCount}</strong> case${behindCount!==1?'s':''} behind</span>
      </div>
    </div>

    <!-- Legend -->
    <div class="card" style="padding:9px 14px;margin-bottom:11px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:10px;color:#6b7280;">
      <span style="font-weight:600;text-transform:uppercase;letter-spacing:.7px;">Legend:</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:rgba(52,211,153,.2);border:1px solid #34D399;border-radius:3px;display:inline-block;"></span>Sent \u2713</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:rgba(251,191,36,.2);border:1px solid #FBBF24;border-radius:3px;display:inline-block;"></span>Current \u2014 needs send</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:rgba(220,38,38,.15);border:1px solid #DC2626;border-radius:3px;display:inline-block;"></span>Past stage \u2014 missed</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#0A0D14;border:1px dashed #2d3748;border-radius:3px;display:inline-block;"></span>Future / not yet</span>
      <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;background:#161b26;border:1px solid #1e2430;border-radius:3px;display:inline-block;"></span>Optional</span>
    </div>

    <!-- Matrix table -->
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;max-height:calc(100vh - 290px);">
        <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:11px;">
          <thead style="position:sticky;top:0;background:#0F141C;z-index:2;">
            <tr>
              <th style="position:sticky;left:0;background:#0F141C;padding:10px 12px;text-align:left;border-bottom:1px solid #1e2430;font-size:10px;color:#D4A843;font-weight:700;text-transform:uppercase;letter-spacing:.7px;min-width:200px;z-index:3;">Client / Case</th>
              ${STAGES.map(s=>`<th style="padding:8px 6px;text-align:center;border-bottom:1px solid #1e2430;border-left:1px solid #1e2430;color:${s.color};font-weight:700;min-width:80px;writing-mode:horizontal-tb;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;line-height:1.2;">
                ${esc(s.label.replace(' Approval','').replace(' to Settle',''))}
                ${s.optional?'<div style="font-size:8px;color:#6b7280;font-weight:400;margin-top:2px;">optional</div>':''}
              </th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${cases.map(c=>rMatrixRow(c,stageOrder)).join('')}
            ${!cases.length?`<tr><td colspan="${STAGES.length+1}" style="text-align:center;padding:36px;color:#4a5568;font-size:12px;">No cases match the current filter.</td></tr>`:''}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
function rMatrixRow(c, stageOrder){
  const currentIdx=stageOrder[c.stage]??-1;
  const sent=S.matrixData[c.id]||{};
  const stageObj=gs(c.stage);
  return`<tr style="border-bottom:1px solid #1e2430;">
    <td style="position:sticky;left:0;background:#0F141C;padding:8px 12px;border-bottom:1px solid #1e2430;border-right:2px solid #1e2430;cursor:pointer;z-index:1;" onclick="openCase('${esc(c.id)}')">
      <div style="font-weight:600;color:#c9d1d9;font-size:12px;">${esc(c.clientName)}</div>
      <div style="font-size:10px;color:#6b7280;margin-top:1px;display:flex;gap:7px;align-items:center;">
        <span style="color:#D4A843;">${esc(c.id)}</span>
        <span style="background:${stageObj.bg};color:${stageObj.color};padding:1px 6px;border-radius:8px;font-weight:700;font-size:9px;">${esc(stageObj.label)}</span>
      </div>
      ${c.email?'':'<div style="font-size:9px;color:#FB923C;margin-top:2px;">\u26A0 No email on file</div>'}
    </td>
    ${STAGES.map((s,i)=>{
      const sentList=sent[s.id]||[];
      const count=sentList.length;
      const isCurrent=s.id===c.stage;
      const isPast=i<currentIdx;
      const isFuture=i>currentIdx;
      const isOptional=!!s.optional;

      let bg='#0A0D14', border='1px dashed #2d3748', content='', color='#4a5568', title='Future stage';
      let cursor='default', click='';

      if(count>0){
        // Sent \u2713
        bg='rgba(52,211,153,.15)';
        border='1px solid #34D39966';
        color='#34D399';
        const lastEmail=sentList[sentList.length-1];
        const date=lastEmail.sentAt?new Date(lastEmail.sentAt):null;
        const dateStr=date&&!isNaN(date)?date.toLocaleDateString('en-AU',{day:'2-digit',month:'short'}):'';
        const opens=sentList.reduce((sum,e)=>sum+Number(e.openCount||0),0);
        content=`<div style="font-weight:700;font-size:13px;">\u2713</div><div style="font-size:9px;margin-top:1px;">${esc(dateStr)}</div>${opens>0?`<div style="font-size:9px;color:#10B981;margin-top:1px;" title="Opened ${opens}\u00D7">\uD83D\uDC41 ${opens}</div>`:''}`;
        title=`Sent ${count} time${count>1?'s':''}\nLast: ${dateStr}\nBy: ${lastEmail.sentByName||'?'}\nClick to view in Sent Log`;
        cursor='pointer';
        click=`onclick="S.emailTab='sent';S.sentFilter='${esc(c.id)}';S.sentFilterStage='${s.id}';loadSentEmails_()"`;
      } else if(isCurrent && !isOptional){
        // Current stage with no email yet \u2192 action item
        bg='rgba(251,191,36,.18)';
        border='1px solid #FBBF24';
        color='#FBBF24';
        content=`<div style="font-size:14px;font-weight:700;">!</div><div style="font-size:9px;margin-top:1px;">SEND</div>`;
        title=`Current stage \u2014 email not sent yet.\nClick to send now.`;
        cursor=c.email?'pointer':'not-allowed';
        if(c.email)click=`onclick="S.emailTab='send';S.emailSel='${s.id}';selectPreviewCase('${esc(c.id)}')"`;
      } else if(isPast && !isOptional){
        // Past stage with no email \u2192 missed
        bg='rgba(220,38,38,.12)';
        border='1px solid #DC262666';
        color='#FCA5A5';
        content=`<div style="font-size:13px;font-weight:700;">\u26A0</div><div style="font-size:9px;margin-top:1px;">MISSED</div>`;
        title='Stage already passed but email never sent.\nClick to send now (better late than never).';
        cursor=c.email?'pointer':'not-allowed';
        if(c.email)click=`onclick="S.emailTab='send';S.emailSel='${s.id}';selectPreviewCase('${esc(c.id)}')"`;
      } else if(isOptional && !count){
        // Optional & not sent \u2014 show subtle dash, not red
        bg='#161b26';
        border='1px solid #1e2430';
        color='#4a5568';
        content='<div style="font-size:11px;">\u2014</div>';
        title='Optional stage \u2014 skip if not relevant';
      } else {
        // Future
        content='<div style="font-size:11px;color:#4a5568;">\u00B7</div>';
        title='Not yet at this stage';
      }

      return`<td ${click} style="padding:0;border-left:1px solid #1e2430;border-bottom:1px solid #1e2430;text-align:center;cursor:${cursor};">
        <div style="background:${bg};border:${border};color:${color};margin:3px;padding:6px 4px;border-radius:5px;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;" title="${esc(title)}">
          ${content}
        </div>
      </td>`;
    }).join('')}
  </tr>`;
}

// "Send Email" tab \u2014 pick a case, pick a template, preview, hit Send
function rEmailSend(){
  const sel=S.emailSel;
  // Lookup template by stage + variant
  const variant=S.emailVariant||'';
  const tplKey=variant?`${sel}:${variant}`:sel;
  const tpl=S.emailTpls[tplKey]||S.emailTpls[sel]||{subject:'',body:''};
