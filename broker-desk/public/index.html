<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Broker Desk — Easy Loan Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// Global error catcher \u2014 installed BEFORE the main app script so it captures
// EVERYTHING, including a parse/syntax error in the main script (which would
// otherwise silently leave functions undefined). Shows a visible red banner.
(function(){
  function showFatal(title, detail){
    try {
      var bar = document.getElementById('fatal-err-bar');
      if(!bar){
        bar = document.createElement('div');
        bar.id = 'fatal-err-bar';
        bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;background:#7f1d1d;color:#fff;padding:12px 16px;font-family:monospace;font-size:12px;line-height:1.5;box-shadow:0 2px 14px rgba(0,0,0,.5);max-height:45vh;overflow:auto;';
        (document.body||document.documentElement).appendChild(bar);
      }
      bar.innerHTML = '<div style="font-weight:bold;font-size:13px;margin-bottom:5px;">\u26A0 '+title+'</div>'
        + '<div style="white-space:pre-wrap;word-break:break-word;">'+detail+'</div>'
        + '<button onclick="this.parentNode.style.display=\'none\'" style="margin-top:8px;background:#fff;color:#7f1d1d;border:none;border-radius:5px;padding:3px 12px;font-weight:bold;cursor:pointer;font-family:inherit;">Dismiss</button>';
      bar.style.display='block';
    } catch(e){}
  }
  window.__showFatal = showFatal;
  window.addEventListener('error', function(ev){
    var msg = ev.message || (ev.error && ev.error.message) || 'Unknown error';
    var loc = '';
    if(ev.filename) loc = '\nFile: '+ev.filename;
    if(ev.lineno) loc += '\nLine '+ev.lineno+(ev.colno?', col '+ev.colno:'');
    // Most useful for us: a SyntaxError in the app script means the whole app failed to load
    var hint = '';
    if(/is not defined/.test(msg)) hint = '\n\n\u2192 The app script did not load fully. This is almost always an incomplete paste of index.html into the Apps Script editor. Re-paste the whole file (check it ends with </html>) and Deploy a New version.';
    else if(/Syntax|Unexpected/.test(msg)) hint = '\n\n\u2192 Syntax error in the app script (likely a corrupted character or truncated paste). Re-paste index.html completely.';
    showFatal('Error: '+msg, msg+loc+hint);
  });
  window.addEventListener('unhandledrejection', function(ev){
    var msg = (ev.reason && ev.reason.message) || String(ev.reason) || 'Promise rejected';
    showFatal('Unhandled error', msg);
  });
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',-apple-system,sans-serif;background:#0D1117;color:#C9D1D9;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0A0D14;}
::-webkit-scrollbar-thumb{background:#21262D;border-radius:3px;}

#login-wrap{display:flex;height:100vh;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 20%,#1c2433 0%,#0c1018 72%);}
#app-wrap{display:none;height:100vh;flex-direction:row;}
#sb{width:220px;background:#0A0D14;border-right:1px solid #1e2430;display:flex;flex-direction:column;flex-shrink:0;}
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#hdr{height:56px;background:#0A0D14;border-bottom:1px solid #1e2430;display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:20px 22px;background:#0D1117;}

.logo-area{padding:20px 18px 14px;border-bottom:1px solid #1e2430;}
.logo-tag{font-size:9px;color:#4a5568;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px;}
.logo-name{font-size:16px;font-weight:800;color:#D4A843;letter-spacing:-.5px;}
#nav-items{flex:1;padding:6px 0;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;width:100%;padding:9px 18px;border:none;background:transparent;color:#6b7280;border-left:3px solid transparent;cursor:pointer;font-size:13px;font-family:inherit;text-align:left;transition:all .12s;}
.ni:hover{color:#c9d1d9;background:#111827;}
.ni.on{background:rgba(212,168,67,.08);color:#D4A843;border-left-color:#D4A843;font-weight:600;}
.ni .nbadge{margin-left:auto;background:#ef4444;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;}
.ni-section{padding:14px 21px 5px;font-size:9px;color:#3a4252;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;}
.sb-foot{padding:12px 18px;border-top:1px solid #1e2430;display:flex;align-items:center;gap:9px;cursor:pointer;}
.sb-foot:hover{background:#111827;}

.btn-gold{display:inline-flex;align-items:center;gap:6px;background:#D4A843;color:#0A0D14;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap;transition:opacity .13s;}
.btn-gold:hover{opacity:.85;}
.btn-gold:disabled{opacity:.5;cursor:default;}
.btn-sec{display:inline-flex;align-items:center;gap:6px;background:#161b26;color:#c9d1d9;border:1px solid #2d3748;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:background .12s;}
.btn-sec:hover{background:#1e2430;}
.btn-ghost{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:#4a5568;cursor:pointer;padding:4px;font-family:inherit;font-size:12px;}
.btn-ghost:hover{color:#c9d1d9;}
.btn-danger{display:inline-flex;align-items:center;gap:5px;background:#450a0a;color:#fca5a5;border:1px solid #ef4444aa;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;white-space:nowrap;}
.btn-danger:hover{background:#7f1d1d;}
.btn-sm{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;white-space:nowrap;}

.card{background:#111827;border:1px solid #1e2430;border-radius:12px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:#111827;border:1px solid #1e2430;border-radius:12px;padding:16px 18px;}
.kpi-lbl{font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.kpi-val{font-size:24px;font-weight:800;line-height:1.1;}
.kpi-sub{font-size:11px;color:#4a5568;margin-top:3px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

#pb{display:flex;gap:8px;height:calc(100vh - 158px);min-height:420px;padding-bottom:14px;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;}
#pb::-webkit-scrollbar{height:10px;}
#pb::-webkit-scrollbar-thumb{background:#2d3748;border-radius:5px;}
#pb::-webkit-scrollbar-thumb:hover{background:#4a5568;}
.pc{min-width:220px;max-width:220px;background:#111827;border-radius:12px;border:1px solid #1e2430;flex-shrink:0;display:flex;flex-direction:column;}
.pc-hd{padding:11px 12px 9px;border-bottom:1px solid #1e2430;border-radius:12px 12px 0 0;}
.pc-body{flex:1;padding:7px;overflow-y:auto;}
.pk{background:#0A0D14;border:1px solid #1e2430;border-radius:10px;padding:11px 12px;cursor:pointer;margin-bottom:6px;position:relative;transition:border-color .13s;}
.pk:hover{border-color:var(--sc);}
/* Risk indicators on pipeline cards — left border bar */
.pk-stuck{border-left:3px solid #DC2626 !important;}
.pk-deadline{border-left:3px solid #FBBF24 !important;}
/* Compact pipeline view — single vertical column with collapsible stage groups */
.pc-grp{margin-bottom:12px;border:1px solid #1e2430;border-radius:10px;background:#111827;overflow:hidden;}
.pc-grp-hd{padding:11px 14px;background:#0f1420;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid transparent;transition:background .12s;}
.pc-grp-hd:hover{background:#161b26;}
.pc-grp.open .pc-grp-hd{border-bottom-color:#1e2430;}
.pc-grp-body{display:none;padding:6px 8px 8px;}
.pc-grp.open .pc-grp-body{display:block;}
.pc-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:#0A0D14;border:1px solid #1e2430;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color .12s;}
.pc-row:hover{border-color:var(--sc,#D4A843);}
.pc-row-stuck{border-left:3px solid #DC2626 !important;}
.pc-row-deadline{border-left:3px solid #FBBF24 !important;}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;color:#4a5568;font-weight:600;text-transform:uppercase;letter-spacing:.7px;background:#0A0D14;border-bottom:1px solid #1e2430;white-space:nowrap;}
.tbl td{padding:9px 12px;border-bottom:1px solid #1e2430;font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:#111827;cursor:pointer;}

.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:flex-start;justify-content:flex-end;}
.m-panel{width:760px;max-width:94vw;height:100vh;background:#111827;border-left:1px solid #1e2430;display:flex;flex-direction:column;overflow:hidden;animation:sli .18s ease;}
.m-ct{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:2000;display:flex;align-items:center;justify-content:center;}
.m-box{width:660px;max-width:96vw;max-height:92vh;background:#111827;border-radius:14px;border:1px solid #1e2430;display:flex;flex-direction:column;overflow:hidden;animation:fup .18s ease;}
@keyframes sli{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
@keyframes fup{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}

.tab-bar{display:flex;border-bottom:1px solid #1e2430;padding-left:20px;flex-shrink:0;overflow-x:auto;}
.tab{padding:10px 13px;border:none;background:none;color:#4a5568;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap;transition:all .12s;}
.tab:hover{color:#8b949e;}
.tab.on{color:#D4A843;border-bottom-color:#D4A843;font-weight:600;}

.fi{background:#0A0D14;border:1px solid #21262D;border-radius:7px;padding:8px 11px;color:#c9d1d9;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .12s;}
.fi:focus{border-color:#D4A843;}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;line-height:1.7;}
.fl{font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:block;}
.db{background:#0A0D14;border:1px solid #1e2430;border-radius:8px;padding:10px 13px;}

.prog-bar{background:#1e2430;border-radius:4px;height:6px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:4px;transition:width .3s;}
.note-c{background:#0A0D14;border:1px solid #1e2430;border-radius:9px;padding:12px 14px;margin-bottom:9px;}
.task-r{display:flex;align-items:flex-start;gap:9px;background:#0A0D14;border:1px solid #1e2430;border-radius:8px;padding:9px 12px;margin-bottom:7px;}
.doc-r{display:flex;align-items:center;gap:11px;background:#0A0D14;border-radius:8px;padding:11px 13px;margin-bottom:6px;cursor:pointer;border:1px solid #1e2430;transition:border-color .13s;}
.doc-r.rx{border-color:rgba(52,211,153,.35);}
.chk{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #2d3748;background:#161b26;font-size:10px;font-weight:700;color:#0A0D14;}
.chk.done{background:#34D399;border-color:#34D399;}
.stage-strip{display:flex;align-items:center;gap:3px;overflow-x:auto;padding:10px 18px;border-bottom:1px solid #1e2430;flex-shrink:0;}
.stage-pill{padding:4px 9px;border-radius:20px;border:none;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0;transition:all .13s;}

.dd-w{position:relative;}
.dd-m{display:none;position:absolute;right:0;top:26px;z-index:300;background:#0A0D14;border:1px solid #1e2430;border-radius:9px;min-width:200px;box-shadow:0 10px 30px rgba(0,0,0,.8);max-height:300px;overflow-y:auto;}
.dd-m.open{display:block;}
.dd-i{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px 12px;background:none;border:none;color:#c9d1d9;font-size:12px;cursor:pointer;font-family:inherit;}
.dd-i:hover{background:#161b26;}

.toast-c{position:fixed;top:16px;right:16px;z-index:9999;pointer-events:none;}
.toast{background:#052e16;border:1px solid #34D399;color:#6ee7b7;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:7px;animation:fup .2s ease;max-width:420px;pointer-events:auto;}
.toast.err{background:#450a0a;border-color:#ef4444;color:#fca5a5;}
.sbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.pbadge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.rbadge{display:inline-flex;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;flex-shrink:0;}
input[type=checkbox]{cursor:pointer;accent-color:#D4A843;width:14px;height:14px;flex-shrink:0;margin-top:2px;}
.filter-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.sw-wrap{position:relative;flex:1 1 200px;}
.sw-wrap input{padding-left:30px;}
.sw-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#4a5568;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;border:1px solid #1e2430;background:#111827;color:#6b7280;cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s;}
.chip.on{font-weight:700;}
.tag-q{background:#161b26;border:1px dashed #2d3748;color:#6b7280;border-radius:20px;padding:4px 11px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .12s;}
.tag-q:hover{background:#2d3748;color:#c9d1d9;}
pre.em-body{font-family:inherit;font-size:13px;color:#c9d1d9;line-height:1.85;white-space:pre-wrap;margin:0;}
.sent-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(52,211,153,.13);color:#34D399;border:1px solid rgba(52,211,153,.3);}
.pending-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(251,146,60,.13);color:#FB923C;border:1px solid rgba(251,146,60,.3);}

#lov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;align-items:center;justify-content:center;gap:12px;flex-direction:column;}
.spin{width:34px;height:34px;border:3px solid #1e2430;border-top-color:#D4A843;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

.wf-stage{border-radius:12px;border:1px solid #1e2430;overflow:hidden;margin-bottom:10px;background:#111827;}
.wf-hd{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.wf-hd:hover{background:#161b26;}
.wf-body{padding:14px 18px 18px;border-top:1px solid #1e2430;}
.progress-track{display:flex;align-items:center;overflow-x:auto;padding:16px 0;margin-bottom:20px;}
.pt-dot{width:28px;height:28px;border-radius:50%;border:2px solid #1e2430;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#0A0D14;}
.pt-label{font-size:9px;color:#4a5568;margin-top:5px;text-align:center;max-width:70px;line-height:1.3;}
.pt-line{flex:1;height:2px;background:#1e2430;min-width:14px;}
.team-card{background:#111827;border:1px solid #1e2430;border-radius:12px;padding:18px 20px;}
.var-chip{background:#0A0D14;border:1px solid #1e2430;border-radius:6px;padding:5px 10px;font-size:11px;color:#6b7280;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;margin:3px;}
.var-chip code{color:#D4A843;font-family:inherit;font-weight:600;}
.var-chip .val{color:#c9d1d9;font-weight:500;}
.lender-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;background:#0A0D14;border:1px solid #1e2430;border-radius:20px;margin:3px;font-size:12px;color:#c9d1d9;}
.lender-chip button{background:none;border:none;color:#4a5568;cursor:pointer;padding:0;display:flex;align-items:center;}
.lender-chip button:hover{color:#ef4444;}

/* ── Mobile responsive ───────────────────────────── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .65; }
}
@keyframes drag-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,67,.4); }
  50% { box-shadow: 0 0 0 6px rgba(212,168,67,0); }
}
.case-card-dragging { opacity: .4; transform: rotate(-2deg); cursor: grabbing !important; }
.stage-drop-target { background: rgba(212,168,67,.08) !important; outline: 2px dashed #D4A843; outline-offset: -3px; }
.case-card-draggable { cursor: grab; }
.case-card-draggable:active { cursor: grabbing; }
#email-dropzone.drop-active { background: rgba(212,168,67,.12) !important; border-color: #D4A843 !important; }
@media (max-width: 880px) {
  #pb { display: flex !important; flex-wrap: nowrap !important; gap: 9px !important; overflow-x: auto !important; padding-bottom: 8px; }
  #pb .pc { min-width: 240px !important; flex-shrink: 0 !important; }
  .m-box { width: 96vw !important; max-width: 96vw !important; max-height: 92vh !important; }
  .g2 { grid-template-columns: 1fr !important; }
  .tbl { font-size: 11px; }
  .tbl th, .tbl td { padding: 7px 6px !important; }
  #bell-popover { width: calc(100vw - 24px) !important; right: 12px !important; }
}
/* iPad / small laptop — tighter pipeline so more columns fit */
@media (min-width: 881px) and (max-width: 1366px) {
  #pb .pc { min-width: 190px; max-width: 190px; }
  .pk { padding: 8px 9px; }
  /* Tighten font for amount/client */
  .pk .pk-amt { font-size: 14px !important; }
}
/* Very wide screens — slightly bigger columns */
@media (min-width: 1700px) {
  #pb .pc { min-width: 240px; max-width: 240px; }
}
/* ===== Light theme =====
   The UI uses dark inline colors throughout, so the most reliable light option
   is a tuned invert + hue-rotate on the root element, with images / marked
   elements re-inverted to look normal. Pure CSS, can't break the app, instantly
   reversible. */
html.theme-light { filter: invert(0.95) hue-rotate(180deg); background: #ffffff; }
html.theme-light img,
html.theme-light video,
html.theme-light .keep-color { filter: invert(1) hue-rotate(180deg); }
html.theme-light body { background: #f4f5f7; }
</style>
</head>

<!-- ══════ LOGIN ══════ -->
<div id="login-wrap">
  <div style="position:absolute;inset:0;background:radial-gradient(1100px 600px at 50% -10%, rgba(212,168,67,.16), transparent 60%), radial-gradient(800px 500px at 100% 100%, rgba(96,165,250,.07), transparent 55%);pointer-events:none;"></div>
  <div style="width:400px;position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:26px;">
      <div id="login-logo-badge" style="width:76px;height:76px;border-radius:20px;margin:0 auto 18px;background:linear-gradient(145deg,#E9C46A,#D4A843 55%,#B5862B);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 32px rgba(212,168,67,.35), inset 0 1px 0 rgba(255,255,255,.5);overflow:hidden;">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div style="font-size:11px;color:#D4A843;letter-spacing:5px;text-transform:uppercase;font-weight:700;margin-bottom:6px;">Easy Loan Finance</div>
      <div style="font-size:30px;font-weight:800;color:#f0f3f7;letter-spacing:-.5px;line-height:1;">Broker Desk</div>
      <div style="font-size:13px;color:#7d8694;margin-top:9px;">Mortgage broking &amp; commission platform</div>
    </div>
    <div style="background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:30px 28px;box-shadow:0 24px 60px rgba(0,0,0,.45);backdrop-filter:blur(8px);">
      <div style="font-size:17px;font-weight:700;color:#e6ebf2;margin-bottom:3px;">Welcome back</div>
      <div style="font-size:12.5px;color:#7d8694;margin-bottom:20px;">Sign in to your broker dashboard</div>

// Helper: returns array of {item, done} for a case at a given stage
function getStageChecklist(c, stageId){
  const items = STAGE_CHECKLISTS[stageId] || [];
  let progress = {};
  try { progress = JSON.parse(c.checklist || '{}'); } catch(e) { progress = {}; }
  const doneIds = progress[stageId] || [];
  return items.map(it => ({...it, done: doneIds.indexOf(it.id) >= 0}));
}
function getChecklistStats(c, stageId){
  const key = c.id + '|' + stageId + '|' + (c.checklist||'');
  const cache = _renderCache && _renderCache.checklist;
  if(cache && cache.has(key)) return cache.get(key);
  const result = _computeChecklistStats(c, stageId);
  if(cache) cache.set(key, result);
  return result;
}
function _computeChecklistStats(c, stageId){
  const items = getStageChecklist(c, stageId);
  if (!items.length) return {total:0, done:0, mandatoryTotal:0, mandatoryDone:0, pct:0};
  const total = items.length;
  const done = items.filter(i => i.done).length;
  const mandatory = items.filter(i => i.mandatory);
  const mandatoryDone = mandatory.filter(i => i.done).length;
  return {
    total, done,
    mandatoryTotal: mandatory.length,
    mandatoryDone,
    pct: total ? Math.round(done / total * 100) : 0,
    mandatoryPct: mandatory.length ? Math.round(mandatoryDone / mandatory.length * 100) : 100,
    allMandatoryDone: mandatoryDone === mandatory.length
  };
}

// When this frontend is hosted OUTSIDE Apps Script (e.g. on Render/Cloudflare),
// set BACKEND_URL to your Apps Script Web App /exec URL. Calls then go over
// fetch() as a JSON-RPC POST. When left blank AND google.script.run exists
// (i.e. the page is still served by Apps Script), it uses the native bridge.
const BACKEND_URL = '/api';

function _useNativeBridge(){
  return (!BACKEND_URL || BACKEND_URL.indexOf('PASTE_') === 0)
    && typeof google !== 'undefined' && google.script && google.script.run;
}

function gs_(fn){
  const args = Array.prototype.slice.call(arguments, 1);
  // Mode 1: native Apps Script bridge (page served by Apps Script)
  if (_useNativeBridge()){
    return new Promise(function(resolve){
      try {
        google.script.run
          .withSuccessHandler(function(r){
            resolve((r === null || r === undefined) ? { ok:false, msg:'Server returned no response. Please refresh.' } : r);
          })
          .withFailureHandler(function(e){
            resolve({ ok:false, msg:(e && e.message) || String(e) || 'Request failed' });
          })[fn].apply(null, args);
      } catch(e) {
        resolve({ ok:false, msg:e.message||'Call failed' });
      }
    });
  }
  // Mode 2: external host \u2192 fetch JSON-RPC to the Apps Script Web App.
  // text/plain content-type keeps it a "simple" request (no CORS preflight).
  return fetch(BACKEND_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ fn: fn, args: args }),
    redirect: 'follow',
  })
  .then(function(res){
    return res.text().then(function(txt){
      return { status: res.status, ok: res.ok, txt: txt };
    });
  })
  .then(function(o){
    var txt = o.txt;
    try { return JSON.parse(txt); }
    catch(e){
      var low = (txt || '').slice(0, 800).toLowerCase();
      var looksAuth = low.indexOf('access denied') >= 0
        || low.indexOf('accounts.google.com') >= 0
        || low.indexOf('servicelogin') >= 0
        || low.indexOf('sign in - google') >= 0
        || low.indexOf('request access') >= 0;
      var looksHtml = low.indexOf('<!doctype') >= 0 || low.indexOf('<html') >= 0;
      if (o.status === 403 || o.status === 401 || looksAuth) {
        return {
          ok: false,
          msg: 'Apps Script backend denied access (HTTP ' + (o.status || '?') + '). In Apps Script: Deploy -> Manage deployments -> Edit -> Execute as: Me, Who has access: Anyone -> Deploy. Then update APPS_SCRIPT_URL on Render to the current /exec URL.'
        };
      }
      if (looksHtml) {
        return {
          ok: false,
          msg: 'Backend returned a web page, not data (HTTP ' + (o.status || '?') + '). APPS_SCRIPT_URL is likely wrong. It must be the public Web App URL ending in /exec, not /dev or the editor link.'
        };
      }
      return {
        ok: false,
        msg: 'Bad server response (not JSON, HTTP ' + (o.status || '?') + '). Check APPS_SCRIPT_URL and confirm the Apps Script Web App is public.'
      };
    }
  })
  .catch(function(e){ return { ok:false, msg:'Network error: ' + (e.message||e) }; });
}

// Debounce helper for input handlers \u2014 render only after user stops typing for 200ms.
// Called via debouncedSet('caseSearch', value) \u2192 S.caseSearch=value \u2192 render() (debounced).
const _debounceTimers = {};
function debouncedSet(key, value, delay){
  S[key] = value;  // Update state immediately so input value stays in sync
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(function(){
    render();
  }, delay || 200);
}

// Debounced version of renderModal \u2014 for high-frequency oninput handlers
// (broker share %, line item amounts). State updates instantly; the heavy
// re-render only fires after the user pauses typing, so input stays smooth.
let _modalDebounceTimer = null;
function debouncedModalRender(delay){
  clearTimeout(_modalDebounceTimer);
  _modalDebounceTimer = setTimeout(function(){
    renderModal();
  }, delay || 350);
}

// Recompute invoice line amounts from gross \u00D7 broker share (data only, no render)
function _recalcInvoiceAmounts(){
  const d = S.invoiceDraft;
  if(!d) return;
  const dec = (Number(d.brokerSharePct)||0) / 100;
  (d.items||[]).forEach(it => {
    if(it.grossAmount != null){
      it.amount = Math.round(Number(it.grossAmount) * dec * 100) / 100;
    }
  });
}

// \u2551  AUTH                                           \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
async function login_(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const btn=document.getElementById('lbtn');
  const err=document.getElementById('lerr');
  if(!u||!p){showErr(err,'Enter username and password');return;}
  btn.disabled=true;btn.textContent='Signing in\u2026';err.style.display='none';
  const r=await gs_('login',u,p);
  if(r&&r.requiresTfa){
    // 2FA challenge \u2014 prompt for code
    btn.disabled=false;btn.textContent='Sign In';
    const code=prompt('Enter your 6-digit authentication code:');
    if(!code){return;}
    btn.disabled=true;btn.textContent='Verifying\u2026';
    const r2=await gs_('loginTfa',r.challengeToken,code.trim());
    if(!r2||!r2.ok){showErr(err,(r2&&r2.msg)||'2FA verification failed');btn.disabled=false;btn.textContent='Sign In';return;}
    S.tok=r2.token;S.user=r2.user;
    localStorage.setItem('bd_tok',r2.token);
    _setSessionExp(r2.user && r2.user.exp);
    startApp();
    return;
  }
  if(!r||!r.ok){
    const msg=(r&&r.msg)||'Login failed';
    // Friendlier message for the common wrong-credentials case
    const friendly = /password|credential|incorrect|invalid|not found|unauthor/i.test(msg)
      ? 'Wrong username or password. Use "Forgot password?" to reset, or check your details.'
      : msg;
    showErr(err, friendly);
    btn.disabled=false;btn.textContent='Sign In';
    return;
  }
  S.tok=r.token;S.user=r.user;
  localStorage.setItem('bd_tok',r.token);
  _setSessionExp(r.user && r.user.exp);
  try {
    startApp();
  } catch(e){
    // Don't strand the user on a half-loaded state \u2014 surface the error
    showErr(err, 'Loaded but hit an error: ' + (e.message||e) + ' \u2014 try refreshing.');
    btn.disabled=false; btn.textContent='Sign In';
  }
}

// \u2500\u2500 Session expiry warning \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Warns the user ~12 min before the 6h session lapses so unsaved work isn't
// lost. They can extend in one click. exp is a ms timestamp from the backend.
const SESSION_WARN_MS = 12 * 60 * 1000; // warn 12 min before expiry
function _setSessionExp(exp){
  S.sessionExp = exp || (Date.now() + 6*60*60*1000); // fallback 6h
  S._sessionWarned = false;
  if(window._bdSessTimer) clearInterval(window._bdSessTimer);
  window._bdSessTimer = setInterval(_checkSessionExpiry, 30000); // check every 30s
}
function _checkSessionExpiry(){
  if(!S.tok || !S.sessionExp) return;
  const remaining = S.sessionExp - Date.now();
  if(remaining <= 0){
    // Expired \u2014 stop timer, prompt re-login
    clearInterval(window._bdSessTimer);
    _sessionExpiredPrompt();
    return;
  }
  if(remaining <= SESSION_WARN_MS && !S._sessionWarned){
    S._sessionWarned = true;
    _showSessionWarning(remaining);
  }
}
function _showSessionWarning(remaining){
  const mins = Math.max(1, Math.round(remaining/60000));
  // Non-blocking banner at top so it doesn't interrupt editing
  let bar = document.getElementById('sess-warn-bar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'sess-warn-bar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#7c2d12,#b45309);color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,.4);';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `<span>\u23F3 <strong>Session expiring in ~${mins} min.</strong> Save your work or extend to avoid losing data.</span>
    <button onclick="_extendSession_()" style="background:#fff;color:#7c2d12;border:none;border-radius:6px;padding:5px 14px;font-weight:700;font-size:12px;cursor:pointer;">Stay logged in</button>
    <button onclick="document.getElementById('sess-warn-bar').remove()" style="background:transparent;color:#fff;border:1px solid #ffffff66;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;">Dismiss</button>`;
  bar.style.display = 'flex';
  try { notifPush('system','Session expiring soon',`Your session will expire in about ${mins} minutes. Click "Stay logged in" to extend for another 6 hours.`); } catch(_){}
}
async function _extendSession_(){
  const r = await gs_('extendSession', S.tok);
  if(r && r.ok){
    S.sessionExp = r.exp;
    S._sessionWarned = false;
    const bar = document.getElementById('sess-warn-bar');
    if(bar) bar.remove();
    toast('\u2713 Session extended \u2014 6 more hours');
  } else {
    _sessionExpiredPrompt();
  }
}
function _sessionExpiredPrompt(){
  const bar = document.getElementById('sess-warn-bar');
  if(bar) bar.remove();
  let m = document.getElementById('sess-expired-modal');
  if(m) return; // already showing
  m = document.createElement('div');
  m.id = 'sess-expired-modal';
  m.style.cssText = 'position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;';
  m.innerHTML = `<div style="background:#11151d;border:1px solid #2a2f3a;border-radius:14px;padding:26px 30px;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);">
    <div style="font-size:30px;margin-bottom:8px;">\uD83D\uDD12</div>
    <div style="font-size:16px;font-weight:700;color:#c9d1d9;margin-bottom:6px;">Session expired</div>
    <div style="font-size:13px;color:#8b949e;line-height:1.5;margin-bottom:18px;">For security, your 6-hour session has ended. Please sign in again. Any draft you had open is still on screen \u2014 copy anything important before reloading.</div>
    <button onclick="location.reload()" style="background:#D4A843;color:#1a1f2b;border:none;border-radius:8px;padding:9px 22px;font-weight:700;font-size:13px;cursor:pointer;">Sign in again</button>
  </div>`;
  document.body.appendChild(m);
}

async function loadAll_(){
  showLoad();
  let r=await gs_('loadAll',S.tok);
  // Fallback: if loadAll fails, try individual calls (in case of stale deployment etc.)
  if(!r||!r.ok){
    if(r && r.msg && r.msg.toLowerCase().indexOf('unauth')>=0){
      hideLoad();toast('Session expired \u2014 please sign in again',1);
      await logout_(); return;
    }
    // offline fallback: show last cached snapshot only if the live load failed
    try{ var cached=sessionStorage.getItem(_cacheKey()); if(cached){ var cd=JSON.parse(cached); if(cd&&cd.d){ _applyLoadData(cd.d); hideLoad(); toast('Showing last loaded data (refresh failed)',1); return; } } }catch(e){}
    console.warn('loadAll failed, falling back to individual calls:',r&&r.msg);
    const [cs,ts,et,us,ln]=await Promise.all([
      gs_('getCases',S.tok),gs_('getTasks',S.tok),gs_('getEmailTemplates',S.tok),
      gs_('getUsers',S.tok),gs_('getLenders',S.tok)
    ]);
    let lb={data:[]},cm={data:[]},iv={data:[]},rc={data:[]};
    if(S.user&&S.user.role!=='support'){
      [lb,cm,iv,rc]=await Promise.all([gs_('getLoanBook',S.tok),gs_('getCommissions',S.tok),gs_('getInvoices',S.tok),gs_('getSavedRecipients',S.tok)]);
    }
    if(!cs||!cs.ok){
      hideLoad();
      toast('Backend not responding. Please redeploy: Apps Script \u2192 Deploy \u2192 Manage \u2192 Edit \u2192 Version: New version \u2192 Deploy',1);
      render(); return;
    }
    S.cases=cs.data||[];S.tasks=(ts&&ts.data)||[];
    S.emailTpls=(et&&et.data)||{};S.users=(us&&us.data)||[];
    S.lenders=(ln&&ln.data)||[];
    S.loanBook=(lb&&lb.data)||[];S.commissions=(cm&&cm.data)||[];
    S.invoices=(iv&&iv.data)||[];S.savedRecipients=(rc&&rc.data)||[];
    hideLoad();setupSidebar();render();
    toast('Loaded via fallback (consider redeploying)',1);
    return;
  }
  hideLoad();
  const d=r.data||{};
  _applyLoadData(d);
  try{ sessionStorage.setItem(_cacheKey(), JSON.stringify({t:Date.now(),d:d})); }catch(e){}
}

// \u2500\u2500 Number-with-commas live formatter for $ inputs \u2500\u2500
function attachMoneyFormat(input){
  if(!input||input._moneyAttached)return;
  input._moneyAttached=true;
  const fmt=()=>{
    const cursor=input.selectionStart||0;
    const before=input.value;
    const raw=before.replace(/[^\d.]/g,'');
    if(raw==='')return;
    const parts=raw.split('.');
    const whole=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
    const formatted=parts.length>1?whole+'.'+parts[1].slice(0,2):whole;
    if(formatted!==before){
      input.value=formatted;
      // try to keep cursor roughly in place
      const diff=formatted.length-before.length;
      try{input.setSelectionRange(cursor+diff,cursor+diff);}catch(e){}
    }
  };
  input.addEventListener('input',fmt);
  fmt();
}
function unfmtMoney(s){return Number(String(s||'').replace(/,/g,''))||0;}

// Read an uploaded image file, resize to max dimensions, and return as base64 data URL.
// Compressing is essential because Properties Service has a 9KB-per-key limit
// (we chunk above this on the server, but smaller is still better).
function readImageAsDataUrl(file, maxWidth, maxHeight, mimeType, quality){
  return new Promise((resolve, reject)=>{
    if(!file){reject(new Error('No file'));return;}
    if(!file.type.startsWith('image/')){reject(new Error('Not an image file'));return;}
    if(file.size > 5*1024*1024){reject(new Error('File too large \u2014 keep under 5 MB'));return;}
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Could not read file'));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('Could not decode image'));
      img.onload=()=>{
        // Calculate proportional dimensions
        let {width,height}=img;
        const scaleW=maxWidth/width, scaleH=maxHeight/height;
        const scale=Math.min(1, scaleW, scaleH);
        width=Math.round(width*scale);
        height=Math.round(height*scale);
        const canvas=document.createElement('canvas');
        canvas.width=width;canvas.height=height;
        const ctx=canvas.getContext('2d');
        // White background for JPG (transparency becomes white)
        if(mimeType==='image/jpeg'){
          ctx.fillStyle='#ffffff';ctx.fillRect(0,0,width,height);
        }
        ctx.drawImage(img,0,0,width,height);
        const dataUrl=canvas.toDataURL(mimeType||'image/png', quality||0.88);
        resolve(dataUrl);
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// \u2500\u2500 Font zoom (saved to localStorage) \u2500\u2500
const FONT_KEY='bd_zoom';
function applyFontZoom(){
  const z=parseFloat(localStorage.getItem(FONT_KEY))||1;
  // Apply CSS zoom to #content only.
  // - body.fontSize doesn't work because every element uses explicit `font-size:Npx` (no inheritance)
  // - body.zoom breaks 100vh viewport calc \u2192 content gets cut off
  // - #content zoom scales pixel values inside without affecting outer 100vh frame
  const content = document.getElementById('content');
  if(content) content.style.zoom = z;
  // Modal: scale via CSS variable on body \u2014 the modal overlay is appended outside #content
  document.documentElement.style.setProperty('--app-zoom', z);
  // Update label if visible
  const lbl=document.getElementById('zoom-pct');
  if(lbl) lbl.textContent=Math.round(z*100)+'%';
}
function changeZoom(delta){
  const cur=parseFloat(localStorage.getItem(FONT_KEY))||1;
  const next=Math.max(0.7,Math.min(1.6,Math.round((cur+delta)*100)/100));
  localStorage.setItem(FONT_KEY,String(next));
  applyFontZoom();
  toast('Font: '+Math.round(next*100)+'%');
}
function resetZoom(){localStorage.setItem(FONT_KEY,'1');applyFontZoom();toast('Font: 100%');}

// Track last seen task IDs assigned to me, so we can pop notifs only for new ones
let _seenMyTaskIds=new Set();
// Track tasks I assigned to others, so I get notified when they tick done
let _seenAssignedDoneIds=new Set();

function checkNewMyTasks(silent){
  if(!S.user)return;
  const myOpen=S.tasks.filter(t=>t.assignedTo===S.user.id && !isTrue(t.done));
  if(silent){
    myOpen.forEach(t=>_seenMyTaskIds.add(t.id));
    // Also seed completed tasks I assigned to others (so we don't ding for old ones)
    S.tasks.filter(t=>t.createdBy===S.user.id && t.assignedTo!==S.user.id && isTrue(t.done))
      .forEach(t=>_seenAssignedDoneIds.add(t.id));
    updateBellBadge();
    return;
  }
  // 1) New tasks assigned to me
  const fresh=myOpen.filter(t=>!_seenMyTaskIds.has(t.id));
  if(fresh.length){
    fresh.forEach(t=>_seenMyTaskIds.add(t.id));
    const c=S.cases.find(x=>x.id===fresh[0].caseId);
    const title=fresh.length===1?'New task assigned to you':`${fresh.length} new tasks assigned`;
    const body=fresh.length===1?`${fresh[0].text}${c?' \u00B7 '+c.clientName:''}`:fresh.map(t=>t.text).slice(0,3).join('\n');
    browserNotify(title,body);
    _playAssignSound();
    toast('\uD83D\uDD14 '+title,0);
  }
  // 2) Tasks I assigned to OTHERS that just got marked done
  const myAssignedDone=S.tasks.filter(t=>
    t.createdBy===S.user.id &&
    t.assignedTo!==S.user.id &&
    isTrue(t.done) &&
    !_seenAssignedDoneIds.has(t.id));
  if(myAssignedDone.length){
    myAssignedDone.forEach(t=>_seenAssignedDoneIds.add(t.id));
    const t=myAssignedDone[0];
    const title=myAssignedDone.length===1?'Task completed':`${myAssignedDone.length} tasks completed`;
    const body=myAssignedDone.length===1?`${t.doneByName||t.assignedToName||''} finished: ${t.text}`:myAssignedDone.map(x=>x.text).slice(0,3).join('\n');
    browserNotify('\u2713 '+title,body);
    _playDoneSound();
    toast('\u2713 '+title,0);
  }
  updateBellBadge();
}

// Two distinct sounds so the brain learns: high-low = new task; bright = done
function _playAssignSound(){
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
    o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,_audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18,_audioCtx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,_audioCtx.currentTime+0.5);
    o.connect(g);g.connect(_audioCtx.destination);
    o.start();o.stop(_audioCtx.currentTime+0.5);
    setTimeout(()=>{
      const o2=_audioCtx.createOscillator(),g2=_audioCtx.createGain();
      o2.type='sine';o2.frequency.value=1320;
      g2.gain.setValueAtTime(0.0001,_audioCtx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.15,_audioCtx.currentTime+0.02);
      g2.gain.exponentialRampToValueAtTime(0.0001,_audioCtx.currentTime+0.4);
      o2.connect(g2);g2.connect(_audioCtx.destination);
      o2.start();o2.stop(_audioCtx.currentTime+0.4);
    },180);
  }catch(e){}
}
function _playDoneSound(){
  // 3-note ascending arpeggio (C-E-G) for completion
  try{
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      setTimeout(()=>{
        const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
        o.type='triangle';o.frequency.value=freq;
        g.gain.setValueAtTime(0.0001,_audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.18,_audioCtx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,_audioCtx.currentTime+0.35);
        o.connect(g);g.connect(_audioCtx.destination);
        o.start();o.stop(_audioCtx.currentTime+0.35);
      },i*120);
    });
  }catch(e){}
}
// Backward compat (still used by old code paths)
function _playNotifSound(){_playAssignSound();}

function updateBellBadge(){
  if(!S.user)return;
  const myOpen=S.tasks.filter(t=>t.assignedTo===S.user.id && !isTrue(t.done)).length;
  const recentDoneByOthers=S.tasks.filter(t=>
    t.createdBy===S.user.id &&
    t.assignedTo!==S.user.id &&
    isTrue(t.done) &&
    _isRecent(t.doneAt,7)).length;
  const total=myOpen+recentDoneByOthers+notifUnreadCount();
  const badge=document.getElementById('bell-count');
  if(!badge)return;
  if(total>0){
    badge.textContent=total>99?'99+':String(total);
    badge.style.display='flex';
  } else {
    badge.style.display='none';
  }
}
function _isRecent(iso,days){
  if(!iso)return false;
  const t=new Date(iso);if(isNaN(t))return false;
  return (Date.now()-t.getTime())<days*86400000;
}
function toggleBell(ev){
  if(ev)ev.stopPropagation();
  const pop=document.getElementById('bell-popover');
  if(!pop)return;
  if(pop.style.display==='block'){pop.style.display='none';return;}
  renderBellPopover();
  pop.style.display='block';
  // Outside-click handler. We use mousedown (fires BEFORE the click target gets
  // detached by re-render) and check geometric containment via getBoundingClientRect.
  // This survives popover content being replaced when a tab button is clicked.
  setTimeout(()=>{
    const handler=(e)=>{
      const wrap=document.getElementById('bell-wrap');
      if(!wrap){document.removeEventListener('mousedown',handler);return;}
      const rect = wrap.getBoundingClientRect();
      const popRect = pop.getBoundingClientRect();
      const x = e.clientX, y = e.clientY;
      const inWrap = x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
      const inPop = x >= popRect.left && x <= popRect.right && y >= popRect.top && y <= popRect.bottom;
      if (!inWrap && !inPop) {
        pop.style.display='none';
        document.removeEventListener('mousedown',handler);
      }
    };
    document.addEventListener('mousedown',handler);
  },0);
}

      const aDone=isTrue(a.done)?1:0, bDone=isTrue(b.done)?1:0;

      </button>

function _relativeTime(iso){
  if(!iso)return '';
  const t=new Date(iso);if(isNaN(t))return iso;
  const diff=(Date.now()-t.getTime())/1000;
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<86400*7)return Math.floor(diff/86400)+'d ago';
  return t.toLocaleDateString('en-AU',{day:'2-digit',month:'short'});
}

// For errors / warnings / info that survive past a 3-second toast.
// Shown in the bell popover under a "System" tab.
const _NOTIF_KEY = 'bd_notifs';
const _NOTIF_MAX = 50;
function notifList(){
  try {
    const raw = localStorage.getItem(_NOTIF_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function notifPush(type, title, detail){
  // type: 'error' | 'warning' | 'info'
  const list = notifList();
  list.unshift({
    id: 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    type: type || 'info',
    title: String(title||''),
    detail: String(detail||''),
    ts: Date.now(),
    read: false,
  });
  // Cap at _NOTIF_MAX
  if(list.length > _NOTIF_MAX) list.length = _NOTIF_MAX;
  try { localStorage.setItem(_NOTIF_KEY, JSON.stringify(list)); } catch(e){}
  updateBellCount();
  // If popover is open, refresh it
  const pop = document.getElementById('bell-popover');
  if(pop && pop.style.display !== 'none') renderBellPopover();
}

}

// Broker/support: requestDelete_ \u2192 admin reviews \u2192 approveDelete_ or rejectDelete_
// Admin direct: adminDirectDelete_ (skips request flow)
// All destructive actions require typed "confirm" \u2014 prevents fat-finger deletes.

async function requestDelete_(caseId, clientName){
  const reason = prompt(`Request to DELETE this case:\n\n${caseId} \u00B7 ${clientName}\n\nPlease give a brief reason for the request (will be shown to admin):`);
  if(reason === null) return;  // user cancelled
  if(!reason.trim()){ toast('A reason is required', 1); return; }
  showLoad();
  const r = await gs_('requestCaseDelete', S.tok, caseId, reason.trim());
  hideLoad();
  if(r && r.ok){
    toast('\u2713 Delete request sent to admin');
    // Refresh case in cache
    const c = S.cases.find(x => x.id === caseId);
    if(c) c.pendingDelete = JSON.stringify({by:S.user.id, byName:S.user.name, reason:reason.trim(), at:new Date().toISOString().slice(0,10)});
    render();
  } else toast((r&&r.msg) || 'Failed', 1);
}

async function adminDirectDelete_(caseId, clientName){
  const txt = prompt(`\u26A0\uFE0F PERMANENTLY DELETE this case?\n\n${caseId} \u00B7 ${clientName}\n\nThis will:\n\u00B7 Delete the case row\n\u00B7 Delete all linked tasks, notes, and email logs\n\u00B7 Unlink (but preserve) commissions, loan-book entries, and invoices\n\nThis cannot be undone.\n\nType "confirm" below to proceed:`);
  if(txt === null) return;
  if(String(txt).toLowerCase().trim() !== 'confirm'){
    toast('You must type "confirm" exactly', 1);
    return;
  }
  showLoad();
  const r = await gs_('directDeleteCase', S.tok, caseId, txt);
  hideLoad();
  if(r && r.ok){
    const counts = (r.data || {});
    toast(`\u2713 Deleted \u00B7 ${counts.tasks||0} tasks, ${counts.notes||0} notes, ${counts.emails||0} email logs removed`);
    // Remove from local cache + close modal
    S.cases = S.cases.filter(x => x.id !== caseId);
    S.tasks = S.tasks.filter(t => t.caseId !== caseId);
    S.modal = null;
    S.selId = null;
    render();
  } else toast((r&&r.msg) || 'Failed', 1);
}

async function approveDelete_(caseId){
  const c = S.cases.find(x => x.id === caseId);
  const clientName = c ? (c.clientName||'') : '';
  const txt = prompt(`Approve delete of:\n\n${caseId} \u00B7 ${clientName}\n\nThis will permanently delete the case (cascade applies).\n\nType "confirm" below to approve:`);
  if(txt === null) return;
  if(String(txt).toLowerCase().trim() !== 'confirm'){
    toast('You must type "confirm" exactly', 1);
    return;
  }
  showLoad();
  const r = await gs_('approveCaseDelete', S.tok, caseId, txt);
  hideLoad();
  if(r && r.ok){
    const counts = (r.data || {});
    toast(`\u2713 Approved & deleted \u00B7 ${counts.tasks||0} tasks removed`);
    S.cases = S.cases.filter(x => x.id !== caseId);
    S.tasks = S.tasks.filter(t => t.caseId !== caseId);
    S.modal = null;
    S.selId = null;
    render();
  } else toast((r&&r.msg) || 'Failed', 1);
}

async function rejectDelete_(caseId){
  const reason = prompt('Reject this delete request?\n\nOptionally note why (will be logged but not shown to the requester):');
  if(reason === null) return;
  showLoad();
  const r = await gs_('rejectCaseDelete', S.tok, caseId, reason||'');
  hideLoad();
  if(r && r.ok){
    toast('\u2713 Delete request rejected');
    const c = S.cases.find(x => x.id === caseId);
    if(c) c.pendingDelete = '';
    render();
  } else toast((r&&r.msg) || 'Failed', 1);
}

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  MAIN RENDER                                    \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
// _render does the actual work. The exported render() coalesces multiple
// calls within the same animation frame into one DOM update \u2014 major perf win
// for long lists where filter changes triggered N renders per keystroke.
// Per-render memoization cache. Invalidated at the start of each _render call.
// Used by helpers like _caseDeadlineStatus / getChecklistStats so the same
// computation isn't repeated multiple times across KPIs, timeline, and lists
// during a single render pass.
let _renderCache = { deadlines: new Map(), checklist: new Map() };
function _resetRenderCache(){
  _renderCache.deadlines.clear();
  _renderCache.checklist.clear();
  _resetTasksIndex();
}

let _renderQueued = false;
function render(){
  if(_renderQueued)return;
  _renderQueued = true;
  requestAnimationFrame(function(){
    _renderQueued = false;
    _render();
  });
}
function _render(){
  _resetRenderCache();
  renderNav();
  const v=S.view;
  const vc=document.getElementById('vc');
  if(!vc)return;
  try {
    vc.innerHTML=
      v==='dashboard'?rDash():
      v==='pipeline'?rPipeline():
      v==='cases'?rCases():
      v==='tasks'?rTasks():
      v==='reminders'?rReminders():
      v==='workflow'?rWorkflow():
      v==='emails'?rEmails():
      v==='loanbook'?(_incomeBanner('loanbook')+rLoanBook()):
      v==='commissions'?(_incomeBanner('commissions')+rCommissions()):
      v==='invoices'?(_incomeBanner('invoices')+rInvoices()):
      v==='revenue'?(_incomeBanner('revenue')+rRevenue()):
      v==='documents'?rDocuments():
      v==='team'?rTeam():
      v==='lenders'?rLenders():
      v==='activity'?rActivity():
      v==='settings'?rSettings():'';
  } catch(e) {
    vc.innerHTML=`<div style="padding:40px;color:#ef4444;text-align:center;">Render error: ${esc(e.message)}. Click Refresh.</div>`;
    console.error(e);
  }
  renderModal();
  setTimeout(attachAllMoneyInputs,0);
  const lbl=document.getElementById('zoom-pct');
  if(lbl)lbl.textContent=Math.round((parseFloat(localStorage.getItem(FONT_KEY))||1)*100)+'%';
  if(S.user)updateBellBadge();
}
// renderModal is rAF-coalesced like render() \u2014 multiple rapid state changes
// (e.g. tab switch + field edit) collapse into one DOM write per frame.
let _modalRenderQueued = false;
function renderModal(){
  if(_modalRenderQueued)return;
  _modalRenderQueued = true;
  requestAnimationFrame(function(){
    _modalRenderQueued = false;
    _renderModal();
  });
}
function _renderModal(){
  const m=S.modal;
  const mc=document.getElementById('mc');
  if(!mc)return;
  // Capture focus + caret BEFORE re-render so live oninput handlers (broker
  // share %, amounts, etc.) don't interrupt typing by resetting the field.
  let _focusId = null, _selStart = null, _selEnd = null;
  try {
    const ae = document.activeElement;
    if(ae && ae.id && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')){
      _focusId = ae.id;
      if(typeof ae.selectionStart === 'number'){ _selStart = ae.selectionStart; _selEnd = ae.selectionEnd; }
    }
  } catch(e){}
  try {
    mc.innerHTML=
      m==='case'?rCaseModal():
      m==='newCase'?rNewCase():
      m==='emailPreview'?rEmailPreview():
      m==='addLoan'?rAddLoan():
      m==='editLoan'?rEditLoan():
      m==='addComm'?rAddComm():
      m==='revEmail'?rRevEmailModal():
      m==='invEmail'?rInvoiceEmailModal():
      m==='invPicker'?rInvoicePickerModal():
      m==='editComm'?rEditComm():
      m==='trailReceipt'?rTrailReceipt():
      m==='exportComm'?rExportComm():
      m==='exportLoanBook'?rExportLoanBook():
      m==='clawback'?rClawback():
      m==='newInvoice'?rNewInvoice():
      m==='viewInvoice'?rViewInvoice():
      m==='addUser'?rAddUser():
      m==='editUser'?rEditUser():
      m==='changePass'?rChangePass():
      m==='tfaSetup'?rTfaSetup():
      m==='bulkEmail'?rBulkEmail():
      m==='revPreview'?rRevPreviewModal():
      m==='revSync'?rRevSyncModal():'';
  } catch(e) {
    mc.innerHTML='';
    console.error(e);toast('Modal error: '+e.message,1);
  }
  // Restore focus + caret to the same field
  if(_focusId){
    const el = document.getElementById(_focusId);
    if(el){
      try {
        el.focus();
        if(_selStart != null && typeof el.setSelectionRange === 'function'){
          el.setSelectionRange(_selStart, _selEnd);
        }
      } catch(e){}
    }
  }
  setTimeout(attachAllMoneyInputs,0);
}

// \u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557
// \u2551  DASHBOARD                                      \u2551
// \u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D
// Compute deadline status for a case \u2014 used by dashboard alert card.
// Returns null if no deadline applies, otherwise object with type/severity/text.
function _caseDeadlineStatus(c){
  if(!c) return null;
  const cache = _renderCache && _renderCache.deadlines;
  if(cache && cache.has(c.id)) return cache.get(c.id);
  const result = _computeCaseDeadlineStatus(c);
  if(cache) cache.set(c.id, result);
  return result;
}
function _computeCaseDeadlineStatus(c){
  if(!c || ['settled','not_proceeding'].indexOf(c.stage)>=0) return null;
  const now = Date.now();
  const out = [];
  // 24h take-action timer for fresh enquiries
  if(c.stage === 'new_enquiry' && c.createdAt){
    const created = new Date(c.createdAt).getTime();
    if(!isNaN(created)){
      const elapsedMs = now - created;
      const dueMs = 24*3600*1000 - elapsedMs;
      out.push({
        kind: 'enquiry_24h',
        sev: dueMs <= 0 ? 'overdue' : (dueMs < 4*3600*1000 ? 'critical' : 'warn'),
        ms: dueMs,
        label: dueMs <= 0 ? 'Take action OVERDUE' : '24h take-action',
        target: new Date(created + 24*3600*1000)
      });
    }
  }
  // Finance Due Date: alert if within 7 days
  if(c.financeDueDate){
    const fd = new Date(c.financeDueDate).getTime();
    if(!isNaN(fd)){
      const dueMs = fd - now;
      const dayMs = 24*3600*1000;
      if(dueMs <= 7*dayMs){
        out.push({
          kind: 'finance_due',
          sev: dueMs < 0 ? 'overdue' : (dueMs < 2*dayMs ? 'critical' : 'warn'),
          ms: dueMs,
          label: dueMs < 0 ? 'Finance OVERDUE' : 'Finance Due',
          target: new Date(fd)
        });
      }
    }
  }
  // Settlement Date: alert if within 14 days
  if(c.settlementDate){
    const sd = new Date(c.settlementDate).getTime();
    if(!isNaN(sd)){
      const dueMs = sd - now;
      const dayMs = 24*3600*1000;
      if(dueMs <= 14*dayMs){
        out.push({
          kind: 'settlement',
          sev: dueMs < 0 ? 'overdue' : (dueMs < 3*dayMs ? 'critical' : 'warn'),
          ms: dueMs,
          label: dueMs < 0 ? 'Settlement OVERDUE' : 'Settlement',
          target: new Date(sd)
        });
      }
    }
  }
  return out.length ? out : null;
}

// Format ms \u2192 "5d 3h" / "2h 15m" / "OVERDUE 2d"
function _fmtCountdown(ms){
  const abs = Math.abs(ms);
  const d = Math.floor(abs/86400000);
  const h = Math.floor((abs%86400000)/3600000);
  const m = Math.floor((abs%3600000)/60000);
  let out = '';
  if(d>0) out = d+'d '+h+'h';
  else if(h>0) out = h+'h '+m+'m';
  else out = m+'m';
  return ms < 0 ? '\u26A0 '+out+' over' : out;
}

function rDash(){
  // Person filter \u2014 admin can pick any team member, others see their own
  if(!S.dashFilter) S.dashFilter = 'all';
  const role = S.user.role;
  const myId = S.user.id;
  // Default filter:
  //   admin \u2192 'all' (sees everyone)
  //   broker \u2192 own cases by default, but can switch to view team mates working on their cases
  //   support \u2192 own only (locked)
  if(!S.dashFilter) S.dashFilter = role === 'admin' ? 'all' : myId;
  // Non-admin/broker users (support) are pinned to their own ID
  const filterId = role === 'support' ? myId : S.dashFilter;

  // Apply filter to cases \u2014 assignedTo matches OR createdBy matches (broker can be either)
  const filterCase = c => {
    if(filterId === 'all') return true;
    return c.assignedTo === filterId || c.createdBy === filterId;
  };
  // Note: task filtering uses filterTaskByPerson (defined below), which also includes
  // tasks delegated to other people on cases owned by the filter person.

  const allCases = S.cases.filter(c=>!c.archived);
  const cs = allCases.filter(filterCase);
  const active=cs.filter(c=>['settled','not_proceeding'].indexOf(c.stage)<0);
  const settled=cs.filter(c=>c.stage==='settled');
  const tv=active.reduce((s,c)=>s+Number(c.loanAmount||0),0);
  const settledValue=settled.reduce((s,c)=>s+Number(c.loanAmount||0),0);
  // Trail and loan book \u2014 also filterable by broker
  const filteredLoans = filterId === 'all' ? S.loanBook : S.loanBook.filter(l=>l.brokerId===filterId);
  const trailMo=filteredLoans.filter(l=>l.status==='Active').reduce((s,l)=>s+Number(l.trailMonthly||0),0);
  const trailAnnual=trailMo*12;

  // Compute deadline counts for KPIs (filtered)
  const totalDeadlines = active.reduce((sum,c)=>{
    const stat = _caseDeadlineStatus(c);
    return sum + (stat ? stat.length : 0);
  }, 0);
  const totalOverdue = active.reduce((sum,c)=>{
    const stat = _caseDeadlineStatus(c) || [];
    return sum + stat.filter(s=>s.sev==='overdue').length;
  }, 0);

  // \u2500\u2500 Build "Urgent \u2014 next 24 hours" list \u2500\u2500
  const now = Date.now();
  const dayMs = 86400000;
  const urgent24h = [];
  active.forEach(c=>{
    if(c.priority==='Urgent'){
      urgent24h.push({c, kind:'priority_urgent', label:'Marked URGENT priority', iconName:'alert', color:'#ef4444'});
    }
    // Note: "respond within 24h" cases used to auto-populate here, but that overlapped with
    // explicit 24h Response tasks. Removed \u2014 use the dedicated panel for response tasks.
    ['financeDueDate','settlementDate'].forEach(field=>{
      if(c[field]){
        const dt = new Date(c[field]).getTime();
        if(!isNaN(dt)){
          const ms = dt - now;
          if(ms < dayMs && ms > -7*dayMs){
            const label = field==='financeDueDate'?'Finance':'Settlement';
            urgent24h.push({c, kind:field, label:ms<0?`${label} OVERDUE`:`${label} today/tomorrow`, iconName:field==='financeDueDate'?'money':'home', color:ms<0?'#DC2626':'#FB923C'});
          }
        }
      }
    });
  });
  // Build cases-owned-by-filterId set so brokers see tasks delegated to support on their own cases
  const myCaseIdsForFilter = new Set(
    filterId && filterId !== 'all'
      ? allCases.filter(c=>c.assignedTo===filterId || c.createdBy===filterId).map(c=>c.id)
      : []
  );
  const filterTaskByPerson = (t) => {
    if(filterId === 'all') return true;
    const isOwn = t.assignedTo === filterId;
    const isOnMyCase = t.caseId && myCaseIdsForFilter.has(t.caseId);
    return isOwn || isOnMyCase;
  };

  // 24h Response tasks \u2014 open tasks with kind='response_24h', any due date
  const response24hTasks = S.tasks.filter(t=>{
    if(isTrue(t.done)) return false;
    if(t.kind !== 'response_24h') return false;
    return filterTaskByPerson(t);
  });

  // Non-24h urgent tasks (priority=Urgent or due in next 24h, but NOT response_24h kind)
  const urgentTasksNon24h = S.tasks.filter(t=>{
    if(isTrue(t.done)) return false;
    if(t.kind === 'response_24h') return false;  // shown in dedicated panel
    if(!t.dueDate) return false;
    if(!filterTaskByPerson(t)) return false;
    const due = new Date(t.dueDate).getTime();
    if(isNaN(due)) return false;
    return (due - now) < dayMs;
  });

  // Note: urgentTasksNon24h is the canonical name. The dashboard uses this directly.

  // Workflow next actions
  const nextActions = [];
  active.forEach(c=>{
    const items = STAGE_CHECKLISTS[c.stage] || [];
    if(!items.length) return;
    let progress = {};
    try { progress = JSON.parse(c.checklist || '{}'); } catch(e) { progress = {}; }
    const doneIds = progress[c.stage] || [];
    const nextMandatory = items.find(it=>it.mandatory && doneIds.indexOf(it.id)<0);
    const nextAny = items.find(it=>doneIds.indexOf(it.id)<0);
    const next = nextMandatory || nextAny;
    if(next){
      const stats = getChecklistStats(c, c.stage);
      nextActions.push({c, item:next, stats, isMandatory: !!nextMandatory});
    }
  });
  nextActions.sort((a,b)=>{
    if(a.isMandatory !== b.isMandatory) return a.isMandatory ? -1 : 1;
    return a.stats.pct - b.stats.pct;
  });

  // Greeting based on time of day
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

    .lux-hero-sub { font-size: 10px; color: #8b949e; margin-top: 3px; letter-spacing: .2px; }

    .lux-section { background: #0F141C; border: 1px solid #1e2430; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }

    .lux-pill-count { font-size: 9.5px; padding: 1px 6px; border-radius: 8px; background: #1e2430; color: #6b7280; font-weight: 700; font-family: 'JetBrains Mono', Consolas, monospace; }

  </style>

  ${role !== 'support' && S.users.length > 1 ? (()=>{
    // Build per-person stats for the pill counts
    const personStats = id => {
      const personCases = allCases.filter(c=>['settled','not_proceeding'].indexOf(c.stage)<0 && (c.assignedTo===id || c.createdBy===id));
      return personCases.length;
    };
    const allActive = allCases.filter(c=>['settled','not_proceeding'].indexOf(c.stage)<0).length;

    // Determine which users to show as pills
    let visibleUsers;
    if(role === 'admin'){
      // Admin sees everyone
      visibleUsers = S.users;
    } else {
      // Broker sees: themselves + anyone (support/broker) assigned tasks on their cases
      // OR anyone whose cases they created
      const myCaseIds = new Set(allCases.filter(c=>c.assignedTo===myId || c.createdBy===myId).map(c=>c.id));
      const teammateIds = new Set([myId]);
      // Add anyone with tasks on my cases
      S.tasks.forEach(t=>{
        if(myCaseIds.has(t.caseId) && t.assignedTo) teammateIds.add(t.assignedTo);
      });
      // Add anyone assigned to my cases
      allCases.forEach(c=>{
        if(myCaseIds.has(c.id) && c.assignedTo) teammateIds.add(c.assignedTo);
      });
      visibleUsers = S.users.filter(u=>teammateIds.has(u.id));
    }

    // Hide pill bar if there's effectively only one option (just the user)
    if(visibleUsers.length < 2 && role !== 'admin') return '';

    return `<div class="lux-filter-bar">
      <span class="lux-filter-label">Viewing</span>
      ${role === 'admin' ? `<button class="lux-pill ${filterId==='all'?'on':''}" onclick="S.dashFilter='all';render()">
        <span>All Team</span>
        <span class="lux-pill-count">${allActive}</span>
      </button>` : ''}
      ${visibleUsers.map(u=>{
        const count = personStats(u.id);
        const initials = (u.name||'?').split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase();
        const roleLabel = u.role === 'admin' ? 'Admin' : u.role === 'broker' ? 'Broker' : 'Support';
        const isMe = u.id === myId;
        return `<button class="lux-pill ${filterId===u.id?'on':''}" onclick="S.dashFilter='${esc(u.id)}';render()" title="${esc(roleLabel)}${isMe?' \u00B7 you':''}">
          <span class="lux-pill-avatar" style="background:${ucolor(u.id)};">${esc(initials)}</span>
          <span>${esc(u.name.split(' ')[0])}${isMe?' (you)':''}${u.role==='support'?' \u00B7 spt':''}</span>
          <span class="lux-pill-count">${count}</span>
        </button>`;
      }).join('')}
    </div>`;
  })() : ''}

  <!-- \u2550\u2550\u2550 COMPACT HERO RIBBON \u2550\u2550\u2550 -->
  <div class="lux-hero">
    <div class="lux-hero-row">
      <div class="lux-hero-greet-block">
        ${filterId !== 'all' && filterId !== myId ? (()=>{
          const u = S.users.find(x=>x.id===filterId);
          return u ? `<div class="lux-greet" style="color:#D4A843;">Viewing <span class="lux-greet-name">${esc(u.name)}</span>'s pipeline</div><div class="lux-date">${esc(u.role)}${u.email?' \u00B7 '+esc(u.email):''}</div>` : `<div class="lux-greet">${greeting}, <span class="lux-greet-name">${esc(firstName||'there')}</span></div><div class="lux-date">${esc(today)}</div>`;
        })() : `<div class="lux-greet">${greeting}, <span class="lux-greet-name">${esc(firstName||'there')}</span></div><div class="lux-date">${esc(today)}</div>`}
      </div>
      <div class="lux-hero-divider"></div>
      <div class="lux-hero-pipeline">
        <div class="lux-hero-label">Active pipeline</div>
        <div class="lux-hero-value"><span class="lux-hero-currency">$</span>${(tv||0).toLocaleString('en-AU', {maximumFractionDigits:0})}</div>
        <div class="lux-hero-sub"><strong>${active.length}</strong> case${active.length!==1?'s':''}${active.length?` \u00B7 avg ${fmtCur(Math.round(tv/active.length))}`:''}</div>
      </div>
      <div class="lux-hero-divider"></div>
      <div class="lux-hero-stats">
        <div class="lux-stat">
          <div class="lux-stat-num green">${settled.length}</div>
          <div class="lux-stat-lbl">Settled</div>
          ${conversionRate?`<div class="lux-stat-trend">${conversionRate}% conv.</div>`:'<div class="lux-stat-trend" style="color:#6b7280;">\u2014</div>'}
        </div>
        ${S.user.role!=='support'?`<div class="lux-stat">
          <div class="lux-stat-num gold">${fmtCur(trailMo)}</div>
          <div class="lux-stat-lbl">Trail \u00B7 mo</div>
          <div class="lux-stat-trend">${fmtCur(trailAnnual)}/yr</div>
        </div>`:''}
        <div class="lux-stat">
          <div class="lux-stat-num ${totalOverdue?'red':totalDeadlines?'orange':''}">${totalDeadlines}</div>
          <div class="lux-stat-lbl">Deadlines \u00B7 14d</div>
          ${totalOverdue?`<div class="lux-stat-trend" style="color:#DC2626;">${totalOverdue} overdue</div>`:'<div class="lux-stat-trend" style="color:#6b7280;">on track</div>'}
        </div>
        <div class="lux-stat">
          <div class="lux-stat-num ${response24hTasks.length?'red':''}">${response24hTasks.length}</div>
          <div class="lux-stat-lbl">24h Response</div>
